{% extends 'base.html' %}
{% load static %}

{% block screen_title %}Analytics{% endblock %}

{% block content %}
<div class="px-4 py-6" x-data="{ period: 'today', customOpen: false, startDate: '', endDate: '' }">
    
    <!-- Period Filters -->
    <div class="flex flex-col gap-3 mb-8">
        <div class="flex gap-2 overflow-x-auto pb-1 scrollbar-hide">
            <button @click="period = 'today'; customOpen = false" 
                    hx-get="{% url 'reports:dashboard' %}?period=today"
                    hx-target="#dashboard-body"
                    :style="period === 'today' ? 'background: #2d545e; color: #e1b382; border-color: #2d545e' : 'background: white; color: #6B7280; border-color: #E5E7EB'"
                    :class="period === 'today' ? 'shadow-md' : ''"
                    class="px-5 py-2.5 rounded-full text-[11px] font-extrabold uppercase tracking-wider transition-all border whitespace-nowrap">
                Today
            </button>
            <button @click="period = '7days'; customOpen = false" 
                    hx-get="{% url 'reports:dashboard' %}?period=7days"
                    hx-target="#dashboard-body"
                    :style="period === '7days' ? 'background: #2d545e; color: #e1b382; border-color: #2d545e' : 'background: white; color: #6B7280; border-color: #E5E7EB'"
                    :class="period === '7days' ? 'shadow-md' : ''"
                    class="px-5 py-2.5 rounded-full text-[11px] font-extrabold uppercase tracking-wider transition-all border whitespace-nowrap">
                7 Days
            </button>
            <button @click="period = '30days'; customOpen = false" 
                    hx-get="{% url 'reports:dashboard' %}?period=30days"
                    hx-target="#dashboard-body"
                    :style="period === '30days' ? 'background: #2d545e; color: #e1b382; border-color: #2d545e' : 'background: white; color: #6B7280; border-color: #E5E7EB'"
                    :class="period === '30days' ? 'shadow-md' : ''"
                    class="px-5 py-2.5 rounded-full text-[11px] font-extrabold uppercase tracking-wider transition-all border whitespace-nowrap">
                30 Days
            </button>
            <button @click="customOpen = !customOpen; if(customOpen) period = 'custom';"
                    :style="period === 'custom' ? 'background: #2d545e; color: #e1b382; border-color: #2d545e' : 'background: white; color: #6B7280; border-color: #E5E7EB'"
                    :class="period === 'custom' ? 'shadow-md' : ''"
                    class="px-5 py-2.5 rounded-full text-[11px] font-extrabold uppercase tracking-wider transition-all border whitespace-nowrap">
                Custom Range
            </button>
        </div>
        
        <!-- Custom Range Form -->
        <div x-show="customOpen" x-collapse style="background: white; border: 1px solid #E5E7EB" class="p-4 rounded-2xl">
            <form hx-get="{% url 'reports:dashboard' %}" hx-target="#dashboard-body" class="flex flex-col sm:flex-row gap-3 items-end">
                <input type="hidden" name="period" value="custom">
                <div class="flex-1 w-full">
                    <label class="text-[10px] font-bold text-text-muted uppercase tracking-widest mb-1.5 block">Start Date</label>
                    <input type="date" name="start_date" x-model="startDate" required style="background: #F8F9FB; border: 1px solid #E5E7EB; color: #12343b" class="w-full rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-1 transition-all">
                </div>
                <div class="flex-1 w-full">
                    <label class="text-[10px] font-bold text-text-muted uppercase tracking-widest mb-1.5 block">End Date</label>
                    <input type="date" name="end_date" x-model="endDate" required style="background: #F8F9FB; border: 1px solid #E5E7EB; color: #12343b" class="w-full rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-1 transition-all">
                </div>
                <button type="submit" class="w-full sm:w-auto px-6 py-3 rounded-xl font-extrabold text-sm shadow-md active:scale-95 transition-all" style="background: #2d545e; color: #e1b382">
                    Apply Filter
                </button>
            </form>
        </div>
    </div>

    <!-- Dashboard Body -->
    <div id="dashboard-body" hx-get="{% url 'reports:dashboard' %}?period=today" hx-trigger="load">
        <!-- Initial loading state -->
        <div class="flex items-center justify-center py-20">
            <div class="w-8 h-8 border-4 border-t-transparent rounded-full animate-spin" style="border-color: #e1b382"></div>
        </div>
    </div>
</div>
{% endblock %}

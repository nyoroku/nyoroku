{% extends 'base.html' %}
{% block content %}
<div class="max-w-5xl mx-auto px-4 py-6">
  <h1 class="text-2xl font-bold mb-4" style="color: var(--primary-dark)">Promotion Effectiveness</h1>
  <div class="bg-white rounded-2xl border border-border overflow-hidden">
    <table class="w-full text-sm"><thead><tr class="border-b border-border"><th class="px-4 py-3 text-xs font-semibold text-text-secondary uppercase text-left">Promotion</th><th class="px-4 py-3 text-xs font-semibold text-text-secondary uppercase text-right">Qty Sold</th><th class="px-4 py-3 text-xs font-semibold text-text-secondary uppercase text-right">Revenue</th></tr></thead>
    <tbody>{% for d in promo_lines %}<tr class="border-b border-border/50"><td class="px-4 py-3 font-medium">{{ d.promotion__name }}</td><td class="px-4 py-3 text-right font-mono">{{ d.promo_qty|floatformat:0 }}</td><td class="px-4 py-3 text-right font-mono font-bold">KES {{ d.promo_revenue|floatformat:0 }}</td></tr>{% empty %}<tr><td colspan="3" class="px-4 py-8 text-center text-text-secondary">No promotional sales in this period</td></tr>{% endfor %}</tbody>
    </table>
  </div>
</div>
{% endblock %}

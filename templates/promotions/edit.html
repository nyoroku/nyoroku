{% extends 'base.html' %}
{% block content %}
<div class="max-w-4xl mx-auto px-4 py-6">
  <h1 class="text-2xl font-bold mb-4" style="color: var(--primary-dark)">Edit Promotion</h1>
  <div class="bg-white rounded-2xl border border-border p-6">
    <form method="POST" class="space-y-4">
      {% csrf_token %}
      <div><label class="text-xs font-semibold text-text-secondary uppercase mb-1 block">Name</label><input type="text" name="name" value="{{ promo.name }}" class="w-full px-4 py-3 rounded-xl border border-border text-sm"></div>
      <div><label class="text-xs font-semibold text-text-secondary uppercase mb-1 block">Type</label>
        <select name="promo_type" class="w-full px-4 py-3 rounded-xl border border-border text-sm">
          {% for val, label in promo_types %}<option value="{{ val }}" {% if promo.promo_type == val %}selected{% endif %}>{{ label }}</option>{% endfor %}
        </select>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div><label class="text-xs font-semibold text-text-secondary uppercase mb-1 block">Buy Qty</label><input type="number" name="buy_qty" value="{{ promo.buy_qty|default:'' }}" class="w-full px-4 py-3 rounded-xl border border-border text-sm font-mono"></div>
        <div><label class="text-xs font-semibold text-text-secondary uppercase mb-1 block">Free Qty</label><input type="number" name="free_qty" value="{{ promo.free_qty|default:'' }}" class="w-full px-4 py-3 rounded-xl border border-border text-sm font-mono"></div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div><label class="text-xs font-semibold text-text-secondary uppercase mb-1 block">Deal Qty</label><input type="number" name="deal_qty" value="{{ promo.deal_qty|default:'' }}" class="w-full px-4 py-3 rounded-xl border border-border text-sm font-mono"></div>
        <div><label class="text-xs font-semibold text-text-secondary uppercase mb-1 block">Deal Price</label><input type="number" name="deal_price" value="{{ promo.deal_price|default:'' }}" step="0.01" class="w-full px-4 py-3 rounded-xl border border-border text-sm font-mono"></div>
      </div>
      <div><label class="text-xs font-semibold text-text-secondary uppercase mb-1 block">Discount %</label><input type="number" name="discount_pct" value="{{ promo.discount_pct|default:'' }}" step="0.01" class="w-full px-4 py-3 rounded-xl border border-border text-sm font-mono"></div>
      <div><label class="text-xs font-semibold text-text-secondary uppercase mb-1 block">Discount Amount</label><input type="number" name="discount_amount" value="{{ promo.discount_amount|default:'' }}" step="0.01" class="w-full px-4 py-3 rounded-xl border border-border text-sm font-mono"></div>
      <div class="grid grid-cols-2 gap-3">
        <div><label class="text-xs font-semibold text-text-secondary uppercase mb-1 block">Start</label><input type="datetime-local" name="start_date" value="{{ promo.start_date|date:'Y-m-d\TH:i' }}" class="w-full px-4 py-3 rounded-xl border border-border text-sm"></div>
        <div><label class="text-xs font-semibold text-text-secondary uppercase mb-1 block">End</label><input type="datetime-local" name="end_date" value="{{ promo.end_date|date:'Y-m-d\TH:i' }}" class="w-full px-4 py-3 rounded-xl border border-border text-sm"></div>
      </div>
      <button type="submit" class="btn btn-primary w-full text-sm">Update Promotion</button>
    </form>
  </div>
</div>
{% endblock %}

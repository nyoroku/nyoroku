{% extends 'base.html' %}
{% block content %}
<div class="max-w-4xl mx-auto px-4 py-6">
  <h1 class="text-2xl font-bold mb-4" style="color: var(--primary-dark)">Create Promotion</h1>
  <div class="bg-white rounded-2xl border border-border p-6">
    <form method="POST" class="space-y-4">
      {% csrf_token %}
      <div><label class="text-xs font-semibold text-text-secondary uppercase mb-1 block">Name *</label><input type="text" name="name" required class="w-full px-4 py-3 rounded-xl border border-border text-sm"></div>
      <div><label class="text-xs font-semibold text-text-secondary uppercase mb-1 block">Type *</label>
        <select name="promo_type" required class="w-full px-4 py-3 rounded-xl border border-border text-sm" id="promo-type" onchange="togglePromoFields()">
          {% for val, label in promo_types %}<option value="{{ val }}">{{ label }}</option>{% endfor %}
        </select>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div><label class="text-xs font-semibold text-text-secondary uppercase mb-1 block">Product</label><select name="product_id" class="w-full px-4 py-3 rounded-xl border border-border text-sm"><option value="">Any product...</option>{% for p in products %}<option value="{{ p.pk }}">{{ p.name }}</option>{% endfor %}</select></div>
        <div><label class="text-xs font-semibold text-text-secondary uppercase mb-1 block">Category</label><select name="category_id" class="w-full px-4 py-3 rounded-xl border border-border text-sm"><option value="">Any category...</option>{% for c in categories %}<option value="{{ c.pk }}">{{ c.name }}</option>{% endfor %}</select></div>
      </div>
      <div id="bogof-fields" class="grid grid-cols-2 gap-3">
        <div><label class="text-xs font-semibold text-text-secondary uppercase mb-1 block">Buy Qty</label><input type="number" name="buy_qty" class="w-full px-4 py-3 rounded-xl border border-border text-sm font-mono"></div>
        <div><label class="text-xs font-semibold text-text-secondary uppercase mb-1 block">Get Free Qty</label><input type="number" name="free_qty" class="w-full px-4 py-3 rounded-xl border border-border text-sm font-mono"></div>
      </div>
      <div id="multi-fields" class="grid grid-cols-2 gap-3 hidden">
        <div><label class="text-xs font-semibold text-text-secondary uppercase mb-1 block">Deal Qty</label><input type="number" name="deal_qty" class="w-full px-4 py-3 rounded-xl border border-border text-sm font-mono"></div>
        <div><label class="text-xs font-semibold text-text-secondary uppercase mb-1 block">Deal Price (KES)</label><input type="number" name="deal_price" step="0.01" class="w-full px-4 py-3 rounded-xl border border-border text-sm font-mono"></div>
      </div>
      <div id="pct-field" class="hidden"><label class="text-xs font-semibold text-text-secondary uppercase mb-1 block">Discount %</label><input type="number" name="discount_pct" step="0.01" class="w-full px-4 py-3 rounded-xl border border-border text-sm font-mono"></div>
      <div id="fixed-field" class="hidden"><label class="text-xs font-semibold text-text-secondary uppercase mb-1 block">Discount Amount (KES)</label><input type="number" name="discount_amount" step="0.01" class="w-full px-4 py-3 rounded-xl border border-border text-sm font-mono"></div>
      <div class="grid grid-cols-2 gap-3">
        <div><label class="text-xs font-semibold text-text-secondary uppercase mb-1 block">Start Date *</label><input type="datetime-local" name="start_date" required class="w-full px-4 py-3 rounded-xl border border-border text-sm"></div>
        <div><label class="text-xs font-semibold text-text-secondary uppercase mb-1 block">End Date *</label><input type="datetime-local" name="end_date" required class="w-full px-4 py-3 rounded-xl border border-border text-sm"></div>
      </div>
      <button type="submit" class="btn btn-primary w-full text-sm">Create Promotion</button>
    </form>
  </div>
</div>
<script>
function togglePromoFields() {
  const t = document.getElementById('promo-type').value;
  document.getElementById('bogof-fields').classList.toggle('hidden', t !== 'bogof');
  document.getElementById('multi-fields').classList.toggle('hidden', t !== 'multi_unit');
  document.getElementById('pct-field').classList.toggle('hidden', t !== 'pct_discount');
  document.getElementById('fixed-field').classList.toggle('hidden', t !== 'fixed_discount');
}
</script>
{% endblock %}

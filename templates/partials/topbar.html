<header class="sticky top-0 z-40 w-full bg-white border-b border-border safe-top">
  <div class="flex items-center justify-between px-4 h-14">
    <div class="flex items-center gap-3">
      <!-- Menu Trigger -->
      <button @click="sidebarOpen = true" class="w-9 h-9 flex items-center justify-center rounded-xl active:scale-90 transition-all" style="background: #2d545e; color: white;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="14" y1="6" y2="6"/><line x1="4" x2="18" y1="18" y2="18"/></svg>
      </button>
    </div>

    <!-- Desktop Navigation -->
    <nav class="hidden md:flex items-center gap-1 p-1 rounded-xl" style="background: #12343b">
      <a href="{% url 'pos:index' %}" class="px-4 py-2 rounded-lg text-xs font-semibold transition-all {% if request.resolver_match.app_name == 'pos' %}" style="background:#e1b382;color:#12343b"{% else %}text-white/70 hover:text-white hover:bg-white/10{% endif %}">Sales</a>
      <a href="{% url 'catalogue:inventory' %}" class="px-4 py-2 rounded-lg text-xs font-semibold transition-all {% if request.resolver_match.app_name == 'catalogue' %}" style="background:#e1b382;color:#12343b"{% else %}text-white/70 hover:text-white hover:bg-white/10{% endif %}">Inventory</a>
      <a href="{% url 'expenses:list' %}" class="px-4 py-2 rounded-lg text-xs font-semibold transition-all {% if request.resolver_match.app_name == 'expenses' %}" style="background:#e1b382;color:#12343b"{% else %}text-white/70 hover:text-white hover:bg-white/10{% endif %}">Expenses</a>
    </nav>

    <div class="flex items-center gap-2">
       <span class="font-medium text-sm hidden sm:block" style="color: #2d545e">{{ user.name }}</span>
       <div class="w-8 h-8 rounded-full flex items-center justify-center text-sm" style="background: #e1b38233; border: 1px solid #e1b38255">
          {{ user.avatar|default:"👤" }}
       </div>
    </div>
  </div>
</header>

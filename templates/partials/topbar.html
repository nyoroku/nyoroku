<header class="sticky top-0 z-40 w-full bg-surface/80 backdrop-blur-md border-b border-white/[0.05] safe-top">
  <div class="flex items-center justify-between px-4 h-14">
    <div class="flex items-center gap-3">
      <span class="font-display font-extrabold text-xl text-text-primary">
        {% block screen_title %}Eli Collection{% endblock %}
      </span>
    </div>

    <div class="flex items-center gap-4">
      <div class="relative" x-data="{ open: false }">
        <button @click="open = !open" class="w-8 h-8 rounded-full bg-surface2 border border-border flex items-center justify-center text-lg active:scale-95 transition-transform overflow-hidden">
          {{ user.avatar|default:"👤" }}
        </button>
        
        <!-- Sign out dropdown -->
        <div x-show="open" @click.away="open = false" x-cloak
             class="absolute right-0 mt-2 w-48 bg-surface2 border border-border rounded-xl shadow-2xl py-2 z-50">
          <div class="px-4 py-2 border-b border-border mb-2">
            <p class="text-xs text-text-muted font-medium mb-0.5">Signed in as</p>
            <p class="text-sm font-bold text-text-primary">{{ user.name }}</p>
          </div>
          <a href="{% url 'accounts:logout' %}" class="flex items-center gap-3 px-4 py-2 text-sm text-brand-red font-bold hover:bg-white/[0.03] transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Sign Out
          </a>
        </div>
      </div>
    </div>
  </div>
</header>

<style>
  .safe-top { padding-top: env(safe-area-inset-top); }
</style>

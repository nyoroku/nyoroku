<header class="sticky top-0 z-40 w-full bg-white border-b border-border safe-top">
  <div class="flex items-center justify-between px-4 h-14">
    <div class="flex items-center gap-3">
      <!-- Menu Trigger -->
      <button @click="sidebarOpen = true" class="w-9 h-9 flex items-center justify-center bg-bg-main border border-border rounded-xl text-text-secondary active:scale-90 transition-all hover:border-primary/30">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="14" y1="6" y2="6"/><line x1="4" x2="18" y1="18" y2="18"/></svg>
      </button>

      <span class="font-bold text-lg text-text-primary hidden sm:block tracking-tight">
        {% block screen_title %}Eli Collection{% endblock %}
      </span>
    </div>

    <!-- Desktop Navigation -->
    <nav class="hidden md:flex items-center gap-1 bg-bg-main border border-border p-1 rounded-xl">
      <a href="{% url 'pos:index' %}" class="px-4 py-2 rounded-lg text-xs font-semibold transition-all {% if request.resolver_match.app_name == 'pos' %}bg-primary text-white{% else %}text-text-secondary hover:bg-hover hover:text-text-primary{% endif %}">Sales</a>
      <a href="{% url 'catalogue:inventory' %}" class="px-4 py-2 rounded-lg text-xs font-semibold transition-all {% if request.resolver_match.app_name == 'catalogue' %}bg-primary text-white{% else %}text-text-secondary hover:bg-hover hover:text-text-primary{% endif %}">Inventory</a>
      <a href="{% url 'expenses:list' %}" class="px-4 py-2 rounded-lg text-xs font-semibold transition-all {% if request.resolver_match.app_name == 'expenses' %}bg-primary text-white{% else %}text-text-secondary hover:bg-hover hover:text-text-primary{% endif %}">Expenses</a>
    </nav>

    <div class="flex items-center gap-2">
       <span class="font-medium text-sm text-text-secondary hidden sm:block">{{ user.name }}</span>
       <div class="w-8 h-8 rounded-full bg-primary/10 border border-primary/20 flex items-center justify-center text-sm">
          {{ user.avatar|default:"👤" }}
       </div>
    </div>
  </div>
</header>

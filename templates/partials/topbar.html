<header class="sticky top-0 z-40 w-full safe-top" style="background: #2d545e">
  <div class="flex items-center justify-between px-4 h-14">
    <div class="flex items-center gap-3">
      <button @click="sidebarOpen = true" class="w-9 h-9 flex items-center justify-center rounded-xl active:scale-90 transition-all" style="background: rgba(255,255,255,0.15); color: white;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="14" y1="6" y2="6"/><line x1="4" x2="18" y1="18" y2="18"/></svg>
      </button>
    </div>

    <!-- Desktop Navigation -->
    <nav class="hidden md:flex items-center gap-1 p-1 rounded-xl" style="background: #12343b">
      <a href="{% url 'pos:index' %}" class="px-4 py-2 rounded-lg text-xs font-semibold transition-all no-underline {% if request.resolver_match.app_name == 'pos' %}" style="background:#2d545e;color:#e1b382"{% else %}" style="color:rgba(255,255,255,0.7)"{% endif %}>Sales</a>
      <a href="{% url 'catalogue:inventory' %}" class="px-4 py-2 rounded-lg text-xs font-semibold transition-all no-underline {% if request.resolver_match.app_name == 'catalogue' %}" style="background:#2d545e;color:#e1b382"{% else %}" style="color:rgba(255,255,255,0.7)"{% endif %}>Inventory</a>
      <a href="{% url 'expenses:list' %}" class="px-4 py-2 rounded-lg text-xs font-semibold transition-all no-underline {% if request.resolver_match.app_name == 'expenses' %}" style="background:#2d545e;color:#e1b382"{% else %}" style="color:rgba(255,255,255,0.7)"{% endif %}>Expenses</a>
    </nav>

    <div class="flex items-center gap-2">
       <span class="font-medium text-sm hidden sm:block" style="color: #e1b382">{{ user.name }}</span>
       <div class="w-8 h-8 rounded-full flex items-center justify-center text-sm" style="background: rgba(225,179,130,0.2); border: 1px solid rgba(225,179,130,0.3)">
          {{ user.avatar|default:"👤" }}
       </div>
    </div>
  </div>
</header>

<div class="space-y-5">
    <!-- Hidden sync inputs -->
    <input type="hidden" name="options_json" :value="editForm.rawOptions_json">
    <input type="hidden" name="variants_json" :value="editForm.rawVariants_json">

    <!-- Option Definitions -->
    <div class="bg-white border p-5 rounded-2xl space-y-4" style="border-color: #E5E7EB">
        <div class="flex justify-between items-center mb-1">
            <h4 class="text-[10px] font-semibold uppercase tracking-wider" style="color: #12343b">Product Options</h4>
            <button type="button" @click="addOption()" class="px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase transition-colors"
                    style="background: #e1b38222; color: #c89666; border: 1px solid #e1b38244"
                    onmouseover="this.style.background='#e1b38244'" onmouseout="this.style.background='#e1b38222'"
            >+ Add Option</button>
        </div>
        
        <div class="space-y-3">
            <template x-for="(opt, oIndex) in editForm.options" :key="oIndex">
                <div class="p-4 rounded-xl border relative group" style="background: #F8F9FB; border-color: #E5E7EB">
                    <button type="button" @click="removeOption(oIndex)" class="absolute -right-2 -top-2 w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold shadow-md transition-opacity"
                            style="background: #DC2626; color: white">✕</button>
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                        <div class="sm:col-span-1">
                            <label class="block text-[10px] font-semibold uppercase tracking-wider mb-1.5" style="color: #6B7280">Option Name</label>
                            <input type="text" x-model="opt.name" @input="generateVariants()" placeholder="e.g. Size, Color" 
                                   class="w-full rounded-lg px-3 py-2 text-sm font-medium focus:outline-none focus:ring-2"
                                   style="background: white; border: 1px solid #E5E7EB; color: #12343b; --tw-ring-color: #2d545e">
                        </div>
                        <div class="sm:col-span-2">
                            <label class="block text-[10px] font-semibold uppercase tracking-wider mb-1.5" style="color: #6B7280">Values (Comma separated)</label>
                            <input type="text" x-model="opt.rawValues" @input="updateValues(oIndex)" placeholder="e.g. S, M, L" 
                                   class="w-full rounded-lg px-3 py-2 text-sm font-medium focus:outline-none focus:ring-2"
                                   style="background: white; border: 1px solid #E5E7EB; color: #12343b; --tw-ring-color: #2d545e">
                            <div class="flex flex-wrap gap-2 mt-2">
                                <template x-for="val in opt.values" :key="val">
                                    <span class="px-2 py-1 rounded border text-[10px] font-semibold" style="background: white; border-color: #E5E7EB; color: #6B7280" x-text="val"></span>
                                </template>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
            <div x-show="editForm.options.length === 0" class="text-center py-5 text-xs italic rounded-xl" style="background: #F8F9FB; border: 1px dashed #E5E7EB; color: #9CA3AF">
                No options defined. Add "Color" or "Size" to automatically generate variants.
            </div>
        </div>
    </div>

    <!-- Variants List / Manager -->
    <div x-show="editForm.variants.length > 0" x-transition.opacity class="space-y-3">
        <div class="flex justify-between items-center px-1">
            <h4 class="text-[10px] font-semibold uppercase tracking-wider" style="color: #12343b">Preview &amp; Inventory</h4>
            <button type="button" @click="addManualVariant()" class="px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase transition-colors"
                    style="background: #2d545e15; color: #2d545e; border: 1px solid #2d545e33">
                + Add Manual Variant
            </button>
        </div>

        <div class="overflow-hidden rounded-2xl border" style="background: white; border-color: #E5E7EB">
            <div class="overflow-x-auto" style="scrollbar-width: none">
                <table class="w-full text-left border-collapse min-w-[500px]">
                    <thead>
                        <tr class="border-b" style="background: #F8F9FB; border-color: #E5E7EB">
                            <th class="px-4 py-3 text-[10px] font-semibold uppercase tracking-wider" style="color: #6B7280">Variant</th>
                            <th class="px-4 py-3 text-[10px] font-semibold uppercase tracking-wider w-28" style="color: #6B7280">Price (KES)</th>
                            <th class="px-4 py-3 text-[10px] font-semibold uppercase tracking-wider w-24" style="color: #6B7280">Stock</th>

                        </tr>
                    </thead>
                    <tbody class="divide-y" style="border-color: #E5E7EB">
                        <template x-for="(v, index) in editForm.variants" :key="index">
                            <tr class="hover:bg-gray-50 transition-colors">
                                <td class="px-4 py-3">
                                    <span class="text-sm font-bold block" style="color: #12343b" x-text="variantLabel(v)"></span>
                                </td>
                                <td class="px-4 py-3">
                                    <input type="number" step="0.01" x-model="v.price" :placeholder="editForm.price" 
                                           class="w-full bg-transparent border-none p-0 text-sm font-bold focus:ring-0" style="color: #2d545e">
                                </td>
                                <td class="px-4 py-3">
                                    <input type="number" x-model="v.stock_qty" 
                                           class="w-full bg-transparent border-none p-0 text-sm font-bold focus:ring-0" style="color: #6B7280">
                                </td>

                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

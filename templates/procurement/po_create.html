{% extends 'base.html' %}
{% load static %}

{% block screen_title %}Create Purchase Order{% endblock %}

{% block content %}
<div class="px-6 py-12 max-w-2xl mx-auto animate-fade-in">

    <!-- Breadcrumbs -->
    <div class="flex justify-center mb-8">
        <nav class="flex" aria-label="Breadcrumb">
            <ol class="inline-flex items-center space-x-1 md:space-x-3">
                <li><a href="{% url 'procurement:po_list' %}" class="text-text-muted hover:text-brand-whatsapp text-[10px] font-bold uppercase tracking-widest transition-colors">Procurement</a></li>
                <li>
                    <div class="flex items-center">
                        <svg class="w-3 h-3 text-text-muted mx-1" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 6 10"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 9 4-4-4-4"/></svg>
                        <span class="ml-1 text-brand-whatsapp text-[10px] font-bold uppercase tracking-widest">New Order</span>
                    </div>
                </li>
            </ol>
        </nav>
    </div>

    <!-- Header -->
    <div class="text-center mb-12">
        <h1 class="font-display font-800 text-5xl text-white tracking-tight leading-none mb-4">Initialize nexus PO</h1>
        <p class="text-text-muted font-medium text-lg">Define your procurement cycle origin</p>
    </div>

    <!-- Form Card -->
    <div class="bg-surface2 border border-white/[0.04] p-12 rounded-[48px] shadow-card relative overflow-hidden group">
        <div class="absolute inset-0 bg-brand-whatsapp/[0.01] pointer-events-none"></div>
        
        <form method="POST" action="{% url 'procurement:po_create' %}" class="space-y-10 relative z-10">
            {% csrf_token %}
            
            <div class="space-y-6">
                <div>
                    <label for="supplier_id" class="block text-[11px] font-display font-800 text-text-muted uppercase tracking-[0.4em] mb-4 ml-1">Lifecycle Origin (Vendor)</label>
                    <div class="relative">
                        <select name="supplier_id" id="supplier_id" required
                                class="w-full bg-surface3 border-2 border-white/[0.04] rounded-[28px] py-6 px-10 text-xl font-bold text-white focus:border-brand-whatsapp/40 focus:ring-8 focus:ring-brand-whatsapp/5 outline-none transition-all appearance-none cursor-pointer shadow-inner">
                            <option value="" disabled selected>-- Select Vendor Stream --</option>
                            {% for supplier in suppliers %}
                            <option value="{{ supplier.id }}">{{ supplier.name }}</option>
                            {% endfor %}
                        </select>
                        <div class="absolute right-10 top-1/2 -translate-y-1/2 pointer-events-none text-brand-whatsapp group-focus-within:rotate-180 transition-all">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                        </div>
                    </div>
                </div>
            </div>

            <div class="pt-8">
                <button type="submit" 
                        class="w-full h-20 bg-brand-whatsapp text-white rounded-[32px] font-display font-800 text-[18px] uppercase tracking-widest flex items-center justify-center gap-6 transition-all active:scale-[0.98] shadow-[0_16px_60px_rgba(37,211,102,0.4)] hover:brightness-110 group">
                    Start Cycle
                    <div class="w-10 h-10 rounded-xl bg-white/20 flex items-center justify-center transition-transform group-hover:translate-x-1">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                    </div>
                </button>
                <div class="mt-10 text-center">
                    <a href="{% url 'procurement:po_list' %}" class="inline-flex items-center gap-3 text-[10px] font-bold text-text-muted uppercase tracking-[0.3em] hover:text-white transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                        Exit Operation
                    </a>
                </div>
            </div>
        </form>
    </div>

</div>
{% endblock %}

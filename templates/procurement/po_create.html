{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="px-4 py-6 max-w-lg mx-auto">

    <!-- Header -->
    <div class="flex items-center gap-3 mb-6">
        <a href="{% url 'procurement:po_list' %}" class="w-10 h-10 rounded-xl flex items-center justify-center no-underline active:scale-90 transition-all"
           style="background: #F8F9FB; border: 1px solid #E5E7EB; color: #2d545e">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg>
        </a>
        <div>
            <h1 class="text-xl font-bold" style="color: #12343b">New Purchase Order</h1>
            <p class="text-sm" style="color: #6B7280">Select a supplier to begin</p>
        </div>
    </div>

    <!-- Form Card -->
    <div class="rounded-2xl p-6" style="background: white; border: 1px solid #E5E7EB">
        <form method="POST" action="{% url 'procurement:po_create' %}" class="space-y-5">
            {% csrf_token %}
            
            <div>
                <div class="flex items-center justify-between mb-1.5">
                    <label class="text-xs font-semibold uppercase tracking-wider" style="color: #6B7280">Supplier</label>
                    <a href="{% url 'procurement:supplier_list' %}" class="text-xs font-semibold no-underline" style="color: #c89666">+ New Supplier</a>
                </div>
                <select name="supplier_id" required class="w-full rounded-xl px-4 py-3.5 text-base font-medium focus:outline-none"
                        style="background: #F8F9FB; border: 1px solid #E5E7EB; color: #12343b">
                    <option value="" disabled selected>Select supplier...</option>
                    {% for supplier in suppliers %}
                    <option value="{{ supplier.id }}">{{ supplier.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit" class="w-full h-12 rounded-xl font-semibold text-base transition-all active:scale-95 shadow-md flex items-center justify-center gap-2"
                    style="background: #2d545e; color: #e1b382; border: none; cursor: pointer">
                Start Order
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
            </button>
        </form>
    </div>
</div>
{% endblock %}

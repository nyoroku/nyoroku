{% extends 'base.html' %}
{% load static %}

{% block screen_title %}Buy Stock{% endblock %}

{% block content %}
<div class="px-6 py-8 max-w-7xl mx-auto animate-fade-in" x-data="{
    supplierId: '',
    items: [],
    searchQuery: '',
    showNewSupplier: false,
    newSupplier: { name: '', phone: '' },
    
    // Variant Selection
    view: 'listing', // 'listing' or 'sku'
    selectedProduct: null,
    productVariants: [],

    async selectProduct(p) {
        this.selectedProduct = p;

        if (!p.has_variants) {
            // Decent Flow: Add directly to bag
            this.addToBag(p.id, null, p.name, p.image, parseFloat(p.cost_price || 0), 1);
            return;
        }
        
        // Variant flow: Fetch and open list
        const resp = await fetch(`/procurement/get-variants/${p.id}/`);
        const data = await resp.json();
        this.productVariants = data.map(v => ({ 
            ...v, 
            qty: 0, 
            edit_cost: parseFloat(v.cost_price || 0) 
        }));
        this.view = 'sku';
    },

    addToBag(prodId, varId, name, image, cost, qty) {
        const finalCost = parseFloat(cost || 0);
        const finalQty = Number(qty || 1);
        
        let ex = this.items.find(i => String(i.product_id) === String(prodId) && String(i.variant_id) === String(varId));
        if (ex) {
            ex.qty = Number(ex.qty) + finalQty;
            ex.unit_cost = finalCost;
            ex.total_cost = (ex.qty * finalCost).toFixed(2);
        } else {
            this.items.push({
                product_id: prodId,
                variant_id: varId,
                name: name,
                image: image,
                qty: finalQty,
                unit_cost: finalCost,
                total_cost: (finalQty * finalCost).toFixed(2)
            });
        }
    },

    addVariantsToCart() {
        this.productVariants.forEach(v => {
            if (Number(v.qty) > 0) {
                this.addToBag(this.selectedProduct.id, v.id, v.name, this.selectedProduct.image, v.edit_cost, v.qty);
            }
        });
        this.view = 'listing';
    },

    removeItem(idx) {
        this.items.splice(idx, 1);
    },
    get orderTotal() {
        return this.items.reduce((s, i) => s + parseFloat(i.total_cost), 0).toFixed(2);
    },
    get modalTotalQty() {
        return this.productVariants.reduce((s, v) => s + (Number(v.qty) || 0), 0);
    },

    async submitOrder() {
        if (!this.supplierId) {
            alert('Please select a supplier first.');
            return;
        }
        if (this.items.length === 0) {
            alert('Order bag is empty.');
            return;
        }
        
        const fd = new FormData();
        fd.append('supplier_id', this.supplierId);
        fd.append('items_json', JSON.stringify(this.items));
        
        const resp = await fetch('{% url "procurement:buy_stock" %}', {
            method: 'POST',
            body: fd,
            headers: { 'X-CSRFToken': '{{ csrf_token }}' }
        });
        
        if (resp.redirected) {
            window.location.href = resp.url;
        } else {
            const data = await resp.json();
            if (data.error) alert(data.error);
        }
    }
}">

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
        
        <!-- Header -->
        <div class="lg:col-span-12 mb-4">
            <div class="flex flex-col md:flex-row md:items-end justify-between gap-6">
                <div>
                    <h1 class="font-display font-800 text-6xl text-white tracking-tight leading-none">Buy New Stock</h1>
                    <div class="flex items-center gap-3 mt-4">
                        <span class="w-2 h-2 rounded-full bg-brand-whatsapp animate-pulse"></span>
                        <p class="text-text-muted font-bold text-[11px] uppercase tracking-[0.3em]">Supply Management</p>
                    </div>
                </div>
                <a href="{% url 'procurement:po_list' %}" class="h-14 px-8 glass border border-white/[0.04] text-text-muted rounded-2xl font-display font-800 text-[11px] uppercase tracking-widest flex items-center gap-3 transition-all hover:text-white">
                    Stock History
                </a>
            </div>
        </div>

        <!-- Left Column: Browsing -->
        <div class="lg:col-span-12 xl:col-span-7 space-y-8">
            
            <!-- Supplier Section -->
            <div class="glass-strong p-8 rounded-[40px] shadow-2xl relative overflow-hidden group">
                <div class="flex items-center justify-between mb-8">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-xl bg-brand-whatsapp/10 border border-brand-whatsapp/20 flex items-center justify-center text-brand-whatsapp">
                            <span class="font-display font-800 text-xs text-brand-whatsapp">01</span>
                        </div>
                        <p class="text-[10px] font-bold text-white uppercase tracking-[0.4em]">Supplier</p>
                    </div>
                    <button @click="showNewSupplier = !showNewSupplier" class="text-[10px] font-bold uppercase tracking-widest text-brand-whatsapp">
                        <span x-text="showNewSupplier ? 'Cancel' : '+ Add New Supplier'"></span>
                    </button>
                </div>

                <div x-show="!showNewSupplier">
                    <select x-model="supplierId" class="w-full h-16 bg-white/[0.02] border border-white/[0.04] rounded-2xl px-8 text-white font-bold outline-none focus:border-brand-whatsapp/40 transition-all appearance-none">
                        <option value="" class="bg-surface2">-- Select Supplier --</option>
                        {% for s in suppliers %}
                        <option value="{{ s.id }}" class="bg-surface2">{{ s.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div x-show="showNewSupplier" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                     <input type="text" x-model="newSupplier.name" placeholder="Supplier Name" class="w-full h-14 bg-white/[0.02] border border-white/[0.04] rounded-2xl px-6 text-white text-sm outline-none">
                     <input type="text" x-model="newSupplier.phone" placeholder="Phone" class="w-full h-14 bg-white/[0.02] border border-white/[0.04] rounded-2xl px-6 text-white text-sm outline-none">
                     <button @click="async () => {
                        if(!newSupplier.name) return;
                        const fd = new FormData(); fd.append('name', newSupplier.name); fd.append('phone', newSupplier.phone);
                        await fetch('{% url 'procurement:supplier_create' %}', { method: 'POST', body: fd, headers: { 'X-CSRFToken': '{{ csrf_token }}' } });
                        window.location.reload();
                     }" class="md:col-span-2 h-14 bg-brand-whatsapp text-white rounded-2xl font-bold uppercase text-xs">Create & Select</button>
                </div>
            </div>

            <!-- Product Search -->
            <div class="space-y-6">
                <div class="relative">
                    <input type="text" x-model="searchQuery" placeholder="Search or Scan Item..." class="w-full h-18 bg-white/[0.02] border border-white/[0.04] rounded-3xl px-14 text-white font-medium outline-none focus:border-brand-whatsapp/40">
                    <div class="absolute left-6 top-1/2 -translate-y-1/2 text-brand-whatsapp opacity-40">
                         <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 pb-20">
                    {% for p in products %}
                    <template x-if="'{{ p.name|lower }}'.includes(searchQuery.toLowerCase()) || '{{ p.barcode|default:'' }}' === searchQuery">
                        <div @click="selectProduct({ id: '{{ p.id }}', name: '{{ p.name|escapejs }}', cost_price: '{{ p.cost_price|default:0 }}', image: '{{ p.image|escapejs }}', has_variants: {% if p.has_variants %}true{% else %}false{% endif %} })"
                             class="p-6 glass border border-white/[0.04] rounded-[32px] hover:border-brand-whatsapp/30 cursor-pointer active:scale-[0.98] transition-all flex items-center gap-4">
                             <div class="text-3xl" x-text="'{{ p.image|escapejs }}'"></div>
                             <div>
                                 <div class="font-bold text-white text-lg leading-none mb-1">{{ p.name }}</div>
                                 <div class="text-xs font-bold text-brand-whatsapp uppercase">KES {{ p.cost_price|default:0 }}</div>
                             </div>
                        </div>
                    </template>
                    {% endfor %}
                </div>
            </div>
        </div>

        <!-- Right Column: Order Bag -->
        <div class="lg:col-span-12 xl:col-span-5 sticky top-24">
            <div class="glass-strong rounded-[48px] overflow-hidden flex flex-col max-h-[80vh]">
                <div class="p-8 border-b border-white/[0.04] flex items-center justify-between">
                    <h2 class="font-display font-800 text-2xl text-white">Order Bag</h2>
                    <span class="text-xs text-text-muted" x-text="items.length + ' types'"></span>
                </div>

                <div class="flex-grow overflow-y-auto p-6 space-y-4 no-scrollbar">
                    <template x-for="(item, index) in items" :key="index">
                        <div class="bg-white/[0.02] border border-white/[0.04] p-5 rounded-[28px] space-y-4">
                             <div class="flex items-center justify-between">
                                 <div class="flex items-center gap-3 min-w-0">
                                     <span class="text-xl" x-text="item.image"></span>
                                     <h4 class="font-bold text-white truncate" x-text="item.name"></h4>
                                 </div>
                                 <button @click="removeItem(index)" class="text-text-muted hover:text-brand-red p-2">✕</button>
                             </div>
                             <div class="flex items-center justify-between gap-4">
                                 <div class="flex flex-col">
                                     <span class="text-[9px] text-white/40 uppercase mb-1">Unit Cost</span>
                                     <input type="number" x-model.number="item.unit_cost" @input="item.total_cost = (item.qty * item.unit_cost).toFixed(2)" class="w-24 bg-black/20 border-none rounded-xl px-3 py-2 text-brand-whatsapp font-bold outline-none">
                                 </div>
                                 <div class="flex flex-col items-end">
                                     <span class="text-[9px] text-white/40 uppercase mb-1">Quantity</span>
                                     <div class="flex items-center bg-black/30 rounded-xl p-1">
                                         <button @click="if(item.qty > 1) { item.qty--; item.total_cost = (item.qty * item.unit_cost).toFixed(2); }" class="w-8 h-8 text-text-muted">－</button>
                                         <input type="number" x-model.number="item.qty" @input="item.total_cost = (item.qty * item.unit_cost).toFixed(2)" class="w-10 bg-transparent text-center text-white font-bold outline-none">
                                         <button @click="item.qty++; item.total_cost = (item.qty * item.unit_cost).toFixed(2);" class="w-8 h-8 text-brand-whatsapp">＋</button>
                                     </div>
                                 </div>
                             </div>
                        </div>
                    </template>
                    <template x-if="items.length === 0">
                        <div class="py-20 text-center opacity-20 font-bold uppercase tracking-widest text-xs">Bag is empty</div>
                    </template>
                </div>

                <div class="p-8 bg-white/[0.04] border-t border-white/[0.06]">
                    <div class="flex items-center justify-between mb-6">
                        <span class="text-text-muted font-bold uppercase text-[10px]">Total KES</span>
                        <span class="font-display font-800 text-5xl text-brand-whatsapp" x-text="orderTotal"></span>
                    </div>
                    <button @click="submitOrder()" :disabled="items.length === 0 || !supplierId" class="w-full h-20 bg-brand-whatsapp text-white rounded-[28px] font-display font-800 text-[18px] uppercase tracking-widest disabled:opacity-20 active:scale-[0.98] transition-all">
                        Complete Order
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Variant Selector Drawer (Decent & Simple) -->
    <template x-if="view === 'sku'">
        <div class="fixed inset-0 z-[100] flex justify-end">
            <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" @click="view = 'listing'"></div>
            <div class="relative w-full md:w-[450px] h-full bg-brand-whatsapp shadow-2xl flex flex-col animate-slide-in-right">
                <div class="p-10 pb-6 shrink-0 text-white text-center">
                    <p class="text-[9px] font-black uppercase tracking-[0.4em] opacity-40 mb-2">Select Variants</p>
                    <h2 class="font-display font-900 text-4xl leading-tight" x-text="selectedProduct.name"></h2>
                </div>
                <div class="flex-grow overflow-y-auto px-6 py-4 space-y-3 no-scrollbar">
                    <template x-for="v in productVariants" :key="v.id">
                        <div class="p-6 bg-white/10 rounded-[32px] border border-white/10 flex items-center justify-between gap-4">
                            <div class="flex-1 min-w-0">
                                <h4 class="font-bold text-white truncate mb-2" x-text="v.name"></h4>
                                <div class="flex items-center gap-2">
                                    <span class="text-[9px] text-white/40 font-bold uppercase">Cost:</span>
                                    <input type="number" x-model.number="v.edit_cost" class="w-24 bg-black/20 rounded-lg px-2 py-1 text-white font-bold text-xs border-none outline-none">
                                </div>
                            </div>
                            <div class="flex flex-col items-center">
                                <span class="text-[9px] text-white/40 uppercase mb-1">Pick Qty</span>
                                <input type="number" x-model.number="v.qty" class="w-16 h-12 bg-white text-brand-whatsapp rounded-xl border-none text-center font-display font-900 text-xl outline-none" placeholder="0">
                            </div>
                        </div>
                    </template>
                </div>
                <div class="p-8 bg-black/10 shrink-0">
                    <button @click="addVariantsToCart()" :disabled="modalTotalQty === 0" class="w-full h-18 bg-white text-brand-whatsapp rounded-[24px] font-display font-800 text-[14px] uppercase tracking-widest active:scale-95 transition-all">
                        Add <span x-text="modalTotalQty"></span> to Order Bag
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Mobile Subtotal Bar -->
    <template x-if="items.length > 0">
        <div class="fixed bottom-0 inset-x-0 z-[50] p-6 lg:hidden">
            <div class="bg-surface2/90 backdrop-blur-xl rounded-[40px] p-6 shadow-2xl flex items-center justify-between border border-white/5">
                <div>
                    <span class="text-[8px] text-text-muted uppercase font-bold">Total</span>
                    <div class="font-display font-800 text-3xl text-brand-whatsapp" x-text="orderTotal"></div>
                </div>
                <button @click="submitOrder()" :disabled="!supplierId" class="h-14 px-8 bg-brand-whatsapp text-white rounded-2xl font-bold uppercase text-[11px] tracking-widest shadow-glow-green-sm">
                    Complete
                </button>
            </div>
        </div>
    </template>
</div>
{% endblock %}

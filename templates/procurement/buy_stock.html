{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="px-4 py-5 max-w-5xl mx-auto pb-32" x-data="{
    supplierId: '',
    items: [],
    searchQuery: '',
    showNewSupplier: false,
    newSupplier: { name: '', phone: '' },
    view: 'listing',
    selectedProduct: null,
    productVariants: [],

    async selectProduct(p) {
        this.selectedProduct = p;
        if (!p.has_variants) {
            this.addToBag(p.id, null, p.name, p.image, parseFloat(p.cost_price || 0), 1);
            return;
        }
        const resp = await fetch(`/procurement/get-variants/${p.id}/`);
        const data = await resp.json();
        this.productVariants = data.map(v => ({ ...v, qty: 0, edit_cost: parseFloat(v.cost_price || 0) }));
        this.view = 'sku';
    },

    addToBag(prodId, varId, name, image, cost, qty) {
        const finalCost = parseFloat(cost || 0);
        const finalQty = Number(qty || 1);
        let ex = this.items.find(i => String(i.product_id) === String(prodId) && String(i.variant_id) === String(varId));
        if (ex) {
            ex.qty = Number(ex.qty) + finalQty;
            ex.unit_cost = finalCost;
            ex.total_cost = (ex.qty * finalCost).toFixed(2);
        } else {
            this.items.push({ product_id: prodId, variant_id: varId, name, image, qty: finalQty, unit_cost: finalCost, total_cost: (finalQty * finalCost).toFixed(2) });
        }
    },

    addVariantsToCart() {
        this.productVariants.forEach(v => {
            if (Number(v.qty) > 0) this.addToBag(this.selectedProduct.id, v.id, v.name, this.selectedProduct.image, v.edit_cost, v.qty);
        });
        this.view = 'listing';
    },

    removeItem(idx) { this.items.splice(idx, 1); },

    get orderTotal() { return this.items.reduce((s, i) => s + parseFloat(i.total_cost), 0).toFixed(0); },

    get modalTotalQty() { return this.productVariants.reduce((s, v) => s + (Number(v.qty) || 0), 0); },

    async submitOrder() {
        if (!this.supplierId) { alert('Please select a supplier first.'); return; }
        if (this.items.length === 0) { alert('Order bag is empty.'); return; }
        const fd = new FormData();
        fd.append('supplier_id', this.supplierId);
        fd.append('items_json', JSON.stringify(this.items));
        const resp = await fetch('{% url 'procurement:buy_stock' %}', { method: 'POST', body: fd, headers: { 'X-CSRFToken': '{{ csrf_token }}' } });
        if (resp.redirected) { window.location.href = resp.url; }
        else { const data = await resp.json(); if (data.error) alert(data.error); }
    }
}">

    <!-- Header -->
    <div class="flex items-center justify-between mb-5">
        <div>
            <h1 class="text-xl font-bold" style="color: #12343b">Buy Stock</h1>
            <p class="text-sm" style="color: #6B7280">Create a purchase order</p>
        </div>
        <a href="{% url 'procurement:po_list' %}" class="h-10 px-4 rounded-xl font-semibold text-sm flex items-center gap-2 no-underline active:scale-95 transition-all"
           style="background: #F8F9FB; color: #2d545e; border: 1px solid #E5E7EB">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            History
        </a>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-5">

        <!-- LEFT: Supplier + Products -->
        <div class="lg:col-span-2 space-y-4">

            <!-- Step 1: Supplier -->
            <div class="rounded-2xl p-5" style="background: white; border: 1px solid #E5E7EB">
                <div class="flex items-center justify-between mb-3">
                    <div class="flex items-center gap-2">
                        <span class="w-7 h-7 rounded-lg flex items-center justify-center text-xs font-bold" style="background: #2d545e; color: #e1b382">1</span>
                        <span class="text-sm font-semibold" style="color: #12343b">Choose Supplier</span>
                    </div>
                    <button @click="showNewSupplier = !showNewSupplier" class="text-xs font-semibold" style="color: #c89666; background:none; border:none; cursor:pointer">
                        <span x-text="showNewSupplier ? '← Back' : '+ New'"></span>
                    </button>
                </div>

                <div x-show="!showNewSupplier" x-transition>
                    <select x-model="supplierId" class="w-full rounded-xl px-4 py-3 text-base font-medium focus:outline-none"
                            style="background: #F8F9FB; border: 1px solid #E5E7EB; color: #12343b">
                        <option value="">— Select supplier —</option>
                        {% for s in suppliers %}
                        <option value="{{ s.id }}">{{ s.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div x-show="showNewSupplier" x-cloak x-transition>
                    <div class="flex gap-2 mb-3">
                        <input type="text" x-model="newSupplier.name" placeholder="Supplier name" class="flex-1 rounded-xl px-4 py-3 text-sm font-medium focus:outline-none"
                               style="background: #F8F9FB; border: 1px solid #E5E7EB; color: #12343b">
                        <input type="text" x-model="newSupplier.phone" placeholder="Phone" class="w-32 rounded-xl px-4 py-3 text-sm font-medium focus:outline-none"
                               style="background: #F8F9FB; border: 1px solid #E5E7EB; color: #12343b">
                    </div>
                    <button @click="async () => {
                        if(!newSupplier.name) return;
                        const fd = new FormData(); fd.append('name', newSupplier.name); fd.append('phone', newSupplier.phone);
                        await fetch('{% url 'procurement:supplier_create' %}', { method: 'POST', body: fd, headers: { 'X-CSRFToken': '{{ csrf_token }}' } });
                        window.location.reload();
                    }" class="w-full py-3 rounded-xl font-semibold text-sm active:scale-95 transition-all"
                       style="background: #e1b382; color: #12343b; border:none; cursor:pointer">
                        Create &amp; Continue
                    </button>
                </div>
            </div>

            <!-- Step 2: Products -->
            <div class="rounded-2xl overflow-hidden" style="background: white; border: 1px solid #E5E7EB">
                <div class="p-5 pb-3">
                    <div class="flex items-center gap-2 mb-3">
                        <span class="w-7 h-7 rounded-lg flex items-center justify-center text-xs font-bold" style="background: #2d545e; color: #e1b382">2</span>
                        <span class="text-sm font-semibold" style="color: #12343b">Select Products</span>
                    </div>
                    <div class="flex items-center rounded-xl overflow-hidden" style="background: #F8F9FB; border: 1px solid #E5E7EB">
                        <span class="pl-3" style="color: #9CA3AF">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        </span>
                        <input type="text" x-model="searchQuery" placeholder="Search products..."
                               class="flex-1 px-3 py-3 text-base font-medium bg-transparent border-none outline-none"
                               style="color: #12343b">
                    </div>
                </div>

                <div class="px-4 pb-4 space-y-1">
                    {% for p in products %}
                    <template x-if="'{{ p.name|lower }}'.includes(searchQuery.toLowerCase())">
                        <button @click="selectProduct({ id: '{{ p.id }}', name: '{{ p.name|escapejs }}', cost_price: '{{ p.cost_price|default:0 }}', image: '{{ p.image|escapejs }}', has_variants: {% if p.has_variants %}true{% else %}false{% endif %} })"
                                class="flex items-center gap-3 w-full text-left px-4 py-3 rounded-xl transition-all active:scale-[0.98]"
                                style="background: transparent; border: none; cursor: pointer; color: #12343b"
                                onmouseover="this.style.background='#F8F9FB'" onmouseout="this.style.background='transparent'">
                            <div class="w-10 h-10 shrink-0 rounded-xl flex items-center justify-center text-xl" style="background: #e1b38222">{{ p.image|default:"📦" }}</div>
                            <div class="flex-1 min-w-0">
                                <div class="font-semibold text-sm truncate" style="color: #12343b">{{ p.name }}</div>
                                <div class="text-xs" style="color: #6B7280">Cost: KES {{ p.cost_price|default:0|floatformat:0 }}{% if p.has_variants %} · Has variants{% endif %}</div>
                            </div>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#c89666" stroke-width="2.5"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
                        </button>
                    </template>
                    {% endfor %}
                </div>
            </div>
        </div>

        <!-- RIGHT: Order Bag -->
        <div class="lg:sticky lg:top-20">
            <div class="rounded-2xl overflow-hidden flex flex-col" style="background: white; border: 1px solid #E5E7EB; max-height: 75vh">

                <!-- Bag Header -->
                <div class="px-5 py-4 border-b flex items-center justify-between shrink-0" style="background: #2d545e; border-color: rgba(255,255,255,0.1)">
                    <h2 class="font-bold text-lg" style="color: white">Order Bag</h2>
                    <span class="text-xs font-semibold px-2.5 py-1 rounded-full" style="background: rgba(255,255,255,0.15); color: #e1b382" x-text="items.length + ' items'"></span>
                </div>

                <!-- Bag Items -->
                <div class="flex-1 overflow-auto p-4 space-y-2" style="scrollbar-width: none">
                    <template x-for="(item, index) in items" :key="index">
                        <div class="rounded-xl p-3" style="background: #F8F9FB; border: 1px solid #E5E7EB">
                            <div class="flex items-center justify-between mb-2">
                                <div class="flex items-center gap-2 min-w-0">
                                    <span class="text-lg" x-text="item.image"></span>
                                    <span class="font-semibold text-sm truncate" style="color: #12343b" x-text="item.name"></span>
                                </div>
                                <button @click="removeItem(index)" style="background:none;border:none;cursor:pointer;color:#DC2626;padding:4px">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                                </button>
                            </div>
                            <div class="flex items-center justify-between gap-3">
                                <div>
                                    <span class="text-[10px] font-semibold uppercase" style="color: #6B7280">Cost</span>
                                    <input type="number" x-model.number="item.unit_cost" @input="item.total_cost = (item.qty * item.unit_cost).toFixed(2)"
                                           class="w-24 h-9 rounded-lg px-3 text-sm font-bold font-mono text-right focus:outline-none"
                                           style="background: white; border: 1px solid #E5E7EB; color: #2d545e" min="0">
                                </div>
                                <div>
                                    <span class="text-[10px] font-semibold uppercase" style="color: #6B7280">Qty</span>
                                    <div class="flex items-center rounded-lg overflow-hidden" style="border: 1px solid #E5E7EB; background: white">
                                        <button @click="if(item.qty > 1) { item.qty--; item.total_cost = (item.qty * item.unit_cost).toFixed(2); }"
                                                class="w-9 h-9 flex items-center justify-center" style="background:none;border:none;cursor:pointer;color:#6B7280">−</button>
                                        <input type="number" x-model.number="item.qty" @input="item.total_cost = (item.qty * item.unit_cost).toFixed(2)"
                                               class="w-10 h-9 text-center font-bold text-sm border-l border-r focus:outline-none"
                                               style="background:none; border-color:#E5E7EB; color:#12343b" min="1">
                                        <button @click="item.qty++; item.total_cost = (item.qty * item.unit_cost).toFixed(2);"
                                                class="w-9 h-9 flex items-center justify-center" style="background:none;border:none;cursor:pointer;color:#2d545e">+</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </template>

                    <template x-if="items.length === 0">
                        <div class="flex flex-col items-center justify-center py-12 opacity-40">
                            <div class="text-4xl mb-3">🛍</div>
                            <p class="text-xs font-semibold uppercase tracking-wider">Bag is empty</p>
                        </div>
                    </template>
                </div>

                <!-- Bag Footer -->
                <div class="shrink-0 p-5 border-t" style="border-color: #E5E7EB; background: #F8F9FB">
                    <div class="flex items-center justify-between mb-4">
                        <span class="text-xs font-semibold uppercase tracking-wider" style="color: #6B7280">Total</span>
                        <div>
                            <span class="text-xs font-medium mr-1" style="color: #6B7280">KES</span>
                            <span class="font-bold text-2xl font-mono tabular" style="color: #2d545e" x-text="orderTotal"></span>
                        </div>
                    </div>
                    <button @click="submitOrder()" :disabled="items.length === 0 || !supplierId"
                            class="w-full h-12 rounded-xl font-semibold text-sm transition-all active:scale-95 disabled:opacity-30"
                            style="background: #16A34A; color: white; border: none; cursor: pointer">
                        Complete Order
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Variant Drawer -->
    <template x-if="view === 'sku'">
        <div class="fixed inset-0 z-[300] flex items-end sm:items-center justify-center">
            <div class="absolute inset-0 bg-black/30 backdrop-blur-sm" @click="view = 'listing'"></div>
            <div class="relative w-full max-w-md bg-white rounded-t-3xl sm:rounded-3xl shadow-modal overflow-hidden max-h-[85vh] flex flex-col">

                <!-- Header -->
                <div class="px-5 py-4 border-b shrink-0" style="background: #2d545e; border-color: rgba(255,255,255,0.1)">
                    <p class="text-xs font-semibold uppercase tracking-wider mb-1" style="color: #e1b382">Select Variants</p>
                    <h2 class="font-bold text-lg" style="color: white" x-text="selectedProduct.name"></h2>
                </div>

                <!-- Variants -->
                <div class="flex-1 overflow-auto p-4 space-y-2" style="scrollbar-width: none">
                    <template x-for="v in productVariants" :key="v.id">
                        <div class="rounded-xl p-4 flex items-center justify-between gap-4" style="background: #F8F9FB; border: 1px solid #E5E7EB">
                            <div class="min-w-0 flex-1">
                                <p class="font-semibold text-sm truncate" style="color: #12343b" x-text="v.name"></p>
                                <div class="flex items-center gap-2 mt-1.5">
                                    <span class="text-[10px] font-semibold uppercase" style="color: #6B7280">Cost</span>
                                    <input type="number" x-model.number="v.edit_cost" min="0"
                                           class="w-20 h-8 rounded-lg px-2 text-sm font-bold font-mono text-right focus:outline-none"
                                           style="background: white; border: 1px solid #E5E7EB; color: #2d545e">
                                </div>
                            </div>
                            <div class="flex flex-col items-center gap-1 shrink-0">
                                <span class="text-[10px] font-semibold uppercase" style="color: #6B7280">Qty</span>
                                <input type="number" x-model.number="v.qty" placeholder="0" min="0"
                                       class="w-16 h-12 rounded-xl text-center font-bold text-lg focus:outline-none"
                                       style="background: white; border: 1px solid #E5E7EB; color: #12343b">
                            </div>
                        </div>
                    </template>
                </div>

                <!-- Footer -->
                <div class="shrink-0 p-5 border-t" style="border-color: #E5E7EB">
                    <button @click="addVariantsToCart()" :disabled="modalTotalQty === 0"
                            class="w-full h-12 rounded-xl font-semibold text-sm transition-all active:scale-95 disabled:opacity-30"
                            style="background: #2d545e; color: #e1b382; border: none; cursor: pointer">
                        Add <span x-text="modalTotalQty"></span> to Order Bag
                    </button>
                </div>
            </div>
        </div>
    </template>

    <!-- Mobile Bottom Bar -->
    <template x-if="items.length > 0">
        <div class="fixed bottom-16 left-0 right-0 z-50 px-4 pb-2 lg:hidden">
            <div class="flex items-center justify-between rounded-2xl px-5 py-3 shadow-lg" style="background: #12343b; border: 1px solid rgba(255,255,255,0.1)">
                <div>
                    <div class="text-[10px] font-semibold uppercase tracking-wider" style="color: rgba(255,255,255,0.5)">Total</div>
                    <div class="font-bold text-xl font-mono tabular" style="color: #e1b382" x-text="'KES ' + orderTotal"></div>
                </div>
                <button @click="submitOrder()" :disabled="!supplierId"
                        class="h-11 px-6 rounded-xl font-semibold text-sm active:scale-95 transition-all disabled:opacity-30"
                        style="background: #16A34A; color: white; border: none; cursor: pointer">
                    Complete
                </button>
            </div>
        </div>
    </template>
</div>
{% endblock %}

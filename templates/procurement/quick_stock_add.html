{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="px-4 py-6 max-w-2xl mx-auto">

    <!-- Header -->
    <div class="flex items-center gap-3 mb-6">
        <a href="{% url 'procurement:po_list' %}" class="w-10 h-10 rounded-xl flex items-center justify-center no-underline active:scale-90 transition-all"
           style="background: #F8F9FB; border: 1px solid #E5E7EB; color: #2d545e">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg>
        </a>
        <div>
            <h1 class="text-xl font-bold" style="color: #12343b">Quick Stock Entry</h1>
            <p class="text-sm" style="color: #6B7280">Add inventory directly</p>
        </div>
    </div>

    <!-- Form Card -->
    <div class="rounded-2xl p-6" style="background: white; border: 1px solid #E5E7EB">
        <form action="{% url 'procurement:quick_add_stock' %}" method="POST" class="space-y-5">
            {% csrf_token %}
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider mb-1.5" style="color: #6B7280">Product</label>
                    <select name="product_id" required class="w-full rounded-xl px-4 py-3 text-base font-medium focus:outline-none"
                            style="background: #F8F9FB; border: 1px solid #E5E7EB; color: #12343b">
                        <option value="" disabled selected>Select product...</option>
                        {% for p in products %}
                        <option value="{{ p.id }}">{{ p.image }} {{ p.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider mb-1.5" style="color: #6B7280">Supplier</label>
                    <select name="supplier_id" required class="w-full rounded-xl px-4 py-3 text-base font-medium focus:outline-none"
                            style="background: #F8F9FB; border: 1px solid #E5E7EB; color: #12343b">
                        <option value="" disabled selected>Select supplier...</option>
                        {% for s in suppliers %}
                        <option value="{{ s.id }}">{{ s.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider mb-1.5" style="color: #6B7280">Quantity</label>
                    <input type="number" name="qty" required placeholder="0" min="1"
                           class="w-full rounded-xl px-4 py-3 text-lg font-bold focus:outline-none"
                           style="background: #F8F9FB; border: 1px solid #E5E7EB; color: #12343b">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider mb-1.5" style="color: #6B7280">Unit Cost (KES)</label>
                    <input type="number" step="0.01" name="unit_cost" required placeholder="0.00" min="0"
                           class="w-full rounded-xl px-4 py-3 text-lg font-bold focus:outline-none"
                           style="background: #F8F9FB; border: 1px solid #E5E7EB; color: #2d545e">
                </div>
            </div>

            <button type="submit" class="w-full h-12 rounded-xl font-semibold text-sm transition-all active:scale-95 shadow-md"
                    style="background: #2d545e; color: #e1b382; border: none; cursor: pointer">
                {% if user.is_staff or user.role == 'admin' %}
                    Add to Inventory
                {% else %}
                    Submit for Approval
                {% endif %}
            </button>
        </form>
    </div>
</div>
{% endblock %}

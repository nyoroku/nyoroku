{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[85vh] px-6">
  
  <div class="w-full max-w-md">
    <!-- Brand Header -->
    <div class="text-center mb-10">
      <h1 class="font-display font-extrabold text-[48px] tracking-tight text-brand-green leading-none">Eli Collection</h1>
      <p class="text-text-muted mt-3 font-medium uppercase tracking-[0.25em] text-[11px]">Point of Sale Systems</p>
    </div>

    <!-- Login Card -->
    <div class="bg-surface2 border border-border/50 rounded-[32px] p-8 sm:p-10 shadow-2xl backdrop-blur-xl relative overflow-hidden group">
        <!-- Subtle Glow -->
        <div class="absolute -top-24 -right-24 w-48 h-48 bg-brand-green/10 rounded-full blur-[80px] pointer-events-none group-hover:bg-brand-green/20 transition-all duration-700"></div>
        
        <div class="relative z-10">
            <h2 class="text-2xl font-bold text-text-primary mb-2 text-center">Welcome Back</h2>
            <p class="text-text-muted text-sm text-center mb-10">Please enter your credentials to continue</p>

            <form id="login-form" 
                  hx-post="{% url 'accounts:login' %}" 
                  hx-swap="none" 
                  hx-indicator="#loading"
                  class="space-y-6">
                {% csrf_token %}
                
                <!-- Username Input -->
                <div class="space-y-2">
                    <label for="username" class="block text-[11px] font-black text-text-muted uppercase tracking-widest ml-1">Username</label>
                    <div class="relative group/input">
                        <div class="absolute left-4 top-1/2 -translate-y-1/2 text-text-muted group-focus-within/input:text-brand-green transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        </div>
                        <input type="text" 
                               name="username" 
                               id="username" 
                               required 
                               autocomplete="username"
                               autocapitalize="none"
                               placeholder="e.g. nomad"
                               class="w-full bg-surface/50 border border-border rounded-2xl py-4 pl-12 pr-4 text-text-primary placeholder:text-text-muted/50 focus:border-brand-green focus:ring-0 transition-all text-sm font-medium">
                    </div>
                </div>

                <!-- Password Input -->
                <div class="space-y-2">
                    <div class="flex justify-between items-center px-1">
                        <label for="password" class="block text-[11px] font-black text-text-muted uppercase tracking-widest">Password / PIN</label>
                    </div>
                    <div class="relative group/input">
                        <div class="absolute left-4 top-1/2 -translate-y-1/2 text-text-muted group-focus-within/input:text-brand-green transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        </div>
                        <input type="password" 
                               name="password" 
                               id="password" 
                               required 
                               autocomplete="current-password"
                               placeholder="••••••••"
                               class="w-full bg-surface/50 border border-border rounded-2xl py-4 pl-12 pr-4 text-text-primary placeholder:text-text-muted/50 focus:border-brand-green focus:ring-0 transition-all text-sm font-medium tracking-widest">
                    </div>
                </div>

                <!-- Error Display -->
                <div id="login-error" class="hidden text-brand-red text-xs font-bold bg-brand-red/10 p-4 rounded-xl text-center flex items-center justify-center gap-2 animate-shake">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                    <span id="error-message">Invalid credentials</span>
                </div>

                <!-- Action Button -->
                <button type="submit" 
                        class="w-full bg-brand-green text-surface py-5 rounded-2xl font-display font-extrabold text-sm uppercase tracking-widest shadow-[0_12px_24px_rgba(0,230,118,0.3)] hover:shadow-[0_16px_32px_rgba(0,230,118,0.4)] active:scale-[0.98] transition-all relative overflow-hidden group/btn">
                    <span class="relative z-10">Sign In to POS</span>
                    <div class="absolute inset-x-0 bottom-0 h-1 bg-white/20 translate-y-1 group-hover/btn:translate-y-0 transition-transform"></div>
                </button>
            </form>
        </div>
    </div>

    <!-- Footer Help -->
    <p class="text-center text-text-muted text-[10px] uppercase font-bold mt-8 tracking-[0.2em]">
        Forgotten credentials? Contact Administrator
    </p>
  </div>

  <!-- Loading State -->
  <div id="loading" class="htmx-indicator fixed top-4 right-4 z-50">
    <div class="flex items-center gap-3 bg-surface2 border border-border px-4 py-2 rounded-full shadow-xl">
        <div class="w-4 h-4 border-2 border-brand-green border-t-transparent rounded-full animate-spin"></div>
        <span class="text-[10px] font-black uppercase text-brand-green tracking-wide">Authenticating...</span>
    </div>
  </div>
</div>

<style>
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
      20%, 40%, 60%, 80% { transform: translateX(5px); }
    }
    .animate-shake {
      animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
    }
</style>

<script>
    document.addEventListener('htmx:afterRequest', function(evt) {
        const errorDiv = document.getElementById('login-error');
        const messageSpan = document.getElementById('error-message');
        
        if (evt.detail.xhr.status === 401 || evt.detail.xhr.status === 403 || evt.detail.xhr.status === 400) {
            errorDiv.classList.remove('hidden');
            messageSpan.innerText = evt.detail.xhr.responseText || 'Invalid credentials';
            
            // Hard shake
            errorDiv.classList.remove('animate-shake');
            void errorDiv.offsetWidth; // Trigger reflow
            errorDiv.classList.add('animate-shake');
            
            // Clear password
            document.getElementById('password').value = '';
        } else {
            errorDiv.classList.add('hidden');
        }
    });
</script>
{% endblock %}

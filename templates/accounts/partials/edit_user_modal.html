<div x-data="{ open: true }" x-show="open" class="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4">
    <div x-show="open" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100" 
         class="absolute inset-0 bg-black/70 backdrop-blur-sm" @click="open = false; setTimeout(() => $el.closest('#modal-container').innerHTML = '', 300)"></div>
    
    <div x-show="open" x-transition:enter="transition ease-out duration-300 transform" x-transition:enter-start="translate-y-full sm:translate-y-0 sm:scale-95" x-transition:enter-end="translate-y-0 sm:scale-100" 
         class="relative w-full max-w-lg bg-surface2 border-t sm:border border-border rounded-t-[28px] sm:rounded-[28px] shadow-2xl overflow-hidden p-6 z-10">
        
        <div class="flex justify-between items-center mb-6">
            <h3 class="font-display font-extrabold text-xl text-text-primary uppercase tracking-tight">Edit Staff</h3>
            <button @click="open = false; setTimeout(() => $el.closest('#modal-container').innerHTML = '', 300)" class="text-text-muted hover:text-text-primary p-1">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
            </button>
        </div>

        <form action="{% url 'accounts:edit_user' u.id %}" method="POST" class="space-y-4">
            {% csrf_token %}
            
            <div>
                <label class="block text-[11px] font-extrabold text-text-muted uppercase tracking-[0.12em] mb-1.5 ml-1">Full Name</label>
                <input type="text" name="name" value="{{ u.name }}" required class="w-full bg-surface3 border border-border rounded-xl px-4 py-3.5 text-sm text-text-primary focus:border-brand-green/40 focus:ring-0 transition-all">
            </div>

            <div>
                <label class="block text-[11px] font-extrabold text-text-muted uppercase tracking-[0.12em] mb-1.5 ml-1">Username</label>
                <input type="text" name="username" value="{{ u.username }}" required autocapitalize="none" class="w-full bg-surface3 border border-border rounded-xl px-4 py-3.5 text-sm text-text-primary focus:border-brand-green/40 focus:ring-0 transition-all">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[11px] font-extrabold text-text-muted uppercase tracking-[0.12em] mb-1.5 ml-1">Role</label>
                    <select name="role" required class="w-full bg-surface3 border border-border rounded-xl px-4 py-3.5 text-sm text-text-primary focus:border-brand-green/40 focus:ring-0 transition-all">
                        <option value="cashier" {% if u.role == 'cashier' %}selected{% endif %}>Cashier</option>
                        <option value="stock_clerk" {% if u.role == 'stock_clerk' %}selected{% endif %}>Stock Clerk</option>
                        <option value="manager" {% if u.role == 'manager' %}selected{% endif %}>Manager</option>
                        <option value="admin" {% if u.role == 'admin' %}selected{% endif %}>Admin</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[11px] font-extrabold text-text-muted uppercase tracking-[0.12em] mb-1.5 ml-1">Basic Salary</label>
                    <input type="number" step="0.01" name="basic_salary" value="{{ u.basic_salary }}" placeholder="0.00"
                           class="w-full bg-surface3 border border-border rounded-xl px-4 py-3.5 text-sm text-text-primary focus:border-brand-green/40 focus:ring-0 transition-all">
                </div>
            </div>

            <div>
                <label class="block text-[11px] font-extrabold text-text-muted uppercase tracking-[0.12em] mb-1.5 ml-1">New 4-Digit PIN (Leave empty to keep current)</label>
                <input type="text" name="pin" placeholder="••••" maxlength="4" pattern="[0-9]{4}" inputmode="numeric"
                       class="w-full bg-surface3 border border-border rounded-xl px-4 py-3.5 text-sm text-text-primary font-bold text-center tracking-[0.5em] focus:border-brand-green/40 focus:ring-0 transition-all dm-mono">
            </div>

            <div class="pt-3 flex gap-3">
                <button type="button" @click="open = false; setTimeout(() => $el.closest('#modal-container').innerHTML = '', 300)" class="flex-1 px-4 py-4 bg-white/[0.04] border border-border text-text-primary rounded-2xl font-display font-extrabold text-sm active:scale-95 transition-all">
                    Cancel
                </button>
                <button type="submit" class="flex-[2] px-4 py-4 bg-brand-green text-surface rounded-2xl font-display font-extrabold text-sm shadow-glow-green active:scale-95 transition-all btn-shimmer">
                    Save Changes
                </button>
            </div>
        </form>
    </div>
</div>

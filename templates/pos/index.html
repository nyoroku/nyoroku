{% extends 'base.html' %}
{% load static %}

{% block screen_title %}Checkout{% endblock %}

{% block content %}
<div class="flex flex-col h-[calc(100vh-64px)] overflow-hidden bg-[#0a0a0f]" x-data="{ checkoutLoading: false, editingQty: null, selectedProduct: null, qtyModalOpen: false, addQty: 1, variantModalOpen: false, variantModalProduct: null, selectedVariant: null, scanOpen: false, manualBarcode: '' }">
    
    <!-- Search -->
    <div class="px-[14px] py-[12px] flex gap-[10px] border-b border-border shrink-0 bg-surface">
        <div class="flex-1 relative">
            <span class="absolute left-[12px] top-1/2 -translate-y-1/2 text-text-muted flex">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </span>
            <input type="text" name="q" hx-get="{% url 'pos:index' %}" hx-trigger="input changed delay:200ms" hx-target="#product-grid" hx-include="[name='category']" placeholder="Search products..."
                class="w-full bg-surface2 border border-border rounded-[12px] py-[10px] pr-[12px] pl-[36px] text-text-primary text-[14px] focus:ring-0 focus:border-brand-whatsapp transition-all">
        </div>
        <button @click="scanOpen = true" class="bg-surface2 border border-border rounded-[12px] px-[13px] py-[10px] cursor-pointer text-brand-whatsapp flex items-center shadow-sm">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9V6a2 2 0 0 1 2-2h2"/><path d="M21 9V6a2 2 0 0 0-2-2h-2"/><path d="M3 15v3a2 2 0 0 0 2 2h2"/><path d="M21 15v3a2 2 0 0 0-2 2h-2"/><line x1="7" y1="12" x2="7" y2="12"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="17" y1="12" x2="17" y2="12"/></svg>
        </button>
    </div>

    <!-- Category chips -->
    <div class="flex gap-[8px] px-[14px] py-[10px] overflow-x-auto shrink-0 no-scrollbar whitespace-nowrap bg-surface" x-data="{ activeCat: '{{ active_category|default:'all' }}' }">
        <input type="hidden" name="category" :value="activeCat">
        <button hx-get="{% url 'pos:index' %}?category=all" hx-target="#product-grid" @click="activeCat = 'all'; $el.closest('div').querySelector('[name=category]').value = 'all'"
            class="rounded-[20px] px-[16px] py-[6px] text-[13px] font-medium transition-all"
            :class="activeCat === 'all' ? 'bg-brand-whatsapp text-[#0a0a0f] border border-brand-whatsapp' : 'bg-surface2 text-text-muted border border-border'">
            All
        </button>
        {% for cat in categories %}
        <button hx-get="{% url 'pos:index' %}?category={{ cat.id }}" hx-target="#product-grid" @click="activeCat = '{{ cat.id }}'; $el.closest('div').querySelector('[name=category]').value = '{{ cat.id }}'"
            class="rounded-[20px] px-[16px] py-[6px] text-[13px] font-medium transition-all"
            :class="activeCat === '{{ cat.id }}' ? 'bg-brand-whatsapp text-[#0a0a0f] border border-brand-whatsapp' : 'bg-surface2 text-text-muted border border-border'">
            {{ cat.name }}
        </button>
        {% endfor %}
    </div>

    <!-- Product grid block -->
    <div id="product-grid" class="flex-1 overflow-auto px-[12px] pb-[76px] grid grid-cols-2 gap-[10px] content-start bg-[#0a0a0f]">
        {% include 'pos/partials/product_grid.html' %}
    </div>

    <!-- Cart FAB -->
    <button x-show="itemCount > 0 && !cart.open" x-cloak @click="cart.open = true" 
        class="fixed bottom-[76px] right-[16px] bg-brand-whatsapp rounded-[20px] px-[20px] py-[13px] flex items-center gap-[10px] shadow-[0_4px_24px_rgba(37,211,102,0.35)] z-50 border-none cursor-pointer">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0a0a0f" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="text-[#0a0a0f] font-bold text-[15px] font-display" x-text="itemCount + ' ｷ KES ' + cartTotal.toLocaleString()"></span>
    </button>

    <!-- Cart drawer -->
    <div x-show="cart.open" x-cloak class="fixed inset-0 z-[100] flex flex-col justify-end">
        <div class="flex-1 bg-black/55 backdrop-blur-sm" @click="cart.open = false" x-transition.opacity></div>
        
        <div class="bg-surface rounded-t-[24px] border border-border max-h-[88vh] flex flex-col w-full max-w-md mx-auto" x-transition:enter="transition transform duration-300 ease-out" x-transition:enter-start="translate-y-full" x-transition:enter-end="translate-y-0">
            <!-- Header -->
            <div class="p-[16px_20px] flex items-center justify-between border-b border-border shrink-0">
                <div class="font-display font-extrabold text-[18px] text-text-primary" x-text="'Cart ｷ ' + itemCount + ' items'"></div>
                <button @click="cart.open = false" class="bg-surface2 border border-border rounded-[10px] p-[6px] text-text-muted flex items-center justify-center cursor-pointer">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>

            <!-- Payment Methods -->
            <div class="p-[12px_20px] flex gap-[8px] shrink-0 border-b border-border">
                <button @click="payment = 'cash'" class="flex-1 rounded-[10px] py-[9px] px-[4px] text-[12px] font-bold uppercase transition-all cursor-pointer" :class="payment === 'cash' ? 'bg-brand-whatsapp border border-brand-whatsapp text-[#0a0a0f]' : 'bg-surface2 border border-border text-text-muted'">Cash</button>
                <button @click="payment = 'mpesa'" class="flex-1 rounded-[10px] py-[9px] px-[4px] text-[12px] font-bold uppercase transition-all cursor-pointer" :class="payment === 'mpesa' ? 'bg-brand-amber border border-brand-amber text-[#0a0a0f]' : 'bg-surface2 border border-border text-text-muted'">M-Pesa</button>
                <button @click="payment = 'card'" class="flex-1 rounded-[10px] py-[9px] px-[4px] text-[12px] font-bold uppercase transition-all cursor-pointer" :class="payment === 'card' ? 'bg-brand-whatsapp border border-brand-whatsapp text-[#0a0a0f]' : 'bg-surface2 border border-border text-text-muted'">Card</button>
                <button @click="payment = 'split'" class="flex-1 rounded-[10px] py-[9px] px-[4px] text-[12px] font-bold uppercase transition-all cursor-pointer" :class="payment === 'split' ? 'bg-brand-whatsapp border border-brand-whatsapp text-[#0a0a0f]' : 'bg-surface2 border border-border text-text-muted'">Split</button>
            </div>

            <!-- Items -->
            <div class="flex-1 overflow-auto px-[20px] pb-4">
                <template x-for="item in cart.items" :key="item.id">
                    <div class="flex items-center gap-[10px] py-[11px] border-b border-border relative">
                        <span class="text-[24px]" x-text="item.image"></span>
                        <div class="flex-1 min-w-0">
                            <div class="text-text-primary font-medium text-[14px] overflow-hidden text-ellipsis whitespace-nowrap" x-text="item.name"></div>
                            <div class="text-brand-whatsapp text-[13px] font-semibold cursor-pointer" @click="let d = prompt('Enter discount per unit for ' + item.name + ':', item.discount || 0); if(d !== null) setLineDiscount(item.id, d)">
                                KES <span x-text="(item.price - (item.discount || 0)).toLocaleString()"></span>
                                <template x-if="item.discount > 0">
                                    <span class="line-through text-text-muted text-[10px] ml-1" x-text="'KES ' + item.price"></span>
                                </template>
                            </div>
                        </div>
                        <div class="flex items-center gap-[8px] shrink-0">
                            <button @click="updateQty(item.id, -1)" class="bg-surface2 border border-border rounded-[8px] w-[30px] h-[30px] text-text-primary flex items-center justify-center cursor-pointer">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
                            </button>
                            <span class="text-text-primary font-bold w-[22px] text-center text-[15px]" x-text="item.qty"></span>
                            <button @click="updateQty(item.id, 1)" class="bg-surface2 border border-border rounded-[8px] w-[30px] h-[30px] text-text-primary flex items-center justify-center cursor-pointer">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                            </button>
                        </div>
                        <div class="text-text-primary font-bold text-[14px] min-w-[70px] text-right" x-text="'KES ' + parseFloat((item.price - (item.discount || 0)) * item.qty).toLocaleString()"></div>
                    </div>
                </template>
                
                <template x-if="payment === 'split'">
                    <div class="mt-4 p-3 bg-surface2 border border-border rounded-[14px]">
                        <p class="font-bold text-[13px] mb-2 text-text-muted">Split Payments</p>
                        <template x-for="(sp, idx) in splitPayments" :key="idx">
                            <div class="flex gap-2 mb-2 items-center">
                                <select x-model="sp.method" class="w-1/2 p-2 bg-surface border border-border rounded-lg text-xs text-text-primary">
                                    <option value="cash">Cash</option>
                                    <option value="mpesa">M-Pesa</option>
                                    <option value="card">Card</option>
                                </select>
                                <input type="number" x-model.number="sp.amount" class="w-1/2 p-2 bg-surface text-brand-whatsapp font-bold border border-border rounded-lg text-xs text-right">
                                <button @click="splitPayments.splice(idx, 1)" class="text-brand-red p-1 pb-1 text-xs font-bold">?</button>
                            </div>
                        </template>
                        <button @click="splitPayments.push({method:'cash', amount:0})" class="w-full mt-1 p-2 text-[10px] font-bold text-center border border-dashed border-border text-text-muted uppercase tracking-[0.1em] rounded-lg hover:border-brand-whatsapp focus:outline-none">Add Payment Row</button>
                        <div class="flex justify-between mt-3 font-bold text-xs border-t border-border pt-2">
                            <span class="text-text-muted">Total Paid:</span>
                            <span :class="totalPaid >= cartTotal ? 'text-brand-whatsapp' : 'text-brand-red'" x-text="'KES ' + totalPaid.toLocaleString()"></span>
                        </div>
                    </div>
                </template>
            </div>

            <!-- Checkout button area -->
            <div class="p-[16px_20px_28px] shrink-0 border-t border-border">
                <div class="flex justify-between mb-[14px] font-display">
                    <span class="text-text-muted text-[14px]">Total</span>
                    <span class="text-brand-whatsapp font-extrabold text-[24px]" x-text="'KES ' + cartTotal.toLocaleString()"></span>
                </div>
                <button @click="checkoutLoading = true; 
                          fetch('{% url 'pos:checkout' %}', {
                              method: 'POST',
                              headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
                              body: JSON.stringify({ items: cart.items, payment_method: payment, split_payments: payment === 'split' ? splitPayments : [], coupon_code: couponApplied ? couponCode : '' })
                          })
                          .then(res => res.text())
                          .then(html => {
                              document.getElementById('modal-container').innerHTML = html;
                              checkoutLoading = false;
                              clearCart();
                              amountTendered = null;
                          }).catch(err => { checkoutLoading = false; });"
                  :disabled="checkoutLoading || itemCount === 0 || (payment === 'split' && totalPaid < cartTotal)"
                  class="w-full bg-brand-whatsapp border-none rounded-[14px] p-[16px] text-[#0a0a0f] font-extrabold text-[17px] cursor-pointer font-display disabled:opacity-50 active:scale-[0.98] transition-transform">
                    <span x-show="!checkoutLoading">Confirm ｷ <span x-text="payment === 'mpesa' ? 'M-Pesa' : (payment === 'card' ? 'Card' : (payment === 'split' ? 'Split Payment' : 'Cash'))"></span></span>
                    <span x-show="checkoutLoading">Processing...</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Variant Selector Modal -->
    <div x-show="variantModalOpen" x-cloak class="fixed inset-0 z-[100] flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" @click="variantModalOpen = false"></div>
        <div class="relative bg-surface2 border border-border rounded-[24px] w-full max-w-sm shadow-2xl flex flex-col max-h-[80vh]" x-show="variantModalOpen" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="scale-95 opacity-0" x-transition:enter-end="scale-100 opacity-100">
            <div class="p-6 pb-2 shrink-0 border-b border-border flex justify-between items-center">
                <div>
                   <h3 class="font-display font-extrabold text-xl mb-1" x-text="variantModalProduct?.name"></h3>
                   <p class="text-[12px] text-text-muted">Select an option</p>
                </div>
                <button @click="variantModalOpen = false" class="text-text-muted hover:text-white p-2 text-xl font-bold">ﾗ</button>
            </div>
            
            <div class="p-6 space-y-3 overflow-y-auto no-scrollbar">
                <template x-for="v in variantModalProduct?.variants" :key="v.id">
                    <button @click="selectedVariant = v; addQty = 1;"
                            class="w-full px-4 py-3 rounded-[16px] border flex items-center justify-between transition-all cursor-pointer"
                            :class="selectedVariant?.id === v.id ? 'bg-brand-whatsapp/10 border-brand-whatsapp text-brand-whatsapp ring-1 ring-brand-whatsapp/50' : 'bg-surface3 border-border hover:border-text-muted text-text-primary'">
                        <span class="font-bold text-[13px]" x-text="v.options.join(' / ') || 'Default'"></span>
                        <div class="text-right">
                           <span class="block text-xs font-extrabold" x-text="'KES ' + v.price"></span>
                           <span class="block text-[9px]" :class="v.stock_qty <= v.reorder_level ? 'text-brand-amber font-extrabold' : 'text-text-muted/60'" x-text="v.stock_qty + ' in stock'"></span>
                        </div>
                    </button>
                </template>
            </div>
            
            <div x-show="selectedVariant" x-collapse>
               <div class="p-6 pt-0 shrink-0">
                   <div class="flex items-center justify-center gap-4 mb-5 border-t border-border pt-5">
                        <button @click="if(addQty > 1) addQty--" class="w-12 h-12 rounded-[12px] bg-surface3 border border-border flex items-center justify-center text-text-muted active:scale-95 transition-transform"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/></svg></button>
                        <div class="w-16 text-center font-display font-extrabold text-[30px] text-brand-whatsapp" x-text="addQty"></div>
                        <button @click="
                            let inCart = cart.items.find(i => i.id === selectedVariant.id)?.qty || 0;
                            if(addQty < (selectedVariant.stock_qty - inCart)) { addQty++; } else { couponError = 'Max stock reached!'; setTimeout(() => couponError='', 2000); }
                        " class="w-12 h-12 rounded-[12px] bg-surface3 border border-border flex items-center justify-center text-text-muted active:scale-95 transition-transform"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg></button>
                    </div>
                    <button @click="
                            if(addToCart({
                                id: selectedVariant.id,
                                parent_id: variantModalProduct.id,
                                name: selectedVariant.name,
                                price: selectedVariant.price,
                                stock_qty: selectedVariant.stock_qty,
                                image: variantModalProduct.image
                            }, addQty)) {
                                variantModalOpen = false;
                            }
                        " class="w-full py-[16px] bg-brand-whatsapp text-[#0a0a0f] font-extrabold uppercase rounded-[14px] active:scale-95 transition-transform">Add to Sale</button>
               </div>
            </div>
        </div>
    </div>

</div> <!-- END POS -->
{% endblock %}

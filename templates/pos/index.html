{% extends 'base.html' %}
{% load static %}

{% block screen_title %}Checkout{% endblock %}

{% block content %}

<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --mint:       #6EE7B7;
    --mint-dim:   #3DD68C;
    --mint-glow:  rgba(110, 231, 183, 0.18);
    --mint-soft:  rgba(110, 231, 183, 0.08);
    --bg-void:    #080810;
    --bg-base:    #0d0d18;
    --bg-card:    #111120;
    --bg-lift:    #181828;
    --bg-hi:      #1e1e30;
    --border-sub: rgba(255,255,255,0.05);
    --border-act: rgba(110, 231, 183, 0.35);
    --text-hi:    #ffffff;
    --text-mid:   rgba(255,255,255,0.45);
    --text-low:   rgba(255,255,255,0.15);
    --red:        #FF4D6A;
    --amber:      #FFBA08;
    --radius-xl:  52px;
    --radius-lg:  36px;
    --radius-md:  24px;
    --radius-sm:  16px;
  }

  * { font-family: 'DM Sans', sans-serif; box-sizing: border-box; }
  .font-display { font-family: 'Syne', sans-serif; }
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  [x-cloak] { display: none !important; }

  /* Thin custom scrollbar */
  .custom-scrollbar::-webkit-scrollbar { width: 3px; }
  .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
  .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--border-act); border-radius: 999px; }

  /* Glow tab animation */
  @keyframes glow-pulse { 0%,100% { box-shadow: 0 0 24px var(--mint-glow); } 50% { box-shadow: 0 0 42px rgba(110,231,183,0.32); } }
  .tab-active { animation: glow-pulse 2.5s ease-in-out infinite; }

  /* Shimmer on card hover */
  @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
  .card-shimmer::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(105deg, transparent 40%, rgba(110,231,183,0.06) 50%, transparent 60%);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .card-shimmer:hover::after { opacity: 1; animation: shimmer 0.7s ease; }

  /* Scan line */
  @keyframes scanline { 0%,100% { top: 20%; opacity: 1; } 50% { top: 80%; opacity: 0.6; } }
  .scan-line { position: absolute; left: 8%; right: 8%; height: 3px; background: var(--mint); border-radius: 99px;
    box-shadow: 0 0 20px 4px var(--mint-glow); animation: scanline 1.8s ease-in-out infinite; }

  /* Fade in list items */
  @keyframes fade-up { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .animate-fade-up { animation: fade-up 0.3s ease both; }

  /* Scale in badge */
  @keyframes scale-in { from { transform: scale(0.4); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .animate-scale-in { animation: scale-in 0.25s cubic-bezier(0.34,1.56,0.64,1) both; }

  /* Drawer noise texture */
  .noise::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    border-radius: inherit;
    z-index: 0;
  }
</style>

<div class="flex flex-col h-[calc(100vh-64px)] overflow-hidden relative"
     style="background: var(--bg-void);"
     x-init="window.allProducts = [
        {% for p in products %}
        {
            id: '{{ p.id }}',
            name: '{{ p.name|escapejs }}',
            price: {{ p.price }},
            image: '{{ p.image }}',
            barcode: '{{ p.barcode }}',
            stock_qty: {{ p.total_stock }},
            has_variants: {{ p.has_variants|yesno:'true,false' }},
            variants: {% if p.has_variants %}{{ p.variants_json|safe }}{% else %}[]{% endif %}
        },
        {% endfor %}
     ]"
     x-data="{ checkoutLoading: false, editingQty: null, addModalOpen: false, addModalProduct: null, selectedVariant: null, addQty: 1, scanOpen: false, manualBarcode: '' }">

  <!-- ══════════════════════════════ HEADER ══════════════════════════════ -->
  <header style="background: var(--bg-base); border-bottom: 1px solid var(--border-sub);"
          class="px-6 py-4 flex items-center gap-4 shrink-0">

    <!-- Logo mark -->
    <div class="shrink-0 font-display text-white text-xl font-800 tracking-tighter mr-2 select-none">
      <span style="color: var(--mint)">●</span> POS
    </div>

    <!-- Search -->
    <div class="flex-1 relative">
      <span class="absolute left-5 top-1/2 -translate-y-1/2 pointer-events-none transition-colors"
            style="color: var(--text-low);">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </span>
      <input type="text" name="q"
             hx-get="{% url 'pos:index' %}" hx-trigger="input changed delay:200ms"
             hx-target="#product-grid" hx-include="[name='category']"
             placeholder="Search by name or scan barcode…"
             style="background: var(--bg-card); border: 1.5px solid var(--border-sub); border-radius: var(--radius-lg); color: var(--text-hi);"
             class="w-full py-3.5 pl-12 pr-5 text-[15px] font-medium placeholder-[var(--text-low)] focus:outline-none transition-all"
             onfocus="this.style.borderColor='var(--border-act)'; this.style.boxShadow='0 0 0 4px var(--mint-soft)'"
             onblur="this.style.borderColor='var(--border-sub)'; this.style.boxShadow='none'">
    </div>

    <!-- Scan button -->
    <button @click="scanOpen = true; $nextTick(() => startScanner())"
            style="background: var(--bg-card); border: 1.5px solid var(--border-sub); border-radius: var(--radius-md); color: var(--mint);"
            class="w-12 h-12 flex items-center justify-center shrink-0 transition-all hover:border-[var(--border-act)] hover:shadow-[0_0_20px_var(--mint-glow)] active:scale-95">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9V6a2 2 0 0 1 2-2h2"/><path d="M21 9V6a2 2 0 0 0-2-2h-2"/><path d="M3 15v3a2 2 0 0 0 2 2h2"/><path d="M21 15v3a2 2 0 0 0-2 2h-2"/><line x1="7" y1="12" x2="17" y2="12"/></svg>
    </button>

    <!-- Cart button -->
    <button x-show="itemCount > 0" x-cloak
            @click="cart.open = true"
            style="background: var(--mint); border-radius: var(--radius-md); box-shadow: 0 8px 32px var(--mint-glow);"
            class="h-12 px-6 flex items-center gap-3 font-display font-800 text-[15px] text-black shrink-0 transition-all active:scale-95 hover:brightness-110">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      <span x-text="itemCount" class="font-display text-[15px]"></span>
      <span class="text-black/40 text-[13px] font-medium">items</span>
    </button>
  </header>

  <!-- ══════════════════════════════ CATEGORY TABS ══════════════════════════════ -->
  <div class="flex gap-3 px-6 py-4 overflow-x-auto shrink-0 no-scrollbar" style="background: var(--bg-base);"
       x-data="{ activeCat: '{{ active_category|default:'all' }}' }">
    <input type="hidden" name="category" :value="activeCat">

    <!-- All Items tab -->
    <button hx-get="{% url 'pos:index' %}?category=all" hx-target="#product-grid"
            @click="activeCat = 'all'"
            class="shrink-0 font-display font-800 text-[13px] uppercase tracking-[0.12em] px-6 py-2.5 transition-all duration-300 cursor-pointer relative overflow-hidden"
            :class="activeCat === 'all'
              ? 'tab-active'
              : ''"
            :style="activeCat === 'all'
              ? 'background: var(--mint); color: #000; border-radius: var(--radius-sm); border: none;'
              : 'background: var(--bg-card); color: var(--text-mid); border-radius: var(--radius-sm); border: 1.5px solid var(--border-sub);'">
      All Items
    </button>

    {% for cat in categories %}
    <button hx-get="{% url 'pos:index' %}?category={{ cat.id }}" hx-target="#product-grid"
            @click="activeCat = '{{ cat.id }}'"
            class="shrink-0 font-display font-800 text-[13px] uppercase tracking-[0.12em] px-6 py-2.5 transition-all duration-300 cursor-pointer"
            :class="activeCat === '{{ cat.id }}'
              ? 'tab-active'
              : ''"
            :style="activeCat === '{{ cat.id }}'
              ? 'background: var(--mint); color: #000; border-radius: var(--radius-sm); border: none;'
              : 'background: var(--bg-card); color: var(--text-mid); border-radius: var(--radius-sm); border: 1.5px solid var(--border-sub);'">
      {{ cat.name }}
    </button>
    {% endfor %}
  </div>

  <!-- ══════════════════════════════ PRODUCT GRID ══════════════════════════════ -->
  <div id="product-grid"
       class="flex-1 overflow-auto px-6 py-6 pb-32 grid grid-cols-2 lg:grid-cols-4 xl:grid-cols-5 gap-4 content-start no-scrollbar"
       style="background: var(--bg-void);"
       @keydown.window="if($event.key === 'Enter') { handleBarcode(manualBarcode); manualBarcode = ''; } else if($event.target.tagName !== 'INPUT') { manualBarcode += $event.key; }">
    {% include 'pos/partials/product_grid.html' %}
  </div>


  <!-- ══════════════════════════════ ADD MODAL ══════════════════════════════ -->
  <div x-show="addModalOpen" x-cloak class="fixed inset-0 z-[200] flex items-end sm:items-center justify-center p-4 sm:p-8">
    <div class="absolute inset-0 backdrop-blur-2xl" style="background: rgba(8,8,16,0.92);"
         @click="addModalOpen = false" x-transition:enter="transition duration-300" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"></div>

    <div class="relative w-full max-w-md flex flex-col overflow-hidden noise"
         style="background: var(--bg-card); border: 1.5px solid var(--border-sub); border-radius: var(--radius-xl); box-shadow: 0 60px 120px rgba(0,0,0,0.9), 0 0 60px var(--mint-soft);"
         x-show="addModalOpen"
         x-transition:enter="transition transform duration-500 cubic-bezier(0.34,1.56,0.64,1)"
         x-transition:enter-start="scale-90 opacity-0 translate-y-8"
         x-transition:enter-end="scale-100 opacity-100 translate-y-0">

      <!-- Close -->
      <button @click="addModalOpen = false"
              class="absolute top-6 right-6 z-10 w-9 h-9 flex items-center justify-center rounded-full transition-all active:scale-90"
              style="background: var(--bg-hi); color: var(--text-mid);">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>

      <!-- Product hero -->
      <div class="pt-12 pb-8 px-10 flex flex-col items-center text-center">
        <div class="w-28 h-28 flex items-center justify-center text-7xl mb-6 rounded-[40px] transition-transform duration-500 hover:scale-110"
             style="background: var(--bg-lift); border: 1.5px solid var(--border-sub);">
          <span x-text="addModalProduct?.image"></span>
        </div>
        <h3 class="font-display font-800 text-2xl text-white tracking-tight leading-snug mb-2" x-text="addModalProduct?.name"></h3>
        <div class="font-display font-800 text-3xl" style="color: var(--mint);"
             x-text="'KES ' + (selectedVariant ? selectedVariant.price : addModalProduct?.price)?.toLocaleString()"></div>
      </div>

      <!-- Variants -->
      <template x-if="addModalProduct?.variants && addModalProduct.variants.length > 0">
        <div class="px-10 pb-6">
          <p class="text-[11px] font-display font-800 uppercase tracking-[0.35em] mb-4" style="color: var(--text-low);">Choose Variant</p>
          <div class="flex flex-wrap gap-3">
            <template x-for="v in addModalProduct?.variants" :key="v.id">
              <button @click="selectedVariant = v; addQty = 1;"
                      class="px-5 py-3 rounded-2xl text-[13px] font-display font-800 transition-all active:scale-95 cursor-pointer"
                      :style="selectedVariant?.id === v.id
                        ? 'background: var(--mint); color: #000; border: none; box-shadow: 0 4px 20px var(--mint-glow);'
                        : 'background: var(--bg-hi); color: var(--text-mid); border: 1.5px solid var(--border-sub);'"
                      x-text="v.options.join(' / ')"></button>
            </template>
          </div>
        </div>
      </template>

      <!-- Qty + CTA -->
      <div x-show="(!addModalProduct?.variants?.length) || selectedVariant" x-transition:enter="transition duration-200" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
           class="px-10 pb-10">
        <!-- Qty stepper -->
        <div class="flex items-center justify-between gap-4 p-3 rounded-[28px] mb-6"
             style="background: var(--bg-void); border: 1.5px solid var(--border-sub);">
          <button @click="if(addQty > 1) addQty--"
                  class="w-14 h-14 flex items-center justify-center rounded-[20px] transition-all active:scale-90 cursor-pointer"
                  style="background: var(--bg-hi); color: var(--text-mid); border: none;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
          <div class="text-center">
            <div class="font-display font-800 text-5xl text-white tabular-nums" x-text="addQty"></div>
            <div class="text-[10px] font-display font-800 uppercase tracking-[0.4em] mt-1" style="color: var(--text-low);">qty</div>
          </div>
          <button @click="
                    let maxStock = selectedVariant ? selectedVariant.stock_qty : addModalProduct?.stock_qty;
                    let currentId = selectedVariant ? selectedVariant.id : addModalProduct?.id;
                    let inCart = cart.items.find(i => i.id === currentId)?.qty || 0;
                    if(addQty < (maxStock - inCart)) { addQty++; } else { alert('No more stock available'); }"
                  class="w-14 h-14 flex items-center justify-center rounded-[20px] transition-all active:scale-90 cursor-pointer"
                  style="background: var(--bg-hi); border: none;"
                  :style="'color: var(--mint);'">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>

        <!-- Add CTA -->
        <button @click="
                  let p = selectedVariant ? {
                    id: selectedVariant.id,
                    parent_id: addModalProduct.id,
                    name: selectedVariant.name,
                    price: selectedVariant.price,
                    stock_qty: selectedVariant.stock_qty,
                    image: addModalProduct.image
                  } : {
                    id: addModalProduct.id,
                    name: addModalProduct.name,
                    price: addModalProduct.price,
                    stock_qty: addModalProduct.stock_qty,
                    image: addModalProduct.image
                  };
                  if(addToCart(p, addQty)) { addModalOpen = false; }"
                class="w-full h-14 font-display font-800 text-[15px] uppercase tracking-[0.1em] rounded-[20px] transition-all active:scale-[0.98] cursor-pointer flex items-center justify-center gap-4 border-none"
                style="background: var(--mint); color: #000; box-shadow: 0 12px 40px var(--mint-glow);">
          <span>Add to Basket</span>
          <span style="color: rgba(0,0,0,0.3)">·</span>
          <span x-text="'KES ' + ((selectedVariant ? selectedVariant.price : addModalProduct?.price) * addQty).toLocaleString()"></span>
        </button>
      </div>
    </div>
  </div>


  <!-- ══════════════════════════════ CART DRAWER ══════════════════════════════ -->
  <div x-show="cart.open" x-cloak class="fixed inset-0 z-[150] flex flex-col justify-end">
    <div class="absolute inset-0 backdrop-blur-xl" style="background: rgba(8,8,16,0.88);"
         @click="cart.open = false"
         x-transition:enter="transition duration-300" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"></div>

    <div class="relative w-full max-w-2xl mx-auto flex flex-col overflow-hidden noise"
         style="background: var(--bg-card); border-top: 1.5px solid var(--border-sub); border-radius: var(--radius-xl) var(--radius-xl) 0 0; max-height: 94vh; box-shadow: 0 -40px 100px rgba(0,0,0,0.8);"
         x-transition:enter="transition transform duration-500 cubic-bezier(0.16,1,0.3,1)"
         x-transition:enter-start="translate-y-full"
         x-transition:enter-end="translate-y-0">

      <!-- Handle -->
      <div class="flex justify-center pt-4 pb-0 shrink-0">
        <div class="w-10 h-1 rounded-full" style="background: var(--border-sub);"></div>
      </div>

      <!-- Cart Header -->
      <div class="px-8 pt-6 pb-5 flex items-center justify-between shrink-0"
           style="border-bottom: 1px solid var(--border-sub);">
        <div>
          <h2 class="font-display font-800 text-3xl text-white tracking-tight">Basket</h2>
          <div class="text-[12px] font-display font-800 uppercase tracking-[0.25em] mt-1" style="color: var(--text-low);"
               x-text="itemCount + ' items · KES ' + cartTotal.toLocaleString()"></div>
        </div>
        <div class="flex items-center gap-3">
          <button @click="clearCart()"
                  class="px-5 py-2.5 text-[12px] font-display font-800 uppercase tracking-[0.15em] rounded-[14px] transition-all active:scale-95 cursor-pointer border-none"
                  style="background: rgba(255,77,106,0.1); color: var(--red);">
            Clear All
          </button>
          <button @click="cart.open = false"
                  class="w-9 h-9 flex items-center justify-center rounded-full transition-all cursor-pointer border-none"
                  style="background: var(--bg-hi); color: var(--text-mid);">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>

      <!-- Payment Method Tabs -->
      <div class="px-8 py-4 shrink-0" style="border-bottom: 1px solid var(--border-sub);">
        <div class="flex gap-2 p-1.5 rounded-[20px]" style="background: var(--bg-void);">
          <template x-for="mode in ['cash','mpesa','card','split']" :key="mode">
            <button @click="payment = mode"
                    class="flex-1 py-2.5 rounded-[14px] text-[12px] font-display font-800 uppercase tracking-[0.15em] transition-all duration-300 border-none cursor-pointer"
                    :style="payment === mode
                      ? 'background: var(--mint); color: #000; box-shadow: 0 4px 16px var(--mint-glow);'
                      : 'background: transparent; color: var(--text-low);'"
                    x-text="mode"></button>
          </template>
        </div>
      </div>

      <!-- Cart Items -->
      <div class="flex-1 overflow-auto px-8 py-4 custom-scrollbar">
        <template x-for="(item, idx) in cart.items" :key="item.id">
          <div class="flex items-center gap-5 py-4 animate-fade-up"
               style="border-bottom: 1px solid var(--border-sub);"
               :style="`animation-delay: ${idx * 40}ms`">
            <!-- Emoji -->
            <div class="w-14 h-14 shrink-0 flex items-center justify-center text-3xl rounded-[18px]"
                 style="background: var(--bg-lift); border: 1.5px solid var(--border-sub);"
                 x-text="item.image"></div>
            <!-- Info -->
            <div class="flex-1 min-w-0">
              <div class="text-white font-medium text-[14px] truncate" x-text="item.name"></div>
              <div class="font-display font-800 text-[13px] mt-0.5 cursor-pointer transition-colors hover:opacity-80"
                   style="color: var(--mint);"
                   @click="let d = prompt('Discount per unit:', item.discount || 0); if(d!==null) setLineDiscount(item.id, d)">
                KES <span x-text="(item.price - (item.discount || 0)).toLocaleString()"></span>
                <template x-if="item.discount > 0">
                  <span class="line-through text-[11px] ml-1" style="color: var(--text-low);" x-text="item.price"></span>
                </template>
              </div>
            </div>
            <!-- Qty stepper mini -->
            <div class="flex items-center gap-2 px-2 py-1.5 rounded-[16px]"
                 style="background: var(--bg-void); border: 1.5px solid var(--border-sub);">
              <button @click="updateQty(item.id, -1)"
                      class="w-8 h-8 flex items-center justify-center rounded-[10px] border-none cursor-pointer transition-all active:scale-90"
                      style="background: var(--bg-hi); color: var(--text-mid);">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="5" y1="12" x2="19" y2="12"/></svg>
              </button>
              <span class="w-8 text-center font-display font-800 text-[15px] text-white tabular-nums" x-text="item.qty"></span>
              <button @click="updateQty(item.id, 1)"
                      class="w-8 h-8 flex items-center justify-center rounded-[10px] border-none cursor-pointer transition-all active:scale-90"
                      style="background: var(--bg-hi);" :style="'color: var(--mint);'">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              </button>
            </div>
            <!-- Line total -->
            <div class="shrink-0 text-right">
              <div class="font-display font-800 text-[13px] text-white" x-text="'KES ' + ((item.price - (item.discount || 0)) * item.qty).toLocaleString()"></div>
            </div>
          </div>
        </template>

        <!-- Split Payment Section -->
        <div x-show="payment === 'split'" x-transition.opacity class="mt-6 mb-4">
          <div class="p-6 rounded-[28px]" style="background: var(--bg-lift); border: 1.5px solid var(--border-sub);">
            <div class="flex items-center justify-between mb-5">
              <span class="font-display font-800 text-[13px] uppercase tracking-[0.2em]" style="color: var(--text-mid);">Split Logic</span>
              <button @click="splitPayments.push({method:'cash', amount:0})"
                      class="px-4 py-2 text-[12px] font-display font-800 uppercase tracking-[0.15em] rounded-[12px] border-none cursor-pointer transition-all active:scale-95"
                      style="background: var(--mint); color: #000;">+ Add</button>
            </div>
            <div class="space-y-3 max-h-52 overflow-y-auto no-scrollbar">
              <template x-for="(sp, idx) in splitPayments" :key="idx">
                <div class="flex gap-3 items-center">
                  <select x-model="sp.method"
                          class="flex-1 py-3 px-4 rounded-[14px] text-[13px] font-display font-800 uppercase appearance-none focus:outline-none cursor-pointer"
                          style="background: var(--bg-card); border: 1.5px solid var(--border-sub); color: var(--text-hi);">
                    <option value="cash">Cash</option>
                    <option value="mpesa">M-Pesa</option>
                    <option value="card">Card</option>
                  </select>
                  <input type="number" x-model.number="sp.amount" placeholder="0"
                         class="flex-1 py-3 px-4 rounded-[14px] text-right text-[15px] font-display font-800 focus:outline-none"
                         style="background: var(--bg-card); border: 1.5px solid var(--border-sub); color: var(--mint);">
                  <button @click="splitPayments.splice(idx, 1)"
                          class="w-9 h-9 flex items-center justify-center rounded-[12px] border-none cursor-pointer transition-all active:scale-90"
                          style="background: rgba(255,77,106,0.1); color: var(--red);">✕</button>
                </div>
              </template>
            </div>
            <div class="flex justify-between items-center mt-5 pt-4" style="border-top: 1px solid var(--border-sub);">
              <span class="text-[11px] font-display font-800 uppercase tracking-[0.3em]" style="color: var(--text-low);">Collected</span>
              <div class="font-display font-800 text-[18px] transition-colors"
                   :style="totalPaid >= cartTotal ? 'color: var(--mint)' : 'color: var(--red)'"
                   x-text="'KES ' + totalPaid.toLocaleString()"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- ── FOOTER ── -->
      <div class="px-8 pt-5 pb-8 shrink-0" style="border-top: 1px solid var(--border-sub); background: var(--bg-base);">
        <div class="flex items-end justify-between mb-5">
          <div>
            <div class="text-[11px] font-display font-800 uppercase tracking-[0.3em] mb-1" style="color: var(--text-low);">Total</div>
            <div class="font-display font-800 text-4xl text-white">KES <span x-text="cartTotal.toLocaleString()"></span></div>
          </div>
          <div class="flex items-center gap-2 px-4 py-2 rounded-[14px]"
               style="background: var(--mint-soft); border: 1.5px solid var(--border-act);">
            <div class="w-2 h-2 rounded-full animate-pulse" style="background: var(--mint);"></div>
            <span class="font-display font-800 text-[12px] uppercase tracking-[0.2em]" style="color: var(--mint);"
                  x-text="payment"></span>
          </div>
        </div>

        <button @click="checkoutLoading = true;
                  fetch('{% url 'pos:checkout' %}', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
                    body: JSON.stringify({ items: cart.items, payment_method: payment, split_payments: payment === 'split' ? splitPayments : [], coupon_code: couponApplied ? couponCode : '' })
                  })
                  .then(res => res.text())
                  .then(html => {
                    document.getElementById('modal-container').innerHTML = html;
                    checkoutLoading = false;
                    clearCart();
                  }).catch(() => { checkoutLoading = false; });"
                :disabled="checkoutLoading || itemCount === 0 || (payment === 'split' && totalPaid < cartTotal)"
                class="w-full h-14 font-display font-800 text-[16px] uppercase tracking-[0.12em] rounded-[20px] flex items-center justify-center gap-4 border-none cursor-pointer transition-all active:scale-[0.98] disabled:opacity-30 disabled:grayscale relative overflow-hidden"
                style="background: var(--mint); color: #000; box-shadow: 0 16px 48px var(--mint-glow);">
          <span x-show="!checkoutLoading" class="flex items-center gap-3">
            Complete Transaction
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
          </span>
          <span x-show="checkoutLoading" class="animate-pulse" style="color: rgba(0,0,0,0.5)">Authorizing…</span>
        </button>
      </div>
    </div>
  </div>


  <!-- ══════════════════════════════ SCAN OVERLAY ══════════════════════════════ -->
  <div x-show="scanOpen" x-cloak class="fixed inset-0 z-[250] flex flex-col items-center justify-center p-10"
       style="background: rgba(8,8,16,0.97);" x-transition.opacity>
    <div class="w-full max-w-xs relative">
      <div id="reader" class="overflow-hidden aspect-square"
           style="border-radius: var(--radius-xl); border: 2px solid var(--border-sub); box-shadow: 0 0 80px var(--mint-glow);"></div>
      <div class="scan-line"></div>
      <!-- Corner marks -->
      <div class="absolute top-4 left-4 w-8 h-8 border-t-2 border-l-2 rounded-tl-[12px]" style="border-color: var(--mint);"></div>
      <div class="absolute top-4 right-4 w-8 h-8 border-t-2 border-r-2 rounded-tr-[12px]" style="border-color: var(--mint);"></div>
      <div class="absolute bottom-4 left-4 w-8 h-8 border-b-2 border-l-2 rounded-bl-[12px]" style="border-color: var(--mint);"></div>
      <div class="absolute bottom-4 right-4 w-8 h-8 border-b-2 border-r-2 rounded-tr-[12px]" style="border-color: var(--mint);"></div>
    </div>
    <p class="mt-8 font-display font-800 text-[12px] uppercase tracking-[0.4em]" style="color: var(--text-low);">Point camera at barcode</p>
    <button @click="scanOpen = false; if(window.html5QrCode) window.html5QrCode.stop().catch(e => console.log(e));"
            class="mt-8 px-10 py-3.5 font-display font-800 text-[12px] uppercase tracking-[0.3em] rounded-[16px] border-none cursor-pointer transition-all active:scale-95"
            style="background: var(--bg-card); color: var(--text-mid); border: 1.5px solid var(--border-sub);">
      Cancel
    </button>
  </div>

</div>

<script>
  let html5QrCode;
  function startScanner() {
    if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
    window.html5QrCode = html5QrCode;
    html5QrCode.start(
      { facingMode: "environment" },
      { fps: 20, qrbox: { width: 260, height: 260 } },
      (decodedText) => {
        const app = document.querySelector('[x-data]').__x.$data;
        if (app.handleBarcode(decodedText)) {
          app.scanOpen = false;
          html5QrCode.stop();
        }
      },
      () => {}
    ).catch(err => console.error("Scanner failed", err));
  }
</script>

{% endblock %}

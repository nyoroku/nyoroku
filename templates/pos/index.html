{% extends 'base.html' %}
{% load static %}

{% block screen_title %}Checkout{% endblock %}

{% block content %}
<div class="flex flex-col h-[calc(100vh-64px)] overflow-hidden bg-[#0a0a0f] relative" 
     x-init="window.allProducts = [
        {% for p in products %}
        {
            id: '{{ p.id }}',
            name: '{{ p.name|escapejs }}',
            price: {{ p.price }},
            image: '{{ p.image }}',
            barcode: '{{ p.barcode }}',
            stock_qty: {{ p.total_stock }},
            has_variants: {{ p.has_variants|yesno:'true,false' }},
            variants: {% if p.has_variants %}{{ p.variants_json|safe }}{% else %}[]{% endif %}
        },
        {% endfor %}
     ]"
     x-data="{ checkoutLoading: false, editingQty: null, addModalOpen: false, addModalProduct: null, selectedVariant: null, addQty: 1, scanOpen: false, manualBarcode: '' }">
    
    <!-- Top Action Bar (Refined Search) -->
    <div class="px-5 py-4 flex items-center gap-4 bg-[#111118] border-b border-white/[0.08] shrink-0">
        <div class="flex-1 relative group">
            <span class="absolute left-5 top-1/2 -translate-y-1/2 text-muted/40 transition-colors group-focus-within:text-[#00e676]">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </span>
            <input type="text" name="q" hx-get="{% url 'pos:index' %}" hx-trigger="input changed delay:200ms" hx-target="#product-grid" hx-include="[name='category']" placeholder="Search products..."
                class="w-full bg-[#1a1a24] border-2 border-white/[0.05] rounded-[20px] py-4 pr-5 pl-14 text-[16px] text-white focus:ring-4 focus:ring-[#00e676]/10 focus:border-[#00e676]/80 transition-all placeholder:text-muted/20 font-medium">
        </div>
        
        <button @click="scanOpen = true; $nextTick(() => startScanner())" class="bg-[#1a1a24] border-2 border-white/[0.05] rounded-[20px] w-14 h-14 flex items-center justify-center cursor-pointer text-[#00e676] hover:bg-[#22222d] transition-all active:scale-90 shadow-lg">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9V6a2 2 0 0 1 2-2h2"/><path d="M21 9V6a2 2 0 0 0-2-2h-2"/><path d="M3 15v3a2 2 0 0 0 2 2h2"/><path d="M21 15v3a2 2 0 0 0-2 2h-2"/><line x1="7" y1="12" x2="17" y2="12"/></svg>
        </button>

        <!-- Cart Trigger Pill (Bold Island) -->
        <button x-show="itemCount > 0" x-transition.scale.origin.right x-cloak @click="cart.open = true" 
            class="bg-[#00e676] border-none rounded-[20px] h-14 px-6 cursor-pointer text-[#0a0a0f] flex items-center justify-center gap-3 font-display font-black text-[16px] shadow-[0_8px_30px_rgba(37,211,102,0.4)] active:scale-[0.98] transition-all outline-none">
            <span class="text-xl">🛒</span>
            <span x-text="itemCount" class="bg-black/10 px-2.5 py-0.5 rounded-lg text-[14px]"></span>
        </button>
    </div>

    <!-- Category Tabs (BIG, BOLD, SOLID GREEN) -->
    <div class="flex gap-3 px-5 py-4 overflow-x-auto shrink-0 no-scrollbar whitespace-nowrap bg-[#0a0a0f] border-b border-white/[0.08]" x-data="{ activeCat: '{{ active_category|default:'all' }}' }">
        <input type="hidden" name="category" :value="activeCat">
        <button hx-get="{% url 'pos:index' %}?category=all" hx-target="#product-grid" @click="activeCat = 'all'; $el.closest('div').querySelector('[name=category]').value = 'all'"
            class="rounded-[18px] px-8 py-3.5 text-[15px] font-black transition-all cursor-pointer border-2 shadow-md uppercase tracking-wider"
            :class="activeCat === 'all' ? 'bg-[#00e676] border-[#00e676] text-black shadow-[0_4px_25px_rgba(37,211,102,0.4)]' : 'bg-[#1a1a24] border-white/[0.06] text-muted-80 hover:text-white'">
            All Items
        </button>
        {% for cat in categories %}
        <button hx-get="{% url 'pos:index' %}?category={{ cat.id }}" hx-target="#product-grid" @click="activeCat = '{{ cat.id }}'; $el.closest('div').querySelector('[name=category]').value = '{{ cat.id }}'"
            class="rounded-[18px] px-8 py-3.5 text-[15px] font-black transition-all cursor-pointer border-2 shadow-md uppercase tracking-wider"
            :class="activeCat === '{{ cat.id }}' ? 'bg-[#00e676] border-[#00e676] text-black shadow-[0_4px_25px_rgba(37,211,102,0.4)]' : 'bg-[#1a1a24] border-white/[0.06] text-muted-80 hover:text-white'">
            {{ cat.name }}
        </button>
        {% endfor %}
    </div>

    <!-- Main Grid -->
    <div id="product-grid" class="flex-1 overflow-auto px-5 py-5 pb-32 grid grid-cols-2 lg:grid-cols-4 gap-5 content-start bg-[#0a0a0f]"
         @keydown.window="if($event.key === 'Enter') { handleBarcode(manualBarcode); manualBarcode = ''; } else if($event.target.tagName !== 'INPUT') { manualBarcode += $event.key; }">
        {% include 'pos/partials/product_grid.html' %}
    </div>

    <!-- Universal Add Sheet (Premium Bottom-Sheet) -->
    <div x-show="addModalOpen" x-cloak class="fixed inset-0 z-[120] flex flex-col justify-end">
        <div class="absolute inset-0 bg-black/85 backdrop-blur-md" @click="addModalOpen = false" x-transition.opacity></div>
        
        <div class="relative bg-[#111118] border-t-2 border-white/[0.1] rounded-t-[40px] w-full max-w-xl mx-auto shadow-[0_-20px_80px_rgba(37,211,102,0.15)] flex flex-col overflow-hidden max-h-[92vh]" 
             x-show="addModalOpen" 
             x-transition:enter="transition transform duration-500 cubic-bezier(0.16, 1, 0.3, 1)" 
             x-transition:enter-start="translate-y-full" 
             x-transition:enter-end="translate-y-0">
            
            <div class="p-8 flex flex-col items-center shrink-0">
                <div class="w-16 h-2 bg-white/10 rounded-full mb-8"></div>
                
                <div class="w-full flex items-start gap-8">
                    <div class="w-28 h-28 shrink-0 bg-[#1a1a24] rounded-[32px] flex items-center justify-center text-6xl border-2 border-white/[0.05] shadow-2xl">
                        <span x-text="addModalProduct?.image"></span>
                    </div>
                    <div class="flex-1 pt-3">
                        <h3 class="font-display font-black text-3xl text-white tracking-tight mb-2 leading-none" x-text="addModalProduct?.name"></h3>
                        <p class="text-2xl font-black text-[#00e676] font-display" x-text="'KES ' + (selectedVariant ? selectedVariant.price : addModalProduct?.price).toLocaleString()"></p>
                        <div class="mt-4 bg-[#00e676]/10 text-[#00e676] rounded-xl px-4 py-1.5 inline-block text-[12px] font-black uppercase tracking-wider border border-[#00e676]/20">Stock: <span x-text="selectedVariant ? selectedVariant.stock_qty : addModalProduct?.stock_qty"></span></div>
                    </div>
                </div>
            </div>

            <!-- Variants Selection -->
            <template x-if="addModalProduct?.variants && addModalProduct.variants.length > 0">
                <div class="px-8 pb-6">
                    <h4 class="text-[12px] font-black text-muted uppercase tracking-[0.25em] mb-4 opacity-50">Select Preference</h4>
                    <div class="flex flex-wrap gap-3">
                        <template x-for="v in addModalProduct?.variants" :key="v.id">
                            <button @click="selectedVariant = v; addQty = 1;"
                                    class="px-6 py-5 rounded-[24px] border-2 transition-all cursor-pointer min-w-[110px] flex flex-col items-center gap-1 active:scale-95"
                                    :class="selectedVariant?.id === v.id ? 'bg-[#00e676] border-[#00e676] text-black shadow-[0_4px_20px_rgba(37,211,102,0.4)]' : 'bg-[#1a1a24] border-transparent text-white/50 hover:border-white/10'">
                                <div class="font-black text-[15px]" x-text="v.options.join(' / ')"></div>
                                <div class="text-[11px] font-bold opacity-60" x-text="'KES ' + v.price.toLocaleString()"></div>
                            </button>
                        </template>
                    </div>
                </div>
            </template>

            <!-- Quantity & Actions -->
            <div x-show="(!addModalProduct?.variants?.length) || selectedVariant" x-transition.opacity>
                <div class="p-8 pt-4 bg-[#1a1a24]/50 border-t border-white/[0.05]">
                    <div class="flex items-center justify-between bg-black/40 rounded-[32px] p-3 border border-white/[0.08] mb-10 shadow-inner">
                         <button @click="if(addQty > 1) addQty--" class="w-20 h-20 rounded-[28px] bg-[#22222d] border-2 border-white/[0.05] flex items-center justify-center text-white/40 active:scale-90 transition-all cursor-pointer hover:text-white">
                             <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
                         </button>
                         <div class="flex flex-col items-center">
                             <span class="text-5xl font-display font-black text-white tabular-nums tracking-tighter" x-text="addQty"></span>
                             <span class="text-[12px] font-black text-muted uppercase tracking-[0.3em] mt-2 opacity-50">Select Qty</span>
                         </div>
                         <button @click="
                             let maxStock = selectedVariant ? selectedVariant.stock_qty : addModalProduct?.stock_qty;
                             let currentId = selectedVariant ? selectedVariant.id : addModalProduct?.id;
                             let inCart = cart.items.find(i => i.id === currentId)?.qty || 0;
                             if(addQty < (maxStock - inCart)) { addQty++; } else { alert('Inventory Limit Reached'); }
                         " class="w-20 h-20 rounded-[28px] bg-[#22222d] border-2 border-white/[0.05] flex items-center justify-center text-white/40 active:scale-90 transition-all cursor-pointer hover:text-[#00e676]">
                             <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                         </button>
                    </div>

                    <button @click="
                            let p = selectedVariant ? {
                                id: selectedVariant.id,
                                parent_id: addModalProduct.id,
                                name: selectedVariant.name,
                                price: selectedVariant.price,
                                stock_qty: selectedVariant.stock_qty,
                                image: addModalProduct.image
                            } : {
                                id: addModalProduct.id,
                                name: addModalProduct.name,
                                price: addModalProduct.price,
                                stock_qty: addModalProduct.stock_qty,
                                image: addModalProduct.image
                            };
                            if(addToCart(p, addQty)) { addModalOpen = false; }
                        " 
                        class="w-full h-20 bg-[#00e676] text-black font-black text-2xl rounded-[28px] shadow-[0_15px_45px_rgba(37,211,102,0.4)] active:scale-[0.98] transition-all border-none cursor-pointer flex items-center justify-center gap-4 uppercase tracking-wider">
                        <span>Add To Basket</span>
                        <div class="h-2 w-2 rounded-full bg-black/20"></div>
                        <span x-text="'KES ' + ((selectedVariant ? selectedVariant.price : addModalProduct?.price) * addQty).toLocaleString()"></span>
                    </button>
                    <div class="h-10"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Cart Sheet -->
    <div x-show="cart.open" x-cloak class="fixed inset-0 z-[150] flex flex-col justify-end">
        <div class="absolute inset-0 bg-black/90 backdrop-blur-md" @click="cart.open = false" x-transition.opacity></div>
        
        <div class="relative bg-[#111118] border-t-2 border-white/[0.08] rounded-t-[44px] w-full max-w-2xl mx-auto shadow-[0_-30px_100px_rgba(0,0,0,0.8)] flex flex-col max-h-[94vh]" 
             x-transition:enter="transition transform duration-500 cubic-bezier(0.2, 1, 0.2, 1)" x-transition:enter-start="translate-y-full" x-transition:enter-end="translate-y-0">
            
            <div class="p-8 flex flex-col items-center shrink-0 border-b border-white/[0.06]">
                <div class="w-16 h-2 bg-white/10 rounded-full mb-8"></div>
                <div class="w-full flex items-end justify-between">
                    <div>
                        <h2 class="font-display font-black text-4xl text-white tracking-tighter leading-none">Your Basket</h2>
                        <div class="inline-block bg-[#00e676]/10 text-[#00e676] px-3 py-1 rounded-lg text-[12px] font-black mt-4 uppercase tracking-[0.2em]" x-text="itemCount + ' items'"></div>
                    </div>
                    <button @click="clearCart()" class="px-6 py-3 bg-brand-red/10 text-brand-red text-[12px] font-black uppercase rounded-2xl border-2 border-brand-red/15 cursor-pointer active:scale-95 transition-all outline-none">Clear Basket</button>
                </div>
            </div>

            <!-- Payment Methods (BIG BOLD SOLID GREEN) -->
            <div class="px-8 py-6 shrink-0 border-b border-white/[0.04]">
                <div class="bg-black/30 p-2 rounded-[28px] flex gap-2 border-2 border-white/[0.05] shadow-inner h-[76px] items-stretch">
                   <template x-for="mode in ['cash','mpesa','card','split']" :key="mode">
                        <button @click="payment = mode" 
                                class="flex-1 rounded-[22px] text-[13px] font-black uppercase tracking-[0.2em] transition-all duration-400 border-none cursor-pointer" 
                                :class="payment === mode ? 'bg-[#00e676] text-black shadow-[0_8px_25px_rgba(37,211,102,0.4)] scale-105' : 'bg-transparent text-muted/50 hover:text-white'">
                            <span x-text="mode"></span>
                        </button>
                   </template>
                </div>
            </div>

            <!-- Items List -->
            <div class="flex-1 overflow-auto px-8 py-5 custom-scrollbar bg-black/5">
                <template x-for="item in cart.items" :key="item.id">
                    <div class="flex items-center gap-6 py-6 border-b border-white/[0.05] first:pt-0 last:border-b-0 animate-fade-in group">
                        <div class="w-20 h-20 shrink-0 bg-[#1a1a24] rounded-[28px] flex items-center justify-center text-5xl border-2 border-white/[0.03] shadow-md transform group-hover:scale-105 transition-transform" x-text="item.image"></div>
                        <div class="flex-1 min-w-0">
                            <div class="text-white font-black text-lg truncate mb-1.5" x-text="item.name"></div>
                            <div class="text-[#00e676] text-[16px] font-black flex items-center gap-3 cursor-pointer transition-opacity hover:opacity-80" @click="let d = prompt('Apply discount per unit:', item.discount || 0); if(d!==null) setLineDiscount(item.id, d)">
                                KES <span x-text="(item.price - (item.discount || 0)).toLocaleString()"></span>
                                <template x-if="item.discount > 0">
                                    <span class="line-through text-white/10 text-[12px] bg-white/5 px-2 rounded" x-text="'Orig: ' + item.price"></span>
                                </template>
                            </div>
                        </div>
                        <div class="flex flex-col items-end gap-3">
                            <div class="flex items-center bg-[#1a1a24] rounded-[20px] p-2 gap-2 border-2 border-white/[0.05] shadow-xl">
                                <button @click="updateQty(item.id, -1)" class="w-10 h-10 flex items-center justify-center rounded-xl bg-[#22222d] text-white/30 hover:text-white border-none cursor-pointer transition-colors active:scale-90"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
                                <span class="w-8 text-center text-lg font-black text-white tabular-nums" x-text="item.qty"></span>
                                <button @click="updateQty(item.id, 1)" class="w-10 h-10 flex items-center justify-center rounded-xl bg-[#22222d] text-white/30 hover:text-white border-none cursor-pointer transition-colors active:scale-90"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
                            </div>
                        </div>
                    </div>
                </template>
                
                <!-- SPLIT PAYMENT ROW SECTION -->
                <div x-show="payment === 'split'" x-transition:enter="transition ease-out duration-300" class="mt-10 mb-6">
                    <div class="p-8 bg-[#1a1a24] border-2 border-white/[0.08] rounded-[36px] shadow-2xl">
                        <div class="flex justify-between items-center mb-6">
                            <h4 class="font-display font-black text-xl text-white tracking-tight">Split Summary</h4>
                            <button @click="splitPayments.push({method:'cash', amount:0})" class="px-6 py-3 bg-[#00e676] text-black text-[11px] font-black uppercase rounded-2xl shadow-lg cursor-pointer active:scale-95 transition-all outline-none border-none">+ Method</button>
                        </div>
                        
                        <div class="space-y-4 max-h-[300px] overflow-y-auto no-scrollbar pr-1">
                            <template x-for="(sp, idx) in splitPayments" :key="idx">
                                <div class="flex gap-4 items-center bg-black/30 p-3 rounded-[24px] border border-white/5">
                                    <div class="w-[40%] relative">
                                        <select x-model="sp.method" class="w-full p-4 bg-[#111118] border-2 border-white/[0.1] rounded-2xl text-[14px] text-white font-black uppercase appearance-none focus:border-[#00e676] outline-none">
                                            <option value="cash">Cash</option>
                                            <option value="mpesa">M-Pesa</option>
                                            <option value="card">Card</option>
                                        </select>
                                    </div>
                                    <div class="flex-1 relative">
                                        <input type="number" x-model.number="sp.amount" placeholder="0.00"
                                               class="w-full p-4 pr-12 bg-[#111118] text-[#00e676] font-display font-black border-2 border-white/[0.1] rounded-2xl text-right text-[18px] focus:ring-4 focus:ring-[#00e676]/10 outline-none">
                                    </div>
                                    <button @click="splitPayments.splice(idx, 1)" class="w-12 h-12 flex items-center justify-center rounded-2xl bg-brand-red/10 text-brand-red hover:bg-brand-red hover:text-white transition-all cursor-pointer border-none active:scale-90 shadow-sm">✕</button>
                                </div>
                            </template>
                        </div>
                        
                        <div class="flex justify-between items-center mt-8 pt-6 border-t-2 border-white/[0.05]">
                            <span class="text-muted/40 font-black text-[12px] uppercase tracking-[0.3em]">Total Collected</span>
                            <div class="text-right">
                                <div class="text-2xl font-display font-black transition-colors" :class="totalPaid >= cartTotal ? 'text-[#00e676] drop-shadow-glow' : 'text-[#ff1744]'">
                                    KES <span x-text="totalPaid.toLocaleString()"></span>
                                </div>
                                <div x-show="totalPaid < cartTotal" class="text-[10px] font-black text-[#ff1744]/70 mt-1 uppercase" x-text="'Deficit: ' + (cartTotal - totalPaid).toLocaleString()"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Footer Area (Final Charge) -->
            <div class="p-10 bg-[#0a0a0f] border-t-2 border-white/[0.08] shrink-0 shadow-2xl">
                <div class="flex justify-between items-end mb-8">
                    <div>
                        <h5 class="text-white/20 text-[12px] font-black uppercase tracking-[0.4em] mb-2 leading-none">Closing Total</h5>
                        <div class="text-5xl font-display font-black text-[#00e676] leading-none tracking-tighter">KES <span x-text="cartTotal.toLocaleString()"></span></div>
                    </div>
                    <div class="text-right pb-1">
                        <div class="inline-flex items-center gap-2.5 bg-[#00e676]/10 border border-[#00e676]/20 px-4 py-1.5 rounded-xl">
                           <div class="w-2 h-2 rounded-full bg-[#00e676] animate-pulse"></div>
                           <span class="text-[#00e676] font-black text-[13px] uppercase tracking-[0.15em]" x-text="payment"></span>
                        </div>
                    </div>
                </div>
                
                <button @click="checkoutLoading = true; 
                          fetch('{% url 'pos:checkout' %}', {
                              method: 'POST',
                              headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
                              body: JSON.stringify({ items: cart.items, payment_method: payment, split_payments: payment === 'split' ? splitPayments : [], coupon_code: couponApplied ? couponCode : '' })
                          })
                          .then(res => res.text())
                          .then(html => {
                              document.getElementById('modal-container').innerHTML = html;
                              checkoutLoading = false;
                              clearCart();
                          }).catch(err => { checkoutLoading = false; });"
                  :disabled="checkoutLoading || itemCount === 0 || (payment === 'split' && totalPaid < cartTotal)"
                  class="w-full h-24 bg-[#00e676] text-black font-black text-3xl rounded-[36px] shadow-[0_20px_60px_rgba(37,211,102,0.4)] border-none cursor-pointer active:scale-95 transition-all relative overflow-hidden group disabled:opacity-20 disabled:grayscale uppercase tracking-widest">
                    <div class="absolute inset-x-0 bottom-0 top-0 bg-white/25 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    <span x-show="!checkoutLoading" class="flex items-center justify-center gap-4">
                        <span>Finalize Sale</span>
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                    </span>
                    <span x-show="checkoutLoading" class="flex gap-4 items-center justify-center animate-pulse">
                        Proccessing Payment...
                    </span>
                </button>
            </div>
        </div>
    </div>

    <!-- Scan Barcode overlay (CAMERA CAPABLE) -->
    <div x-show="scanOpen" x-cloak class="fixed inset-0 z-[200] bg-black Backdrop-blur-2xl flex flex-col items-center justify-center p-8" x-transition.opacity>
        <div class="w-full max-w-sm relative">
            <div id="reader" class="rounded-[40px] overflow-hidden border-4 border-white/[0.05] shadow-[0_0_100px_rgba(37,211,102,0.15)] bg-black aspect-square"></div>
            <!-- Overlay UI -->
            <div class="absolute inset-0 pointer-events-none flex flex-col items-center justify-center">
                <div class="w-3/4 h-[2px] bg-[#00e676] shadow-[0_0_20px_rgba(37,211,102,1)] rounded-full animate-[pulse_1s_infinite]"></div>
            </div>
            
            <div class="absolute -top-4 -left-4 w-16 h-16 border-t-8 border-l-8 border-[#00e676] rounded-tl-[40px] pointer-events-none drop-shadow-glow"></div>
            <div class="absolute -top-4 -right-4 w-16 h-16 border-t-8 border-r-8 border-[#00e676] rounded-tr-[40px] pointer-events-none drop-shadow-glow"></div>
            <div class="absolute -bottom-4 -left-4 w-16 h-16 border-b-8 border-l-8 border-[#00e676] rounded-bl-[40px] pointer-events-none drop-shadow-glow"></div>
            <div class="absolute -bottom-4 -right-4 w-16 h-16 border-b-8 border-r-8 border-[#00e676] rounded-br-[40px] pointer-events-none drop-shadow-glow"></div>
        </div>

        <div class="mt-16 w-full max-w-sm space-y-6">
            <div class="relative">
                <input type="text" x-model="manualBarcode" @keyup.enter="console.log('manual enter'); handleBarcode(manualBarcode); scanOpen = false; manualBarcode = ''; if(html5QrCode) html5QrCode.stop();"
                       placeholder="Enter Code Manually..." 
                       class="w-full bg-white/5 border-2 border-white/10 rounded-[28px] px-8 py-5 text-white text-center font-display font-black text-xl focus:border-[#00e676] outline-none transition-all placeholder:opacity-20 uppercase tracking-widest">
            </div>
            <button @click="scanOpen = false; if(window.html5QrCode) window.html5QrCode.stop().catch(e => console.log(e));" class="w-full py-6 text-white/30 font-black uppercase text-[12px] tracking-[0.4em] hover:text-[#ff1744] transition-colors bg-transparent border-2 border-white/5 rounded-[28px] cursor-pointer active:scale-95 shadow-sm">
                Terminate Scanner
            </button>
        </div>
    </div>

</div>

<script>
    let html5QrCode;
    function startScanner() {
        if (!html5QrCode) {
            html5QrCode = new Html5Qrcode("reader");
        }
        window.html5QrCode = html5QrCode;
        
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };
        
        html5QrCode.start(
            { facingMode: "environment" }, 
            config, 
            (decodedText, decodedResult) => {
                // Success
                console.log(`Code matched = ${decodedText}`, decodedResult);
                // Trigger Alpine handleBarcode
                const app = document.querySelector('[x-data]').__x.$data;
                if (app.handleBarcode(decodedText)) {
                    app.scanOpen = false;
                    html5QrCode.stop();
                }
            },
            (errorMessage) => {
                // parse error, ignore it.
            }
        ).catch((err) => {
            console.error("Camera error", err);
        });
    }
</script>
{% endblock %}

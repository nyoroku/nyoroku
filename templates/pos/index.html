{% extends 'base.html' %}
{% load static %}

{% block extra_head %}
<script>
window.allProducts = [
  {% for p in products %}
  {
    id:          "{{ p.id }}",
    name:        "{{ p.name|escapejs }}",
    price:       {{ p.safe_price|default:0 }},
    image:       "{{ p.image|default:'📦'|escapejs }}",
    stock_qty:   {{ p.total_stock|default:0 }},
    has_variants: {{ p.has_variants|yesno:"true,false" }},
    variants:    {{ p.safe_variants_json|default:"[]"|safe }},
    option_types: {{ p.safe_option_types_json|default:"[]"|safe }}
  }{% if not forloop.last %},{% endif %}
  {% endfor %}
];
</script>
{% endblock %}

{% block content %}
<style>
.ns::-webkit-scrollbar{display:none}.ns{-ms-overflow-style:none;scrollbar-width:none}
.product-row { touch-action: manipulation; }
.product-row:active { background: #e1b38222 !important; }
</style>

<div x-data="{
  posView: 'shop',
  selectedCatId: '',
  expandedProductId: null,
  inlineQty: 1
}" class="flex flex-col" style="height:calc(100vh - 56px - 64px)">

  <!-- ═══════ TOP BAR ═══════ -->
  <div class="shrink-0 px-4 py-3" style="background: #2d545e;">
    <div class="flex items-center gap-3">
      <!-- Back button (payment view only) -->
      <button x-show="posView === 'payment'" x-cloak
              @click="posView = 'shop'"
              class="shrink-0 w-10 h-10 flex items-center justify-center rounded-xl active:scale-90 transition-all"
              style="background: rgba(255,255,255,0.15); color: white">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg>
      </button>

      <!-- Title / Search -->
      <div class="flex-1 flex items-center rounded-xl overflow-hidden" style="background: rgba(255,255,255,0.12)">
        <span class="pl-3" style="color: rgba(255,255,255,0.5)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </span>
        <input id="search-input" type="text" name="q"
               hx-get="{% url 'pos:index' %}" hx-trigger="input changed delay:200ms, search"
               hx-target="#product-list" hx-include="[name='category']"
               placeholder="Search products..."
               class="flex-1 px-3 py-3 text-base font-medium bg-transparent border-none outline-none"
               style="color: white"
               autocomplete="off" autocorrect="off" spellcheck="false">
      </div>
    </div>
  </div>

  <!-- Hidden category input for HTMX filtering -->
  <input type="hidden" name="category" value="{{ active_category|default:'all' }}" id="cat-input">

  <!-- ═══════ VIEW: SHOP (single page) ═══════ -->
  <div x-show="posView === 'shop'" x-transition class="flex-1 flex flex-col overflow-hidden" style="background: #F8F9FB">

    <div class="flex-1 overflow-auto ns" :style="itemCount > 0 ? 'padding-bottom: 180px' : ''">

      <!-- Category Filters (vertical radio list) -->
      <div class="px-4 py-4 bg-white border-b" style="border-color: #E5E7EB">
        <h3 class="font-bold text-[10px] uppercase tracking-wider mb-3" style="color: #6B7280">Categories</h3>
        <div class="flex flex-col gap-2">
          {% for cat in categories %}
          <label class="flex items-center gap-3 cursor-pointer p-2.5 rounded-xl border transition-all active:scale-[0.98]"
                 :style="selectedCatId === '{{ cat.id }}' ? 'background: #2d545e12; border-color: #2d545e' : 'background: white; border-color: #E5E7EB'">
            <input type="radio" name="cat_filter" value="{{ cat.id }}"
                   @change="selectedCatId = '{{ cat.id }}';
                            document.getElementById('cat-input').value = '{{ cat.id }}';
                            htmx.ajax('GET','{% url 'pos:index' %}',{target:'#product-list',values:{category:'{{ cat.id }}',q:''}})"
                   :checked="selectedCatId === '{{ cat.id }}'"
                   class="w-4 h-4 text-[#2d545e] border-gray-300 focus:ring-[#2d545e]">
            <div class="flex items-center gap-2 flex-1">
              <span class="text-xl">{{ cat.image|default:"📂" }}</span>
              <span class="font-semibold text-sm" style="color: #12343b">{{ cat.name }}</span>
            </div>
            <span class="text-xs font-mono font-medium px-2 py-0.5 rounded-lg" style="background: #F8F9FB; color: #6B7280">{{ cat.products.count }}</span>
          </label>
          {% endfor %}
        </div>
      </div>

      <!-- Products Grid -->
      <div id="product-list">
        {% include 'pos/partials/product_list.html' %}
      </div>

    </div>

    <!-- ═══════ DOCKED BOTTOM CART ═══════ -->
    <div x-show="itemCount > 0" x-cloak x-transition
         class="fixed bottom-[64px] left-0 right-0 z-[100] bg-white border-t shadow-lg"
         style="border-color: #E5E7EB; box-shadow: 0 -4px 20px rgba(0,0,0,0.08)">

      <!-- Cart items (compact, scrollable) -->
      <div class="max-h-[140px] overflow-auto ns px-4 py-2">
        <template x-for="(item, idx) in cart.items" :key="item.id">
          <div class="flex items-center gap-3 py-2 border-b last:border-0" style="border-color:#F3F4F6">
            <!-- Name + variant info -->
            <div class="flex-1 min-w-0">
              <div class="text-sm font-semibold truncate" style="color:#12343b" x-text="item.name"></div>
              <div class="flex items-center gap-2 mt-0.5">
                <span class="text-[10px] font-mono" style="color:#9CA3AF" x-text="'Fixed: KES ' + Number(item.price).toLocaleString()"></span>
              </div>
            </div>

            <!-- Adjustable price -->
            <div class="flex items-center gap-1">
              <span class="text-[10px] font-bold uppercase" style="color:#e1b382">Sell@</span>
              <input type="number" :value="item.sale_price || item.price"
                     @change="setLinePrice(item.id, $event.target.value)"
                     class="w-16 text-xs font-bold font-mono tabular rounded-lg px-1.5 py-1 text-right focus:outline-none"
                     style="color:#2d545e;background:#F8F9FB;border:1px solid #E5E7EB">
            </div>

            <!-- Qty stepper -->
            <div class="flex items-center rounded-lg shrink-0" style="background:#F8F9FB;border:1px solid #E5E7EB">
              <button @click="updateQty(item.id,-1)" class="w-7 h-7 flex items-center justify-center active:scale-90" style="color:#6B7280">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="5" y1="12" x2="19" y2="12"/></svg>
              </button>
              <span class="w-5 text-center font-bold text-xs tabular" style="color:#12343b" x-text="item.qty"></span>
              <button @click="updateQty(item.id,1)" class="w-7 h-7 flex items-center justify-center active:scale-90" style="color:#2d545e">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              </button>
            </div>

            <!-- Line total -->
            <span class="font-bold text-xs font-mono tabular shrink-0" style="color:#2d545e" x-text="'KES ' + (((item.sale_price || item.price)) * item.qty).toLocaleString()"></span>
          </div>
        </template>
      </div>

      <!-- Total + Proceed -->
      <div class="px-4 py-3 flex items-center gap-4 border-t" style="border-color:#E5E7EB">
        <div class="flex-1">
          <div class="text-[10px] font-semibold uppercase tracking-wider" style="color:#6B7280">Total</div>
          <div class="font-bold text-xl font-mono tabular leading-none" style="color:#12343b">KES <span x-text="cartTotal.toLocaleString()"></span></div>
        </div>
        <button @click="posView = 'payment'"
                class="px-6 py-3 font-bold text-sm rounded-2xl transition-all active:scale-95"
                style="background:#2d545e;color:white">
          Proceed to Payment →
        </button>
      </div>
    </div>
  </div>

  <!-- ═══════ VIEW: PAYMENT ═══════ -->
  <div x-show="posView === 'payment'" x-transition class="flex-1 flex flex-col overflow-hidden ns" style="background: #F8F9FB">
    <!-- Header -->
    <div class="px-5 py-4 bg-white border-b flex items-center justify-between" style="border-color: #E5E7EB">
      <div class="flex items-center gap-3">
        <button @click="posView='shop'" class="shrink-0 w-10 h-10 flex items-center justify-center rounded-xl bg-gray-100 hover:bg-gray-200 transition-all">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#12343b" stroke-width="2.5"><path d="M19 12H5"/><path d="m12 5-7 7 7 7"/></svg>
        </button>
        <h2 class="font-bold text-xl" style="color: #12343b">Complete Payment</h2>
      </div>
      <div class="text-right">
        <div class="text-[10px] font-semibold uppercase tracking-wider" style="color:#6B7280">Grand Total</div>
        <div class="font-bold text-2xl font-mono tabular leading-none" style="color:#12343b">KES <span x-text="cartTotal.toLocaleString()"></span></div>
      </div>
    </div>

    <div class="flex-1 overflow-auto ns p-5 max-w-lg mx-auto w-full">
      <p class="text-[10px] font-semibold uppercase tracking-wider mb-2" style="color:#6B7280">Payment Method</p>
      <div class="grid grid-cols-2 gap-3 mb-6">
        <template x-for="m in [{key:'cash',icon:'💵',label:'Cash'},{key:'mpesa',icon:'📱',label:'M-Pesa'},{key:'card',icon:'💳',label:'Card'},{key:'split',icon:'✂️',label:'Split'}]" :key="m.key">
          <button @click="payment=m.key; if(m.key==='split' && splitPayments.length===0) splitPayments.push({method:'cash',amount:0})"
                  class="flex flex-col items-center gap-2 p-4 border rounded-2xl transition-all min-h-[80px]"
                  :style="payment === m.key ? 'background:#2d545e15;border-color:#2d545e;color:#12343b' : 'background:white;border-color:#E5E7EB;color:#6B7280'">
            <span class="text-2xl" x-text="m.icon"></span>
            <span class="font-semibold text-sm" x-text="m.label"></span>
          </button>
        </template>
      </div>

      <template x-if="payment==='split'">
        <div class="mb-6">
          <div class="flex items-center justify-between mb-2">
            <p class="text-[10px] font-semibold uppercase tracking-wider" style="color:#6B7280">Split Details</p>
            <button @click="splitPayments.push({method:'cash',amount:0})" class="btn px-3 py-1.5 text-xs rounded-xl" style="background:#2d545e;color:white">+ Add</button>
          </div>
          <div class="space-y-2 mb-3">
            <template x-for="(sp, idx) in splitPayments" :key="idx">
              <div class="flex items-center gap-2 p-2 rounded-xl" style="background:white;border:1px solid #E5E7EB">
                <select x-model="sp.method" class="text-sm font-semibold rounded-lg px-2 py-1.5 focus:outline-none" style="background:#F8F9FB;border:1px solid #E5E7EB;color:#12343b">
                  <option value="cash">Cash</option>
                  <option value="mpesa">M-Pesa</option>
                  <option value="card">Card</option>
                </select>
                <input type="number" x-model.number="sp.amount" placeholder="0" class="flex-1 text-right font-bold text-sm font-mono rounded-lg px-2 py-1.5 focus:outline-none" style="background:#F8F9FB;border:1px solid #E5E7EB;color:#2d545e">
                <button @click="splitPayments.splice(idx,1)" style="color:#DC2626" class="p-1 active:scale-90">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
              </div>
            </template>
          </div>
          <div class="p-4 rounded-xl" style="background:white;border:1px solid #E5E7EB">
            <div class="flex justify-between text-sm font-semibold mb-2">
              <span style="color:#6B7280">Collected Amount</span>
              <span class="font-mono tabular" :style="totalPaid >= cartTotal ? 'color:#16A34A' : 'color:#DC2626'" x-text="'KES ' + totalPaid.toLocaleString()"></span>
            </div>
            <div class="w-full h-2 rounded-full overflow-hidden" style="background:#F8F9FB">
              <div class="h-full transition-all duration-300 rounded-full"
                   :style="`width:${Math.min(100,cartTotal>0?(totalPaid/cartTotal)*100:0)}%;background:${totalPaid >= cartTotal ? '#16A34A' : '#F59E0B'}`"></div>
            </div>
          </div>
        </div>
      </template>

      <!-- Checkout Execute Button -->
      <button @click="checkoutLoading=true;
                fetch('{% url 'pos:checkout' %}', {
                  method:'POST',
                  headers:{'Content-Type':'application/json','X-CSRFToken':'{{ csrf_token }}'},
                  body: JSON.stringify({
                    items: cart.items.map(i => ({...i, sale_price: i.sale_price || i.price})),
                    payment_method: payment,
                    split_payments: payment==='split' ? splitPayments : [],
                    coupon_code: couponApplied ? couponCode : ''
                  })
                })
                .then(r => r.text())
                .then(html => { document.getElementById('modal-container').innerHTML = html; checkoutLoading = false; clearCart(); posView='shop'; })
                .catch(() => { checkoutLoading = false })"
              :disabled="checkoutLoading || itemCount===0 || (payment==='split' && totalPaid<cartTotal)"
              class="btn w-full h-14 text-base font-semibold rounded-2xl transition-all disabled:opacity-40"
              style="background:#16A34A;color:white">
        <span x-show="!checkoutLoading" class="flex items-center gap-3">
          <span>Complete Sale</span>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        </span>
        <span x-show="checkoutLoading" class="animate-pulse">Processing...</span>
      </button>
    </div>
  </div>

</div>

<!-- Receipt modal container -->
<div id="modal-container"></div>
{% endblock %}

{% extends 'base.html' %}
{% load static %}

{% block screen_title %}POS
<script>
// ─── Safe product registry — lives outside any HTML attribute,
//     so JSON special chars (quotes, semicolons, braces) are harmless.
window.allProducts = [
  {% for p in products %}{
    id:          "{{ p.id }}",
    name:        "{{ p.name|escapejs }}",
    price:       {{ p.safe_price|default:0 }},
    image:       "{{ p.image|default:'🛍️'|escapejs }}",
    barcode:     "{{ p.barcode|default:''|escapejs }}",
    stock_qty:   {{ p.total_stock|default:0 }},
    has_variants: {{ p.has_variants|yesno:"true,false" }},
    variants:    {{ p.safe_variants_json|default:"[]"|safe }}
  }{% if not forloop.last %},{% endif %}
  {% endfor %}
];
</script>
{% endblock %}

{% block content %}
<style>
:root {
  --primary:    #2563EB;
  --success:    #16A34A;
  --warning:    #F59E0B;
  --danger:     #DC2626;
  --bg-main:    #F8F9FB;
  --bg-surface: #FFFFFF;
  --border:     #E5E7EB;
  --text-primary:   #111827;
  --text-secondary: #6B7280;
  --cart-bg:    #F1F5F9;
  --selected-item: #DBEAFE;
  --hover:      #F3F4F6;
  --nav-h:      64px;
}
*,*::before,*::after{box-sizing:border-box}
body{font-family:'Inter', sans-serif; background: var(--bg-main); color: var(--text-primary);}
.font-mono{font-family:'JetBrains Mono', monospace}
.tabular{font-variant-numeric: tabular-nums}

[x-cloak]{display:none!important}
.ns::-webkit-scrollbar{display:none}.ns{-ms-overflow-style:none;scrollbar-width:none}

.btn-primary { 
  background: var(--primary); 
  color: white; 
  font-weight: 600; 
  border-radius: 12px;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border: none;
}
.btn-primary:active { transform: scale(0.98); opacity: 0.9; }

.btn-success { 
  background: var(--success); 
  color: white; 
  font-weight: 700; 
  border-radius: 12px;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border: none;
}
.btn-success:active { transform: scale(0.98); }

.srch:focus{border-color:var(--primary)!important;box-shadow:0 0 0 3px rgba(37,99,235,0.1)!important;outline:none}
.srch::placeholder{color:var(--text-secondary)}

.cta-dock{
  position:sticky;bottom:0;
  padding:16px 20px calc(var(--nav-h) + 16px);
  background:var(--bg-surface);
  border-top:1px solid var(--border);
  z-index:10;
}
#modal-container{position:fixed;inset:0;z-index:9999;pointer-events:none}
#modal-container:not(:empty){pointer-events:all}
</style>

<!-- ═══ RECEIPT MODAL CONTAINER ═══ -->
<div id="modal-container"></div>

<div class="flex flex-col overflow-hidden"
     style="height:calc(100vh - 64px); background:var(--bg-main)">

  <!-- ══════════ HEADER ══════════ -->
  <header class="shrink-0 flex items-center gap-3 px-4 py-3"
          style="background:var(--bg-surface); border-bottom:1px solid var(--border)">

    <div class="text-primary font-bold text-[18px] tracking-tight shrink-0">
      Eli POS
    </div>

    <div class="flex-1 relative flex items-center"
         style="background:var(--bg-main); border:1px solid var(--border); border-radius:12px; overflow:hidden"
         id="search-wrap">
      <span class="pl-3 shrink-0 text-text-secondary">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </span>
      <input id="search-input" type="text" name="q"
             hx-get="{% url 'pos:index' %}" hx-trigger="input changed delay:200ms, search"
             hx-target="#product-grid" hx-include="[name='category']"
             placeholder="Search products..."
             class="srch flex-1 px-2.5 py-2 text-[14px] font-medium bg-transparent border-none text-text-primary"
             autocomplete="off" autocorrect="off" spellcheck="false">
      <button onclick="let i=document.getElementById('search-input');i.value='';i.dispatchEvent(new Event('input'));i.focus()"
              class="shrink-0 mr-2 w-5 h-5 flex items-center justify-center rounded-full opacity-0 transition-opacity bg-border text-text-secondary"
              id="search-clear" title="Clear">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <button @click="scanOpen=true; $nextTick(()=>startScanner())"
            class="shrink-0 w-10 h-10 flex items-center justify-center border border-border rounded-xl text-primary bg-surface hover:bg-hover transition-colors">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9V6a2 2 0 0 1 2-2h2"/><path d="M21 9V6a2 2 0 0 0-2-2h-2"/><path d="M3 15v3a2 2 0 0 0 2 2h2"/><path d="M21 15v3a2 2 0 0 0-2 2h-2"/><line x1="7" y1="12" x2="17" y2="12"/></svg>
    </button>

    <button x-show="itemCount>0" x-cloak @click="cart.open=true"
            class="shrink-0 h-10 px-4 flex items-center gap-2 bg-primary text-white font-bold text-[14px] rounded-xl shadow-sm hover:opacity-90 active:scale-95 transition-all">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      <span x-text="itemCount"></span>
    </button>
  </header>

  <!-- ══════════ CATEGORY TABS ══════════ -->
  <div class="shrink-0 flex items-center gap-2 px-4 py-2 overflow-x-auto ns"
       style="background:var(--bg-surface); border-bottom:1px solid var(--border)"
       x-data="{activeCat:'{{ active_category|default:'all' }}'}">
    <input type="hidden" name="category" :value="activeCat">

    <button hx-get="{% url 'pos:index' %}" hx-vals='{"category":"all"}' hx-target="#product-grid" hx-include="[name='q']"
            @click="activeCat='all'"
            class="shrink-0 font-bold text-[12px] uppercase tracking-wide px-5 py-2 cursor-pointer transition-all border border-border rounded-lg"
            :class="activeCat === 'all' ? 'bg-primary text-white border-primary' : 'bg-surface text-text-secondary hover:bg-hover'">All</button>

    {% for cat in categories %}
    <button hx-get="{% url 'pos:index' %}" hx-vals='{"category":"{{ cat.id }}"}' hx-target="#product-grid" hx-include="[name='q']"
            @click="activeCat='{{ cat.id }}'"
            class="shrink-0 font-bold text-[12px] uppercase tracking-wide px-5 py-2 cursor-pointer transition-all border border-border rounded-lg"
            :class="activeCat === '{{ cat.id }}' ? 'bg-primary text-white border-primary' : 'bg-surface text-text-secondary hover:bg-hover'">{{ cat.name }}</button>
    {% endfor %}
  </div>

  <!-- ══════════ PRODUCT GRID ══════════ -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <div id="product-grid"
         class="flex-1 overflow-auto ns flex flex-col"
         @keydown.window="if($event.key==='Enter'){handleBarcode(manualBarcode);manualBarcode='';}else if($event.target.tagName!=='INPUT'){manualBarcode+=$event.key;}">
      {% include 'pos/partials/product_grid.html' %}
    </div>
  </div>

  <!-- ══════════ ADD-TO-CART MODAL ══════════ -->
  <div x-show="addModalOpen" x-cloak class="fixed inset-0 z-[300] flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm cursor-pointer"
         @click="addModalOpen=false"
         x-transition.opacity></div>

    <div class="relative w-full max-w-sm flex flex-col bg-surface border border-border rounded-[32px] shadow-2xl overflow-hidden"
         x-show="addModalOpen"
         x-transition:enter="transition transform duration-300 ease-out"
         x-transition:enter-start="scale-95 opacity-0"
         x-transition:enter-end="scale-100 opacity-100">

      <div class="flex items-center justify-between px-5 pt-4 pb-2 shrink-0">
        <button @click="addModalOpen=false"
                class="flex items-center gap-1.5 font-bold text-[12px] text-text-secondary hover:text-text-primary transition-colors">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5"/><path d="m12 5-7 7 7 7"/></svg>
          Back
        </button>
      </div>

      <div class="overflow-auto flex-1 px-6 pb-4">
        <div class="pt-2 pb-5 flex flex-col items-center text-center">
          <div class="w-24 h-24 flex items-center justify-center text-5xl mb-4 bg-bg-main border border-border rounded-2xl">
            <span x-text="addModalProduct?.image || '🛍️'"></span>
          </div>
          <h3 class="font-bold text-[20px] text-text-primary tracking-tight mb-1" x-text="addModalProduct?.name"></h3>
          <div class="font-bold text-[24px] text-primary tabular"
               x-text="'KES ' + (selectedVariant ? selectedVariant.price : addModalProduct?.price)?.toLocaleString()"></div>
          <div class="mt-1 text-[12px] text-text-secondary font-medium"
               x-text="(selectedVariant ? selectedVariant.stock_qty : addModalProduct?.stock_qty) + ' units available'"></div>
        </div>

        <template x-if="addModalProduct?.variants && addModalProduct.variants.length > 0">
          <div class="mb-5">
            <p class="text-[11px] font-bold text-text-secondary uppercase tracking-widest mb-2.5">Choose type</p>
            <div class="flex flex-wrap gap-2">
              <template x-for="v in addModalProduct.variants" :key="v.id">
                <button @click="selectedVariant = v; addQty = 1"
                        class="px-5 py-2.5 text-[14px] font-semibold rounded-xl transition-all border"
                        :class="selectedVariant?.id === v.id
                          ? 'bg-primary text-white border-primary shadow-md'
                          : 'bg-bg-main text-text-secondary border-border hover:bg-hover'"
                        x-text="Array.isArray(v.options) ? v.options.join(' / ') : v.name"></button>
              </template>
            </div>
          </div>
        </template>

        <div x-show="(!addModalProduct?.variants?.length) || selectedVariant" x-transition>
          <div class="flex items-center justify-between gap-4 p-3 bg-bg-main border border-border rounded-2xl">
            <button @click="if(addQty > 1) addQty--"
                    class="w-12 h-12 flex items-center justify-center bg-surface border border-border rounded-xl text-text-secondary active:scale-90 transition-all">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
            <div class="text-center flex-1">
              <div class="font-bold text-[32px] text-text-primary tabular leading-none" x-text="addQty"></div>
              <div class="text-[12px] font-bold text-text-secondary uppercase tracking-widest mt-1">Quantity</div>
            </div>
            <button @click="
                      let mx  = selectedVariant ? selectedVariant.stock_qty : addModalProduct?.stock_qty;
                      let cid = selectedVariant ? selectedVariant.id : addModalProduct?.id;
                      let inCart = cart.items.find(i => i.id === cid)?.qty || 0;
                      if (addQty < (mx - inCart)) { addQty++ } else { alert('No more stock available') }"
                    class="w-12 h-12 flex items-center justify-center bg-surface border border-border rounded-xl text-primary active:scale-90 transition-all">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
          </div>
        </div>
      </div>

      <div x-show="(!addModalProduct?.variants?.length) || selectedVariant" class="shrink-0 p-5 bg-surface border-t border-border">
        <button @click="
                  let p = selectedVariant
                    ? { id:        selectedVariant.id,
                        is_variant: true,
                        parent_id:  addModalProduct.id,
                        name:       selectedVariant.name || addModalProduct.name,
                        price:      selectedVariant.price,
                        stock_qty:  selectedVariant.stock_qty,
                        image:      addModalProduct.image }
                    : { id:        addModalProduct.id,
                        is_variant: false,
                        name:       addModalProduct.name,
                        price:      addModalProduct.price,
                        stock_qty:  addModalProduct.stock_qty,
                        image:      addModalProduct.image };
                  if (addToCart(p, addQty)) { addModalOpen = false }"
                class="btn-primary w-full h-[56px] text-[16px] gap-3">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          Add to Basket
          <span class="opacity-30">·</span>
          <span class="tabular" x-text="'KES ' + ((selectedVariant ? selectedVariant.price : addModalProduct?.price) * addQty).toLocaleString()"></span>
        </button>
      </div>
    </div>
  </div>

  <!-- ══════════ CART DRAWER ══════════ -->
  <div x-show="cart.open" x-cloak class="fixed inset-0 z-[200] flex items-center justify-center p-3">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm cursor-pointer"
         @click="cart.open=false"
         x-transition.opacity></div>

    <div class="relative w-full max-w-2xl flex flex-col bg-surface border border-border rounded-[32px] shadow-2xl overflow-hidden"
         style="max-height: 90vh"
         x-data="{cartView:'items'}"
         x-transition:enter="transition transform duration-300 ease-out"
         x-transition:enter-start="scale-95 opacity-0"
         x-transition:enter-end="scale-100 opacity-100">

      <div class="flex items-center justify-between px-5 pt-4 pb-4 shrink-0 border-b border-border">
        <button @click="cart.open=false"
                class="flex items-center gap-1.5 font-bold text-[12px] text-text-secondary hover:text-text-primary transition-colors">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5"/><path d="m12 5-7 7 7 7"/></svg>
          Continue Shopping
        </button>
        <div class="text-center">
          <div class="font-bold text-[18px] text-text-primary tracking-tight">Basket</div>
          <div class="text-[12px] font-bold text-text-secondary uppercase tracking-widest mt-0.5" x-text="itemCount + ' items'"></div>
        </div>
        <button @click="clearCart()" class="font-bold text-[12px] text-danger hover:opacity-80 transition-opacity">Clear All</button>
      </div>

      <div class="flex gap-1 mx-5 mt-4 p-1 shrink-0 bg-bg-main rounded-xl">
        <button @click="cartView='items'"
                class="flex-1 py-2.5 font-bold text-[12px] uppercase tracking-wide rounded-lg transition-all flex items-center justify-center gap-2"
                :class="cartView === 'items' ? 'bg-surface text-primary shadow-sm' : 'text-text-secondary hover:text-text-primary'">
          Items
          <span x-show="itemCount>0" x-text="itemCount" class="bg-primary text-white text-[10px] px-2 py-0.5 rounded-full tabular"></span>
        </button>
        <button @click="cartView='payment'"
                class="flex-1 py-2.5 font-bold text-[12px] uppercase tracking-wide rounded-lg transition-all flex items-center justify-center gap-2"
                :class="cartView === 'payment' ? 'bg-surface text-primary shadow-sm' : 'text-text-secondary hover:text-text-primary'">
          Payment
        </button>
      </div>

      <!-- ITEMS PANEL -->
      <div x-show="cartView==='items'" x-transition class="flex-1 overflow-auto ns px-5 pt-3 pb-2 mt-2">
        <template x-for="(item, idx) in cart.items" :key="item.id">
          <div class="flex items-center gap-3 py-4 border-b border-border">
            <div class="w-12 h-12 shrink-0 flex items-center justify-center text-2xl bg-bg-main border border-border rounded-xl"
                 x-text="item.image || '🛍️'"></div>
            <div class="flex-1 min-w-0">
              <div class="text-text-primary font-semibold text-[14px] truncate" x-text="item.name"></div>
              <button class="flex items-center gap-1 mt-0.5 text-primary font-bold text-[14px]"
                      @click="let d=prompt('Discount (KES):',item.discount||0);if(d!==null)setLineDiscount(item.id,d)">
                <span class="tabular" x-text="'KES ' + (item.price - (item.discount || 0)).toLocaleString()"></span>
                <template x-if="item.discount > 0">
                  <span class="text-[11px] text-text-secondary line-through ml-1 tabular" x-text="item.price.toLocaleString()"></span>
                </template>
              </button>
            </div>
            <div class="flex items-center shrink-0 bg-bg-main border border-border rounded-xl p-1">
              <button @click="updateQty(item.id,-1)"
                      class="w-8 h-8 flex items-center justify-center bg-surface border border-border rounded-lg text-text-secondary hover:text-text-primary active:scale-90 transition-all">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="5" y1="12" x2="19" y2="12"/></svg>
              </button>
              <span class="w-8 text-center font-bold text-[14px] text-text-primary tabular" x-text="item.qty"></span>
              <button @click="updateQty(item.id,1)"
                      class="w-8 h-8 flex items-center justify-center bg-surface border border-border rounded-lg text-primary active:scale-90 transition-all">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              </button>
            </div>
            <div class="shrink-0 min-w-[70px] text-right">
              <div class="font-bold text-[14px] text-text-primary tabular"
                   x-text="'KES ' + ((item.price - (item.discount || 0)) * item.qty).toLocaleString()"></div>
            </div>
          </div>
        </template>
        <template x-if="cart.items.length === 0">
          <div class="flex flex-col items-center justify-center py-16 opacity-40">
            <div class="text-5xl mb-3">🛒</div>
            <p class="font-bold text-[12px] uppercase tracking-widest">Basket is empty</p>
          </div>
        </template>
      </div>

      <!-- PAYMENT PANEL -->
      <div x-show="cartView==='payment'" x-transition class="flex-1 overflow-auto ns px-5 pt-3 pb-4 mt-2">
        <p class="text-[11px] font-bold text-text-secondary uppercase tracking-widest mb-4">Payment Method</p>
        <div class="grid grid-cols-2 gap-3 mb-6">
          <template x-for="m in [
              {key:'cash',  icon:'💵', label:'Cash'},
              {key:'mpesa', icon:'📱', label:'M-Pesa'},
              {key:'card',  icon:'💳', label:'Card'},
              {key:'split', icon:'✂️', label:'Split'}
            ]" :key="m.key">
            <button @click="payment=m.key; if(m.key==='split' && splitPayments.length===0) splitPayments.push({method:'cash',amount:0})"
                    class="flex flex-col items-center gap-2 p-4 border rounded-2xl transition-all"
                    :class="payment === m.key ? 'bg-selected-item border-primary text-primary shadow-sm' : 'bg-surface border-border text-text-secondary hover:bg-hover'">
              <span class="text-2xl" x-text="m.icon"></span>
              <span class="font-bold text-[14px]" x-text="m.label"></span>
            </button>
          </template>
        </div>

        <div x-show="payment==='split'" x-transition>
          <div class="flex items-center justify-between mb-3">
            <p class="text-[11px] font-bold text-text-secondary uppercase tracking-widest">Split Details</p>
            <button @click="splitPayments.push({method:'cash',amount:0})"
                    class="btn-primary px-3 py-1.5 text-[11px] uppercase rounded-lg">Add Entry</button>
          </div>
          <div class="space-y-2 mb-4">
            <template x-for="(sp, idx) in splitPayments" :key="idx">
              <div class="flex items-center gap-3 p-2 bg-bg-main border border-border rounded-xl">
                <div class="flex gap-1">
                  <template x-for="mm in ['cash','mpesa','card']" :key="mm">
                    <button @click="sp.method=mm"
                            class="px-3 py-1.5 text-[10px] font-bold uppercase rounded-lg transition-all"
                            :class="sp.method === mm ? 'bg-primary text-white' : 'bg-surface text-text-secondary border border-border'"
                            x-text="mm==='mpesa'?'MP':'C'"></button>
                  </template>
                </div>
                <input type="number" x-model.number="sp.amount" placeholder="0"
                       class="flex-1 text-right font-bold text-[14px] bg-transparent border-none focus:outline-none text-primary">
                <button @click="splitPayments.splice(idx,1)" class="text-danger p-1">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
              </div>
            </template>
          </div>
          
          <div class="p-4 bg-bg-main border border-border rounded-xl">
            <div class="flex justify-between text-[12px] font-bold uppercase tracking-wider mb-2">
              <span class="text-text-secondary">Collected</span>
              <span :class="totalPaid >= cartTotal ? 'text-success' : 'text-danger'" x-text="'KES ' + totalPaid.toLocaleString()"></span>
            </div>
            <div class="w-full h-2 bg-border rounded-full overflow-hidden">
              <div class="h-full transition-all duration-300"
                   :class="totalPaid >= cartTotal ? 'bg-success' : 'bg-warning'"
                   :style="`width: ${Math.min(100, cartTotal > 0 ? (totalPaid/cartTotal)*100 : 0)}%`"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="shrink-0 p-5 bg-surface border-t border-border">
        <div class="flex items-center justify-between mb-4">
          <div>
            <div class="text-[12px] font-bold text-text-secondary uppercase tracking-widest mb-0.5">Grand Total</div>
            <div class="font-bold text-[32px] text-text-primary leading-none tabular">KES <span x-text="cartTotal.toLocaleString()"></span></div>
          </div>
          <button x-show="cartView==='items'" @click="cartView='payment'" class="btn-primary px-6 py-3 gap-2">
            Pay Now
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
          </button>
        </div>

        <button @click="if(cartView === 'items') { cartView = 'payment'; return; }
                  checkoutLoading=true;
                  fetch('{% url 'pos:checkout' %}', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json','X-CSRFToken':'{{ csrf_token }}'},
                    body: JSON.stringify({
                      items:           cart.items,
                      payment_method:  payment,
                      split_payments:  payment==='split' ? splitPayments : [],
                      coupon_code:     couponApplied ? couponCode : ''
                    })
                  })
                  .then(r => r.text())
                  .then(html => {
                    document.getElementById('modal-container').innerHTML = html;
                    checkoutLoading = false;
                    clearCart();
                  })
                  .catch(() => { checkoutLoading = false })"
                :disabled="checkoutLoading || itemCount===0 || (payment==='split' && totalPaid<cartTotal)"
                class="w-full h-[60px] text-[18px] transition-all disabled:opacity-40"
                :class="cartView === 'payment' ? 'btn-success' : 'btn-primary'">
          <span x-show="!checkoutLoading" class="flex items-center gap-3">
            <span x-text="cartView === 'payment' ? 'Complete Sale' : 'Checkout'"></span>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
          </span>
          <span x-show="checkoutLoading" class="animate-pulse">Processing...</span>
        </button>
      </div>
    </div>
  </div>

  <!-- ══════════ SCAN OVERLAY ══════════ -->
  <div x-show="scanOpen" x-cloak class="fixed inset-0 z-[400] flex flex-col items-center justify-center bg-black/90 p-8" x-transition.opacity>
    <div class="w-full max-w-xs relative">
      <div id="reader" class="aspect-square overflow-hidden rounded-[32px] border-2 border-primary/50"></div>
      <div class="absolute inset-x-8 top-1/2 h-1 bg-primary/50 shadow-[0_0_15px_var(--primary)] animate-pulse"></div>
    </div>
    <button @click="scanOpen=false; if(window.html5QrCode) window.html5QrCode.stop().catch(()=>{})"
            class="mt-8 px-8 py-3 btn-primary bg-surface text-text-primary border border-border">Cancel Scan</button>
  </div>

</div>

<script>
document.getElementById('search-input').addEventListener('input', function(){
  document.getElementById('search-clear').style.opacity = this.value ? '1' : '0';
});
const sw = document.getElementById('search-wrap');
document.getElementById('search-input').addEventListener('focus', () => {
  sw.style.borderColor = 'var(--primary)';
  sw.style.boxShadow   = '0 0 0 3px rgba(37,99,235,0.1)';
});
document.getElementById('search-input').addEventListener('blur', () => {
  sw.style.borderColor = 'var(--border)';
  sw.style.boxShadow   = 'none';
});

let html5QrCode;
function startScanner() {
  if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
  window.html5QrCode = html5QrCode;
  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 20, qrbox: { width: 220, height: 220 } },
    (text) => {
      const app = Alpine.$data(document.querySelector('[x-data]'));
      if (app && app.handleBarcode(text)) { app.scanOpen = false; html5QrCode.stop(); }
    },
    () => {}
  ).catch(e => console.error("Scanner:", e));
}
</script>
{% endblock %}

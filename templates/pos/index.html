{% extends 'base.html' %}
{% load static %}

{% block screen_title %}Checkout{% endblock %}

{% block content %}
<div class="flex flex-col h-[calc(100vh-64px)] overflow-hidden bg-[#0a0a0f]" 
     x-data="{ checkoutLoading: false, editingQty: null, addModalOpen: false, addModalProduct: null, selectedVariant: null, addQty: 1, scanOpen: false, manualBarcode: '' }">
    
    <!-- Top Action Bar (Search & Cart) -->
    <div class="px-3.5 py-3 flex items-center gap-2.5 bg-[#111118] border-b border-white/[0.07] shrink-0">
        <div class="flex-1 relative group">
            <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-muted/60 transition-colors group-focus-within:text-[#00e676]">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </span>
            <input type="text" name="q" hx-get="{% url 'pos:index' %}" hx-trigger="input changed delay:200ms" hx-target="#product-grid" hx-include="[name='category']" placeholder="Search for items..."
                class="w-full bg-[#1a1a24] border border-white/[0.07] rounded-xl py-3 pr-3 pl-10 text-[14px] text-white focus:ring-1 focus:ring-[#00e676]/30 focus:border-[#00e676]/60 transition-all placeholder:text-muted/40">
        </div>
        
        <button @click="scanOpen = true" class="bg-[#1a1a24] border border-white/[0.07] rounded-xl w-[48px] h-[48px] flex items-center justify-center cursor-pointer text-muted hover:text-[#00e676] transition-colors active:scale-95">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9V6a2 2 0 0 1 2-2h2"/><path d="M21 9V6a2 2 0 0 0-2-2h-2"/><path d="M3 15v3a2 2 0 0 0 2 2h2"/><path d="M21 15v3a2 2 0 0 0-2 2h-2"/><line x1="7" y1="12" x2="7" y2="12"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="17" y1="12" x2="17" y2="12"/></svg>
        </button>

        <!-- Cart Trigger Pill (Premium High-Contrast) -->
        <button x-show="itemCount > 0" x-transition.scale.origin.right x-cloak @click="cart.open = true" 
            class="bg-[#00e676] border-none rounded-2xl h-[48px] px-4 cursor-pointer text-[#0a0a0f] flex items-center justify-center gap-2 font-display font-extrabold text-[15px] shadow-[0_4px_20px_rgba(37,211,102,0.4)] active:scale-95 transition-all outline-none">
            <span class="text-lg">🛒</span>
            <span x-text="itemCount" class="bg-black/10 px-1.5 py-0.5 rounded-lg"></span>
        </button>
    </div>

    <!-- Category Tabs (Restored Solid Green) -->
    <div class="flex gap-2 px-3.5 py-3 overflow-x-auto shrink-0 no-scrollbar whitespace-nowrap bg-[#0a0a0f] border-b border-white/[0.07]" x-data="{ activeCat: '{{ active_category|default:'all' }}' }">
        <input type="hidden" name="category" :value="activeCat">
        <button hx-get="{% url 'pos:index' %}?category=all" hx-target="#product-grid" @click="activeCat = 'all'; $el.closest('div').querySelector('[name=category]').value = 'all'"
            class="rounded-xl px-5 py-2.5 text-[13px] font-extrabold transition-all cursor-pointer border"
            :class="activeCat === 'all' ? 'bg-[#00e676] border-[#00e676] text-[#0a0a0f] shadow-[0_4px_15px_rgba(37,211,102,0.3)]' : 'bg-[#1a1a24] border-white/[0.07] text-muted hover:text-white'">
            All Items
        </button>
        {% for cat in categories %}
        <button hx-get="{% url 'pos:index' %}?category={{ cat.id }}" hx-target="#product-grid" @click="activeCat = '{{ cat.id }}'; $el.closest('div').querySelector('[name=category]').value = '{{ cat.id }}'"
            class="rounded-xl px-5 py-2.5 text-[13px] font-extrabold transition-all cursor-pointer border"
            :class="activeCat === '{{ cat.id }}' ? 'bg-[#00e676] border-[#00e676] text-[#0a0a0f] shadow-[0_4px_15px_rgba(37,211,102,0.3)]' : 'bg-[#1a1a24] border-white/[0.07] text-muted hover:text-white'">
            {{ cat.name }}
        </button>
        {% endfor %}
    </div>

    <!-- Main Grid -->
    <div id="product-grid" class="flex-1 overflow-auto px-3.5 py-4 pb-24 grid grid-cols-2 lg:grid-cols-4 gap-3 content-start bg-[#0a0a0f]">
        {% include 'pos/partials/product_grid.html' %}
    </div>

    <!-- Universal Add Sheet (Premium Bottom-Sheet) -->
    <div x-show="addModalOpen" x-cloak class="fixed inset-0 z-[120] flex flex-col justify-end">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" @click="addModalOpen = false" x-transition.opacity></div>
        
        <div class="relative bg-[#111118] border-t border-white/[0.07] rounded-t-[32px] w-full max-w-lg mx-auto shadow-[0_-15px_40px_rgba(0,0,0,0.5)] flex flex-col overflow-hidden max-h-[90vh]" 
             x-show="addModalOpen" 
             x-transition:enter="transition transform duration-400 cubic-bezier(0.2, 0.8, 0.2, 1)" 
             x-transition:enter-start="translate-y-full" 
             x-transition:enter-end="translate-y-0">
            
            <div class="p-6 flex flex-col items-center shrink-0">
                <div class="w-12 h-1.5 bg-white/10 rounded-full mb-6"></div>
                
                <div class="w-full flex items-start gap-5">
                    <div class="w-20 h-20 shrink-0 bg-[#1a1a24] rounded-2xl flex items-center justify-center text-5xl border border-white/[0.05]">
                        <span x-text="addModalProduct?.image"></span>
                    </div>
                    <div class="flex-1 pt-1">
                        <h3 class="font-display font-extrabold text-2xl text-white tracking-tight mb-1" x-text="addModalProduct?.name"></h3>
                        <p class="text-lg font-extrabold text-[#00e676]" x-text="'KES ' + (selectedVariant ? selectedVariant.price : addModalProduct?.price).toLocaleString()"></p>
                    </div>
                </div>
            </div>

            <!-- Variants Area -->
            <template x-if="addModalProduct?.variants && addModalProduct.variants.length > 0">
                <div class="px-6 pb-4">
                    <h4 class="text-[11px] font-extrabold text-muted uppercase tracking-widest mb-3">Choose Variant</h4>
                    <div class="flex flex-wrap gap-2">
                        <template x-for="v in addModalProduct?.variants" :key="v.id">
                            <button @click="selectedVariant = v; addQty = 1;"
                                    class="px-4 py-3 rounded-2xl border-2 transition-all cursor-pointer min-w-[80px]"
                                    :class="selectedVariant?.id === v.id ? 'bg-[#00e676]/10 border-[#00e676] text-[#00e676]' : 'bg-[#1a1a24] border-transparent text-white/70 hover:border-white/10'">
                                <div class="font-extrabold text-sm" x-text="v.options.join(' / ')"></div>
                                <div class="text-[10px] font-bold opacity-60 mt-0.5" x-text="'KES ' + v.price.toLocaleString()"></div>
                            </button>
                        </template>
                    </div>
                </div>
            </template>

            <!-- Quantity & Actions -->
            <div x-show="(!addModalProduct?.variants?.length) || selectedVariant" x-transition.opacity>
                <div class="p-6 pt-2 bg-[#1a1a24]/30">
                    <div class="flex items-center justify-between bg-black/40 rounded-3xl p-2 border border-white/[0.05] mb-8">
                         <button @click="if(addQty > 1) addQty--" class="w-16 h-16 rounded-2xl bg-[#1a1a24] border border-white/[0.05] flex items-center justify-center text-white/50 active:scale-95 transition-all cursor-pointer">
                             <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
                         </button>
                         <div class="flex flex-col items-center">
                             <span class="text-4xl font-extrabold text-white tabular-nums" x-text="addQty"></span>
                             <span class="text-[10px] font-bold text-muted uppercase tracking-wider mt-1">Quantity</span>
                         </div>
                         <button @click="
                             let maxStock = selectedVariant ? selectedVariant.stock_qty : addModalProduct?.stock_qty;
                             let currentId = selectedVariant ? selectedVariant.id : addModalProduct?.id;
                             let inCart = cart.items.find(i => i.id === currentId)?.qty || 0;
                             if(addQty < (maxStock - inCart)) { addQty++; } else { alert('Max available stock reached'); }
                         " class="w-16 h-16 rounded-2xl bg-[#1a1a24] border border-white/[0.05] flex items-center justify-center text-white/50 active:scale-95 transition-all cursor-pointer">
                             <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                         </button>
                    </div>

                    <button @click="
                            let p = selectedVariant ? {
                                id: selectedVariant.id,
                                parent_id: addModalProduct.id,
                                name: selectedVariant.name,
                                price: selectedVariant.price,
                                stock_qty: selectedVariant.stock_qty,
                                image: addModalProduct.image
                            } : {
                                id: addModalProduct.id,
                                name: addModalProduct.name,
                                price: addModalProduct.price,
                                stock_qty: addModalProduct.stock_qty,
                                image: addModalProduct.image
                            };
                            if(addToCart(p, addQty)) { addModalOpen = false; }
                        " 
                        class="w-full py-5 bg-[#00e676] text-[#0a0a0f] font-extrabold text-lg rounded-2xl shadow-[0_10px_30px_rgba(37,211,102,0.3)] active:scale-[0.98] transition-all border-none cursor-pointer flex items-center justify-center gap-3">
                        <span>Add to Sale</span>
                        <span class="w-1 h-1 rounded-full bg-black/20"></span>
                        <span x-text="'KES ' + ((selectedVariant ? selectedVariant.price : addModalProduct?.price) * addQty).toLocaleString()"></span>
                    </button>
                    <div class="h-6"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Cart Bottom Sheet -->
    <div x-show="cart.open" x-cloak class="fixed inset-0 z-[150] flex flex-col justify-end">
        <div class="absolute inset-0 bg-black/85 backdrop-blur-md" @click="cart.open = false" x-transition.opacity></div>
        
        <div class="relative bg-[#111118] border-t border-white/[0.07] rounded-t-[32px] w-full max-w-lg mx-auto shadow-[0_-20px_50px_rgba(0,0,0,0.6)] flex flex-col max-h-[92vh]" 
             x-transition:enter="transition transform duration-400 ease-out" x-transition:enter-start="translate-y-full" x-transition:enter-end="translate-y-0">
            
            <div class="p-6 flex flex-col items-center shrink-0 border-b border-white/[0.05]">
                <div class="w-12 h-1.5 bg-white/10 rounded-full mb-6"></div>
                <div class="w-full flex items-center justify-between">
                    <h2 class="font-display font-extrabold text-2xl text-white">Your Cart</h2>
                    <button @click="clearCart()" class="px-4 py-2 bg-brand-red/10 text-brand-red text-xs font-bold uppercase rounded-lg border-none cursor-pointer active:scale-95 transition-all">Clear All</button>
                </div>
            </div>

            <!-- Payment Toggle -->
            <div class="px-6 py-4 shrink-0 bg-[#0a0a0f]/50">
                <div class="bg-black/30 p-1 rounded-2xl flex gap-1 border border-white/[0.05]">
                    <template x-for="mode in ['cash','mpesa','card','split']" :key="mode">
                        <button @click="payment = mode" 
                                class="flex-1 py-3 text-[11px] font-extrabold uppercase tracking-widest rounded-xl transition-all border-none cursor-pointer"
                                :class="payment === mode ? 'bg-[#00e676] text-[#0a0a0f] shadow-lg scale-105' : 'bg-transparent text-white/40 hover:text-white/70'">
                            <span x-text="mode"></span>
                        </button>
                    </template>
                </div>
            </div>

            <!-- Items -->
            <div class="flex-1 overflow-auto px-6 py-2 custom-scrollbar">
                <template x-for="item in cart.items" :key="item.id">
                    <div class="flex items-center gap-4 py-4 border-b border-white/[0.03]">
                        <div class="w-14 h-14 shrink-0 bg-[#1a1a24] rounded-xl flex items-center justify-center text-3xl border border-white/[0.03]" x-text="item.image"></div>
                        <div class="flex-1 min-w-0">
                            <div class="text-white font-bold text-sm truncate mb-1" x-text="item.name"></div>
                            <div class="text-[#00e676] text-xs font-extrabold flex items-center gap-2 cursor-pointer" @click="let d = prompt('Item Discount?', item.discount || 0); if(d!==null) setLineDiscount(item.id, d)">
                                KES <span x-text="(item.price - (item.discount || 0)).toLocaleString()"></span>
                                <template x-if="item.discount > 0">
                                    <span class="line-through text-white/20 text-[10px]" x-text="'KES ' + item.price"></span>
                                </template>
                            </div>
                        </div>
                        <div class="flex items-center bg-[#1a1a24] rounded-xl p-1 gap-1">
                            <button @click="updateQty(item.id, -1)" class="w-8 h-8 flex items-center justify-center rounded-lg bg-[#22222d] text-white/50 border-none cursor-pointer"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
                            <span class="w-6 text-center text-sm font-extrabold text-white" x-text="item.qty"></span>
                            <button @click="updateQty(item.id, 1)" class="w-8 h-8 flex items-center justify-center rounded-lg bg-[#22222d] text-white/50 border-none cursor-pointer"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
                        </div>
                    </div>
                </template>
            </div>

            <!-- Total & Checkout -->
            <div class="p-6 bg-[#0a0a0f] border-t border-white/[0.05] shrink-0">
                <div class="flex justify-between items-end mb-6">
                    <span class="text-white/40 font-bold mb-1">Total Pay</span>
                    <div class="text-right">
                        <div class="text-[10px] font-extrabold text-muted uppercase tracking-widest mb-1">Including Tax</div>
                        <div class="text-3xl font-display font-extrabold text-[#00e676] leading-none">KES <span x-text="cartTotal.toLocaleString()"></span></div>
                    </div>
                </div>
                
                <button @click="checkoutLoading = true; 
                          fetch('{% url 'pos:checkout' %}', {
                              method: 'POST',
                              headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
                              body: JSON.stringify({ items: cart.items, payment_method: payment, split_payments: payment === 'split' ? splitPayments : [], coupon_code: couponApplied ? couponCode : '' })
                          })
                          .then(res => res.text())
                          .then(html => {
                              document.getElementById('modal-container').innerHTML = html;
                              checkoutLoading = false;
                              clearCart();
                          }).catch(err => { checkoutLoading = false; });"
                  :disabled="checkoutLoading || itemCount === 0"
                  class="w-full py-5 bg-[#00e676] text-[#0a0a0f] font-extrabold text-xl rounded-2xl shadow-[0_10px_25px_rgba(37,211,102,0.3)] border-none cursor-pointer active:scale-[0.98] relative overflow-hidden group">
                    <div class="absolute inset-0 bg-white/20 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    <span x-show="!checkoutLoading">Process Payment</span>
                    <span x-show="checkoutLoading">Processing...</span>
                </button>
                <div class="h-4"></div>
            </div>
        </div>
    </div>

    <!-- Scan overlay -->
    <div x-show="scanOpen" x-cloak class="fixed inset-0 z-[200] bg-black Backdrop-blur-md flex flex-col items-center justify-center p-6" x-transition.opacity>
        <div class="relative w-full max-w-xs aspect-square border-2 border-[#00e676]/30 rounded-3xl overflow-hidden shadow-[0_0_50px_rgba(37,211,102,0.1)]">
            <video id="video" class="w-full h-full object-cover"></video>
            <div class="absolute inset-0 border-[40px] border-black/40"></div>
            <div class="absolute top-8 left-8 w-8 h-8 border-t-4 border-l-4 border-[#00e676] rounded-tl-xl drop-shadow-glow"></div>
            <div class="absolute top-8 right-8 w-8 h-8 border-t-4 border-r-4 border-[#00e676] rounded-tr-xl drop-shadow-glow"></div>
            <div class="absolute bottom-8 left-8 w-8 h-8 border-b-4 border-l-4 border-[#00e676] rounded-bl-xl drop-shadow-glow"></div>
            <div class="absolute bottom-8 right-8 w-8 h-8 border-b-4 border-r-4 border-[#00e676] rounded-br-xl drop-shadow-glow"></div>
        </div>
        <p class="text-white/80 font-bold mt-10 text-center tracking-wide">Align barcode to scan</p>
        <button @click="scanOpen = false" class="mt-10 py-4 px-10 text-white/40 font-extrabold uppercase text-xs tracking-widest hover:text-white transition-all bg-transparent border-none cursor-pointer">Cancel</button>
    </div>

</div>
{% endblock %}

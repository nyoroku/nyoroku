<div x-data="{ open: true }" x-show="open" x-cloak class="fixed inset-0 z-[60] flex items-center justify-center p-4">
    <div x-show="open" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100" class="absolute inset-0 bg-black/80 backdrop-blur-md" @click="open = false; cart.open = false; clearCart()"></div>
    
    <div x-show="open" x-transition:enter="transition ease-out duration-400 transform" x-transition:enter-start="scale-90 opacity-0" x-transition:enter-end="scale-100 opacity-100" 
         class="relative w-full max-w-sm bg-white2 border border-border rounded-[28px] shadow-2xl overflow-hidden p-8 text-center animate-scale-in">
        
        <!-- Success Icon -->
        <div class="mb-6">
            <div class="w-18 h-18 bg-brand-green/10 text-brand-green rounded-full flex items-center justify-center mx-auto mb-5 shadow-glow-green" style="width:72px;height:72px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
            </div>
            <h3 class="font-display font-extrabold text-2xl text-black tracking-tight">Sale Confirmed</h3>
            <p class="text-text-muted text-sm mt-1 dm-mono">{{ transaction.receipt_number }}</p>
        </div>

        <div class="bg-white rounded-2xl p-6 mb-6 border border-border">
            <span class="text-[10px] font-extrabold text-text-muted uppercase tracking-[0.2em] block mb-2">Total Collected</span>
            <div class="font-display font-extrabold text-4xl text-brand-green tracking-tight">KES {{ transaction.total }}</div>
            
            {% if transaction.coupon_discount > 0 %}
            <div class="mt-3 flex items-center justify-center gap-2">
                <span class="px-2 py-1 bg-brand-green/10 text-brand-green text-[9px] font-extrabold rounded-md uppercase tracking-wider">
                    Saved KES {{ transaction.coupon_discount }}
                </span>
            </div>
            {% endif %}
            
            <div class="mt-3 flex items-center justify-center gap-2">
                <span class="px-2 py-1 bg-white/[0.04] text-text-muted text-[9px] font-extrabold rounded-md uppercase tracking-wider">{{ transaction.payment_method }}</span>
                <span class="text-[10px] text-text-muted font-bold">{{ transaction.created_at|date:"M d, H:i" }}</span>
            </div>
        </div>

        <div class="space-y-3">
            <a href="/pos/receipt/{{ transaction.id }}/" target="_blank" class="w-full py-4 bg-white/[0.04] border border-border text-black rounded-2xl font-display font-extrabold text-sm uppercase tracking-tight active:scale-95 transition-all flex items-center justify-center gap-3 hover:bg-white/[0.06]">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>
                Print Receipt
            </a>
            <button @click="open = false; cart.open = false; clearCart()" class="w-full py-4 bg-brand-green text-surface rounded-2xl font-display font-extrabold text-sm uppercase tracking-tight active:scale-95 transition-all shadow-glow-green btn-shimmer">
                New Sale
            </button>
        </div>
    </div>
</div>

{% for product in products %}
<button @click="
        addModalProduct = { 
            id: '{{ product.id }}', 
            name: '{{ product.name|escapejs }}', 
            price: {{ product.price }},
            image: '{{ product.image }}',
            stock_qty: {{ product.total_stock }},
            variants: {% if product.has_variants %}{{ product.variants_json|safe }}{% else %}[]{% endif %}
        };
        selectedVariant = null;
        addQty = 1;
        addModalOpen = true;
    "
     class="bg-[#111118] border border-white/[0.07] rounded-[24px] p-4 cursor-pointer text-left transition-all hover:bg-[#1a1a24] hover:border-[#00e676]/30 active:scale-[0.96] w-full relative group shadow-sm flex flex-col items-center {% if product.total_stock == 0 %}opacity-40 pointer-events-none grayscale{% endif %}">
    
    {% if product.total_stock == 0 %}
    <div class="absolute inset-0 bg-[#0a0a0f]/40 backdrop-blur-[2px] rounded-[24px] flex items-center justify-center z-10">
        <span class="px-3 py-1.5 bg-[#ff1744]/20 text-[#ff1744] text-[10px] font-extrabold uppercase tracking-widest rounded-xl border border-[#ff1744]/20">Sold Out</span>
    </div>
    {% endif %}

    <div class="relative bg-black/20 rounded-2xl p-4 mb-3 transition-transform duration-300 group-hover:scale-105 border border-white/[0.03]">
        <span class="text-5xl drop-shadow-lg block leading-none select-none">{{ product.image }}</span>
        
        <!-- Overlapping Badge for Cart Quantity -->
        <template x-if="cart.items.find(i => i.id === '{{ product.id }}' || i.parent_id === '{{ product.id }}')">
             <span class="absolute -top-2 -right-2 bg-[#00e676] text-[#0a0a0f] rounded-full min-w-[24px] h-[24px] px-1.5 text-[11px] font-extrabold flex items-center justify-center shadow-[0_4px_10px_rgba(37,211,102,0.4)] border-2 border-[#111118]"
                  x-text="cart.items.filter(i => i.id === '{{ product.id }}' || i.parent_id === '{{ product.id }}').reduce((sum, i) => sum + i.qty, 0)">
             </span>
         </template>
    </div>

    <div class="text-white font-bold text-sm leading-tight text-center w-full truncate mb-1 px-1">{{ product.name }}</div>
    <div class="text-[#00e676] font-extrabold text-base mb-1.5 font-display">
        KES {{ product.price|floatformat:0 }} 
        {% if product.has_variants %}
        <span class="text-[#00e676]/60 text-[10px] font-bold">+</span>
        {% endif %}
    </div>
    
    <div class="inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full text-[10px] font-extrabold transition-colors"
         :class="{% if product.total_stock <= product.reorder_level %} 'bg-[#ffab00]/10 text-[#ffab00]' {% else %} 'bg-white/5 text-muted' {% endif %}">
        {% if product.total_stock <= product.reorder_level %}
        <span class="text-[8px]">⚠</span> {{ product.total_stock }} left
        {% else %}
        {{ product.total_stock }} in stock
        {% endif %}
    </div>
</button>
{% empty %}
<div class="col-span-full py-32 flex flex-col items-center justify-center text-muted/30">
    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" class="mb-5 opacity-30"><path d="m2 2 20 20"/><path d="M7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>
    <p class="font-display font-medium text-lg tracking-wide">No items found</p>
</div>
{% endfor %}

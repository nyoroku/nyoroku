{% for product in products %}
<button @click="
        addModalProduct = {
            id: '{{ product.id }}',
            name: '{{ product.name|escapejs }}',
            price: {{ product.price }},
            image: '{{ product.image }}',
            stock_qty: {{ product.total_stock }},
            variants: {% if product.has_variants %}{{ product.variants_json|safe }}{% else %}[]{% endif %},
            barcode: '{{ product.barcode }}'
        };
        selectedVariant = null;
        addQty = 1;
        addModalOpen = true;
    "
    class="card-shimmer relative flex flex-col items-center cursor-pointer text-left transition-all duration-300 active:scale-[0.95] w-full group overflow-hidden
           {% if product.total_stock == 0 %}opacity-30 pointer-events-none grayscale{% endif %}"
    style="background: var(--bg-card);
           border: 1.5px solid var(--border-sub);
           border-radius: var(--radius-xl);
           padding: 24px 20px 20px;
           min-height: 220px;
           box-shadow: 0 8px 32px rgba(0,0,0,0.4);
           transition: border-color 0.25s, box-shadow 0.25s, transform 0.2s;"
    onmouseenter="this.style.borderColor='var(--border-act)'; this.style.boxShadow='0 16px 48px rgba(0,0,0,0.5), 0 0 32px var(--mint-soft)'"
    onmouseleave="this.style.borderColor='var(--border-sub)'; this.style.boxShadow='0 8px 32px rgba(0,0,0,0.4)'">

    <!-- Sold Out overlay -->
    {% if product.total_stock == 0 %}
    <div class="absolute inset-0 z-20 flex items-center justify-center"
         style="background: rgba(8,8,16,0.6); border-radius: var(--radius-xl); backdrop-filter: blur(3px);">
      <span class="font-display font-800 text-[11px] uppercase tracking-[0.3em] px-4 py-2 rounded-full"
            style="background: rgba(255,77,106,0.15); color: var(--red); border: 1.5px solid rgba(255,77,106,0.25);">
        Sold Out
      </span>
    </div>
    {% endif %}

    <!-- Cart count badge -->
    <template x-if="cart.items.find(i => i.id === '{{ product.id }}' || i.parent_id === '{{ product.id }}')">
      <span class="absolute top-3 right-3 z-10 animate-scale-in font-display font-800 text-[12px] min-w-[26px] h-[26px] px-1.5 flex items-center justify-center rounded-full"
            style="background: var(--mint); color: #000; box-shadow: 0 4px 16px var(--mint-glow);"
            x-text="cart.items.filter(i => i.id === '{{ product.id }}' || i.parent_id === '{{ product.id }}').reduce((sum, i) => sum + i.qty, 0)">
      </span>
    </template>

    <!-- Emoji image -->
    <div class="w-full flex items-center justify-center py-5 mb-3 rounded-[28px] transition-transform duration-500 group-hover:scale-110"
         style="background: rgba(0,0,0,0.3); border: 1.5px solid var(--border-sub);">
      <span class="text-6xl leading-none drop-shadow-lg select-none">{{ product.image }}</span>
    </div>

    <!-- Name -->
    <div class="w-full text-center mb-2">
      <div class="font-display font-800 text-[13px] uppercase tracking-[0.08em] truncate"
           style="color: var(--text-hi); line-height: 1.3;">
        {{ product.name }}
      </div>
    </div>

    <!-- Price -->
    <div class="flex items-center justify-center gap-2 flex-wrap mb-3">
      <span class="font-display font-800 text-[17px]" style="color: var(--mint);">
        KES {{ product.price|floatformat:0 }}
      </span>
      {% if product.has_variants %}
      <span class="text-[10px] font-display font-800 uppercase tracking-[0.2em] px-2 py-0.5 rounded-full"
            style="background: var(--mint-soft); color: var(--mint); border: 1px solid var(--border-act);">
        Options
      </span>
      {% endif %}
    </div>

    <!-- Stock pill -->
    <div class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-[10px] font-display font-800 uppercase tracking-[0.2em] transition-all"
         {% if product.total_stock <= product.reorder_level %}
         style="background: rgba(255,186,8,0.1); color: var(--amber); border: 1px solid rgba(255,186,8,0.2);"
         {% else %}
         style="background: var(--bg-hi); border: 1px solid var(--border-sub);"
         :style="'color: var(--text-low);'"
         {% endif %}>
      {% if product.total_stock <= product.reorder_level %}
      <span style="width: 6px; height: 6px; border-radius: 50%; background: var(--amber); display: inline-block; animation: pulse 1.5s infinite;"></span>
      <span>Low · {{ product.total_stock }}</span>
      {% else %}
      <span style="width: 6px; height: 6px; border-radius: 50%; background: var(--mint); display: inline-block; opacity: 0.5;"></span>
      <span x-text="'{{ product.total_stock }} left'"></span>
      {% endif %}
    </div>
  </button>
{% empty %}
<div class="col-span-full flex flex-col items-center justify-center py-40" style="color: var(--text-low);">
  <div class="w-28 h-28 flex items-center justify-center rounded-full mb-8"
       style="background: var(--bg-card); border: 1.5px solid var(--border-sub);">
    <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.8"
         stroke-linecap="round" style="opacity: 0.3;">
      <path d="m2 2 20 20"/><path d="M7.5 4.27 9 5.15"/>
      <path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/>
      <path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/>
    </svg>
  </div>
  <p class="font-display font-800 text-[18px] uppercase tracking-[0.2em]" style="opacity: 0.25;">Nothing here</p>
  <p class="text-[13px] mt-2" style="color: var(--text-low); opacity: 0.5;">Try a different category or search term</p>
</div>
{% endfor %}

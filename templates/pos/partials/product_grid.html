{% for product in products %}
<button @click="
        addModalProduct = { 
            id: '{{ product.id }}', 
            name: '{{ product.name|escapejs }}', 
            price: {{ product.price }},
            image: '{{ product.image }}',
            stock_qty: {{ product.total_stock }},
            variants: {% if product.has_variants %}{{ product.variants_json|safe }}{% else %}[]{% endif %},
            barcode: '{{ product.barcode }}'
        };
        selectedVariant = null;
        addQty = 1;
        addModalOpen = true;
    "
     class="bg-[#111118] border-2 border-white/[0.08] rounded-[48px] p-8 cursor-pointer text-left transition-all hover:bg-[#1a1a24] hover:border-[#25D366]/40 active:scale-[0.96] w-full relative group shadow-[0_20px_50px_rgba(0,0,0,0.5)] flex flex-col items-center justify-between min-h-[380px] {% if product.total_stock == 0 %}opacity-30 pointer-events-none grayscale{% endif %}">
    
    {% if product.total_stock == 0 %}
    <div class="absolute inset-0 bg-black/70 backdrop-blur-[4px] rounded-[48px] flex items-center justify-center z-20">
        <span class="px-8 py-3.5 bg-[#ff1744]/20 text-[#ff1744] text-[13px] font-black uppercase tracking-[0.3em] rounded-2xl border-2 border-[#ff1744]/30 shadow-2xl">Sold Out</span>
    </div>
    {% endif %}

    <!-- Image Container (High-Contrast) -->
    <div class="relative bg-black/50 rounded-[44px] p-10 mb-8 border-2 border-white/[0.05] shadow-inner group-hover:scale-110 transition-transform duration-700 w-full flex items-center justify-center">
        <div class="text-8xl drop-shadow-[0_20px_30px_rgba(0,0,0,0.8)] select-none leading-none">
            {{ product.image }}
        </div>
        
        <!-- Cart Badge -->
        <template x-if="cart.items.find(i => i.id === '{{ product.id }}' || i.parent_id === '{{ product.id }}')">
             <span class="absolute -top-5 -right-5 bg-[#25D366] text-black rounded-full min-w-[42px] h-[42px] px-2 text-[17px] font-black flex items-center justify-center shadow-[0_4px_25px_rgba(37,211,102,0.6)] border-4 border-[#111118] animate-scale-in"
                  x-text="cart.items.filter(i => i.id === '{{ product.id }}' || i.parent_id === '{{ product.id }}').reduce((sum, i) => sum + i.qty, 0)">
             </span>
         </template>
    </div>

    <!-- Text Content (Separated and Bold) -->
    <div class="text-center w-full px-2 space-y-3">
        <div class="text-white font-black text-2xl uppercase tracking-tighter leading-tight truncate">
            {{ product.name }}
        </div>
        
        <div class="text-[#25D366] font-display font-black text-3xl leading-none flex items-center justify-center gap-3">
            KES {{ product.price|floatformat:0 }} 
            {% if product.has_variants %}
            <div class="bg-[#25D366]/10 text-[#25D366] text-[11px] px-3 py-1 rounded-xl font-black tracking-[0.2em] shadow-sm uppercase border border-[#25D366]/20">+ Options</div>
            {% endif %}
        </div>
    </div>
    
    <!-- Stock Indicator (Solid Island) -->
    <div class="mt-6 inline-flex items-center gap-4 px-6 py-2.5 rounded-full text-[13px] font-black tracking-[0.2em] uppercase transition-all shadow-xl"
         :class="{% if product.total_stock <= product.reorder_level %} 'bg-amber-900/40 text-amber-500 border-2 border-amber-500/20 animate-pulse' {% else %} 'bg-white/5 text-white/20 border-2 border-white/5 group-hover:bg-[#25D366]/10 group-hover:text-[#25D366]' {% endif %}">
        {% if product.total_stock <= product.reorder_level %}
        <span class="text-[14px]">☢</span> <span x-text="'Critical: ' + {{ product.total_stock }}"></span>
        {% else %}
        <span x-text="'Available: ' + {{ product.total_stock }}"></span>
        {% endif %}
    </div>
</button>
{% empty %}
<div class="col-span-full py-64 flex flex-col items-center justify-center text-white/10">
    <div class="bg-white/[0.02] p-20 rounded-full mb-12 border-2 border-white/[0.04] shadow-inner">
       <svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round" class="opacity-20"><path d="m2 2 20 20"/><path d="M7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>
    </div>
    <p class="font-display font-black text-4xl tracking-tighter uppercase opacity-30">Warehouse Empty</p>
</div>
{% endfor %}
